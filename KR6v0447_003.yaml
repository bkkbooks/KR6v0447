body:
  text: 大乘律宗傳教大師所立者三國傳法記引顯戒論云嵯峨天皇御宇弘仁十己亥年三月十五日最澄和尚於此睿山為建立菩薩戒壇造表式奏問公家五月十九日南都大僧都護命小僧都長慧勤操律師施平同豐安同修圓同泰演等上表云沙門最澄不見唐都即以歸來私造式文輒經奏問乞召對最澄身面以論決因兹公家不垂敕許和尚造顯戒論三卷進公家天聽既畢尚殘疑於異域遣大唐大唐智云法師等答云所示顯戒論周覽既畢可云遠附天竺近叶神明云云仍和漢兩朝所歸伏也弘仁十三年六月四日大師入滅御年六十六爰別當大師光定依為傳教法弟為遂先師素意奏問戒壇建立旨淳和御門嵯峨御弟天長五年有敕召始立大乘戒壇南都戒壇已後六十九年或七十年清和帝南都碩德等尚含鬱念而成違亂爰慈覺大師造顯大戒論以為停南都違亂而調卷未成貞元六年正月十四日入滅御年七十二安然和尚依為慈覺御弟子即調先師遺論合十三篇録為四卷而和尚懸論於頸菅家御坐被申論序即有製作被副之于時貞元八年三月十六日即進此論已來南都之違亂停止矣後二季受戒無斷絶也問既以經釋出目録何云傳教大師所立乎答三國相承經釋的但釋日本閣南都權大乘之戒壇新立天台一佛乘菩薩圓頓之戒壇其興起顯也例如高野大師於真言雖儀記本經明白殊自大日經菩薩心論釋論而考要文以立十住心設教相之旨云弘法所立真言又如天竺二十八祖皆雖傳經律論之三藏而達磨大師殊以磨定觀之玉教外別傳云之云達磨宗風近和國遠異朝皆以繼佛法之慧命明機迷闍之方便也尋云戒法者佛家之要文衆道之資糧諸佛之威儀行者之表業設雖有經釋不面受口決者何云三國相承乎答莫不面受口決既大師靈山聽衆無陰委如傳五教章云如思禪師智者禪師神冥感通迹參登位靈山聽法憶在於今已上我山大師入唐受相傳於道邃豈非面受口決乎問此宗戒相要期何答戒相者金剛寶戒章上云今就此戒有十二門授相一開導開戒聖路導心寶城二三歸先歸三寶遠出魔界三請師請佛菩薩為受戒師四懺悔懺悔昔罪斷未造業五發心發菩提心建四弘願六問遮師問七罪受者答否七授戒相傳事戒發得理戒八證明已得受戒諸佛證明九現相受得戒時淨土現瑞十説相十重六八廣略隨時十一發願已得功德回施法界十二勸持受者應知禁忌補養已上戒相廣釋如本要期者同下云法華無作一心金剛寶戒者夫本有心性以為大乘戒體凡戒體者衆生心是瓔珞經云一切凡聖戒盡以心為體已上曠師云無作戒體實相心以之為體太宋高僧傳云夫一心者萬法總也分為戒定慧開而為六度散而為萬行乃至華嚴經云戒是無上菩提本應當具足持淨戒其淨戒者即是唯心也法照禪師云三阿僧祇百千名號皆是如來之異名亦是真心之別稱已上問就戒相持破之得失何答同章開導云實相一如佛性一乘之戒亦是唯心無著我法性身之戒也有持無破故名一得永不失其性堅固故名金剛寶戒焉是故不受性戒者名邪見外道及名作著人皮畜生若得聞此性戒者非直也人此是往昔結緣大乘佛性圓人亦是過去久遠一聞妙法真人也已上問就要期得何果乎答諸宗不共之無作三身之覺體也問其無作體何答諸法實相之上自立三千慮相皆是三身具足之妙體問一往當我等情三身何答落我等情一塵一法都非法體此戒法皆開實相之一理佛知見之境界也矣且三身者一法身者我等所具苦道也菴摩羅識也性因佛性也實相般若也實相菩提也理大乘也圓淨涅槃也佛寶也法身德也一切智也中道也二報身者我等所具業道也阿羅考羅恐賴歟耶識也了因佛性也觀照般若也實智菩提也隨大乘也相淨涅槃也法寶也般若德也一切種智也空諦也三應身者我等所具煩惱道也阿陀那識也緣因佛性也文字般若也方便智菩提也得大乘也方便淨涅槃也僧寶也解脫得也道種智也假諦也但停情執佛眼種智之日萬法互融無一切乖自在無窮也萬法云一不乖一理萬法云二不乖二諦萬法云三不乖三諦乃至云十不乖十佛十界十如十地等乃至百千萬都不乖一一名字言句諸佛名號威儀皆此戒表業也一家之已證但在此戒心四方木末春開花夏長葉秋果實冬枯木皆是草木發心修行菩提涅槃之作法草木國土知四季此一分覺悟智也此經開示悟入經萬法顯四門十界十如一念三千法體也問如無作三身者我等情執不變即覺果海何云息情執哉答爾也但云苦道即法身業即解脫煩惱即菩提生死即涅槃皆是觀中解了也如難者一代佛教無用也入觀門之沙汰者云煩惱即菩提生死即涅槃入觀門者後勿心挂一塵勿目視一色當位即妙不改本有從果向因之意於所緣之境一分勿發異念法性寂然名止寂而常照名觀從因至果之意二門異而不可別一而不可同但煩惱菩提夢覺與不覺之異也迷則三道流轉悟則果中勝用此謂歟總不入戒之門者莫説此戒之宗旨恭諸佛內證心地戒本也問此戒教主三身中何身乎答臺上他受用報身也梵網經云我今盧舍那方坐蓮花臺他受用身周匝千花上復現千釋迦淨土大化身一花百億國一國一釋迦穢土小化身已上太賢釋云於此臺上別有佛座此千葉臺有説此座非也上卷別説盧舍那坐百萬蓮華赫奕光明座上故既説我住蓮華藏世界海其臺周匝有千葉一花一世界我化為千釋迦復有百億須彌明知是土已上問如章人天戒者三界也聲聞戒者三千大千界劣應身所居也權大乘戒者勝應身所居國土受持也此國土者以一大三千大千世界配恆伽河之沙其一盡於一恆河沙乃至盡於十方恆河沙之世界廣是名曰方便土名曰世界種亦以世界種配恆河沙其一乃至盡於十方十恆河沙世界種廣名曰世界海是名實報土報身如來所居國土也亦如以前以此國土配於恆河沙其一乃至盡於十方十恆河沙之世界廣名為化佛法身一佛世界是為同居土又於十方無量無邊不可説不可説一切一佛國土色心二法上不犯不失之受持也但受此戒已後於輕垢罪若雖就戒相有犯破名字更就戒體一分無破滅其戒體者常住佛性也佛性大家更無破滅理於波羅夷罪破一一破雖有破言餘戒不敢破一往置破言於戒之相也譬如世間大海一切水流不斷雖流入大海無增無減大乘戒功德大海雖常差別衆水流入佛界不增法性平等無差別故有情界不減實相純一故衆生入佛界佛界有何諍而增衆流入大海大海無諍故成一鹽水是故於十方不可説不可説一切一佛國土內色心二法之上省此戒性法界同時而受之時一切色心二法有性無性之衆流入實相一如之大海速成法性真寂之鹽水更無破戒雨露水味此戒何身土乎答豈前不云乎自己本分一圓之身土也止觀云當知身土一念三千故已上弘決五云無始色心本是理性妙境妙智已上一大三千世界心地戒之內實報土心地戒之內化佛法身之土心地戒之內世間出世間萬法色心二法皆是心地戒內故諸家戒體人能持戒圓頓一實之妙戒戒能持人但此戒門入不入之異也問諸家之戒相何答章云第一人天戒者即五八十戒是也第二羊車戒者聲聞具足小乘戒也是二百五十戒三千威儀六萬細行此比丘具足戒也五百戒六千威儀十二萬細行是比丘尼具足戒也第三權大乘三聚淨戒亦名牛車戒一者攝律儀戒二者攝善法戒三者饒益有情戒已上寶戒章略抄細釋可見章真言宗大日如來金剛薩埵龍猛菩薩龍智阿闍梨金剛智三藏不空三藏善無畏三藏一行阿闍梨慧果和尚弘法大師夫真言者大日法身入一切如來一體速疾力三昧於法界宮所説之自證三菩提阿字本不生之一理也於此處者十地等覺菩薩尚非其境界況於二乘凡夫耶言語道斷心行亦寂唯佛與佛境界也十界之依正無非內證智之境故云祕密陀羅尼是故此祕教為上爾時世尊被催往昔之大悲願而作是念若我但住如是境界則諸有情不能以是蒙益是故住於自在神力加持三昧普為一切衆生自種種所修所宜而説種種性欲隨種種義門服種種妙藥晴極細妄執之疾雲三十七尊之月並光赫𭴢恆沙之性德非他有本性之心蓮四重曼荼依位森羅覺王內證之寶藏無心佛衆生之差別阿字開顯之圓鏡明五佛諸尊之色形五佛寶冠課萬物位位説法依正修行供養海雲法界同之真言宗旨於顯乘之言斷心滅理盛談之諸家教相集云慈覺大師依龍猛釋論立二種教一顯示教總攝一切顯教法門二祕密教總攝一切祕密教法又演義抄立顯密二教彼書者大興善寺源清阿闍梨面受善無畏三藏造彼闍梨覺大師師也已上覺大師意就釋論三十二因海云顯教不二摩訶云祕密教歟源清二教依金剛頂經立歟辨顯密二教論云教則二種應化開説名曰顯教言顯略逗機法佛談話謂之密藏言祕奧實説乃至若據祕藏金剛頂經説如來變化身為地前菩薩及二乘凡夫等説三乘教法他受用身為地上菩薩説顯一乘等並是顯教也自性受用佛自受法樂故與自眷屬各説三密門謂之密教此三密門者所謂如來內證智境界也等覺十地不能入室何況二乘凡夫誰得升堂故地論釋論稱其離機根唯識中觀歎言斷心滅已上東寺天台二教同歟大日宗三部者大師一處釋云一蓮華部吾自身中淨菩提心清淨之理此理雖經六道四生界生死淤泥中流轉而不染不垢蓮華如出生泥中而不染不垢仍名蓮華部二金剛部吾自心理所又有智斯智雖沒在生死淤泥經無數劫而不朽不壞能破諸煩惱如金剛雖久埋土中而不朽不壞摧破諸怨敵固物仍名金剛部三佛部斯理斯智凡位未顯理智具足覺道圓滿即名佛部已上又云蓮華部擬法身金剛部擬般若佛部擬解脫已上又云以三業充三部語為蓮華部意為金剛部身為佛部又充三寶身者佛語者法意者僧也已上正智院道範云三部者蓮華是自性清淨理金剛是不壞能斷智佛部是理智冥合佛身也理平等遍一切處故為妙有五大智斷人法二我有執故為真空識大佛部此理智有空不二總體故為中道已上又云三部即法報應三身也佛部為應身定慧不二理智相應故金剛部為報身生法二空智故蓮華部為法身自性清淨理故已上又云三部次第有二一依金剛界佛金蓮也二依胎藏界佛蓮金也問三部事相德用何答金剛頂經蓮華部心金誦次第云佛部者想佛部諸尊三十二相八十種好了了分明即驚覺佛部如來聖衆加持修行者令得身業清淨罪障消滅蓮華部者三遍加持安頂右思觀自在菩薩率蓮華部眷屬加持行者得語業清淨令説法自在金剛部者想金剛藏菩薩率執金剛眷屬圍繞誦三遍置頂左得意業清淨令證菩提心已上攝諸尊者一處釋云東行金剛部中佛部因西證寶部北涅槃羯磨部西方便蓮華部此分五部字以三字為體阿字友字體在磨音中阿字法身塢字報身摩字化身是故有三身義已上就三身皆可有胎藏金剛二義開五佛五智八葉九尊攝諸尊矣金剛頂宗五部者祕藏記云五部定母主如何毗盧遮那佛部主源故先為母阿閦金剛部主金剛波羅蜜為母寶性寶部主寶波羅蜜為母無量壽蓮花部主法波羅蜜為母不空成就羯磨部羯磨波羅蜜為母是即據四波羅蜜出生四佛之義已上攝下攝諸尊者問記云五部則五智一智所互具五智所以成二十五部如是展轉有無量部已上菩提心論云頭五智五佛事五方佛位各表一智也東方阿閦佛由成大圓鏡智亦名金剛智南方寶性佛由成平等性智亦名灌頂智西方阿彌陀佛由成妙觀察智亦名蓮華智亦名轉法輪智北方不空成就佛由成成所作智亦名羯磨智中央毗盧遮那佛由成法界智為本已上四佛智出生四波羅蜜菩薩焉四菩薩即金寶法業也三世一切諸賢聖生成養育之母於是印成法界體性中流出四佛也四方如來各攝四菩薩東方阿閦佛攝四菩薩金剛薩埵金剛王金剛愛金剛喜為四菩薩南方寶性佛攝四菩薩金剛寶金剛光金剛幢金剛笑為四菩薩西方阿彌陀佛攝四菩薩金剛法金剛利金剛因金剛語為四菩薩北方不空成就佛攝四菩薩金剛業金剛護金剛牙金剛拳為四菩薩四方佛各四菩薩為十六大菩薩也已上因論三十七尊者金剛號毗盧遍照金剛不動寶生平等觀察清淨羯磨成就金剛堅智寶寶金法蓮花業妙用埵真如王自在愛大悲喜善哉寶如意光威德幢滿願笑歡喜法清淨利般若因不退語性空業善巧護精進牙猛利拳祕密喜授記鬘妙嚴歌無畏舞神通香無礙花妙色燈普照塗清涼鉤普集索等引鎖堅持鈴解脫已上祕藏記文事相更勘問就二經佛衆種子并三密五相觀何答祕藏記云毗盧遮那經阿字為毗盧遮那種子吽字為金剛薩埵種子金剛頂經吽字為毗盧遮那阿字為金剛薩埵種子已上互為賓主義也菩提心論云凡修習瑜伽觀行人當須具修三密證悟五相成身義所言三密者一身密者如結印契召請聖衆是也二語密者如密誦真言令文句了了分明無謬誤也三意密者如住瑜伽相應白淨月圓滿觀菩提心也次明五相成身者一是通達心二是成菩提心三是金剛心四是金剛身五是證無上菩提獲金剛堅固身也然此五相具備方成本尊身也其圓明則普賢身也亦是普賢心也與十方諸佛同之亦乃三世修行證有前後及達悟已無去來今已上菩提心論各有蓮華部者道範云問以彌陀為蓮華部主所證法門為蓮華三昧之意如何答一切衆生皆有本淨心蓮令其開敷是云蓮華三昧所觀蓮華彌陀法身也已上高野大師就此教立十住心祕藏寶鑰云第一異生羝羊心凡夫狂醉不知吾非但念食如彼羝羊第二愚童持齋心由外因緣愚思節食施心萠動如穀遇緣第三嬰童無畏心外道生天暫得蘇息如彼嬰兒特于思母第四唯蘊無我心唯解法有我人皆遮羊車三藏悉攝此句第五拔業因種心修身十二無明拔種業生已除無言得果第六他緣大乘心無緣起悲大悲初發幻影觀心唯識遮情第七覺心不生心八不絶戲一念觀空心源空寂無相安樂第八如實一道心一如本淨境智俱融知此心性號曰遮那第九極無自性心水無自性遇風即波法界非極蒙警忽進第十祕密莊嚴心顯藥拂塵真言開庫祕法忽陳萬德即證前九種顯教後一種密教也又此十住心事相時真言行者所徑十心也謂異生羝羊心者一向行惡不修微少善位也愚童持齋心嬰童無畏心者若真言行者初入三昧耶依三密供養修行位與此齊也唯蘊無我心拔業因種心者初劫也若真言行者本尊三昧耶衆相現前位與此齊也一道無為心極無自性心者第三劫也是即真言行者虛空無垢菩提心若生極無自性心得入如上曼荼羅海會名阿闍梨也祕密莊嚴心者初地已上次位也修上上方便斷微細妄執至佛果也問此宗意於六大四曼三密事理分別何答綱要抄云就此有三義一以六大地水火風空識為理以四曼三密法三昧耶大羯磨為四曼身口意為三密為事二以六大四曼為理以三密為事三六大四曼三密此理皆事理者大師意攝持不散為義故可讀於佐無於六大四曼三密互相加入彼此攝持重重無盡名自宗理已上即身成佛義頌云六大無礙常瑜伽體四種曼荼各不離相三密加持速疾顯用重重帝網名即身無礙法然具足薩般若心數心王過剎塵各具五智無際智圓鏡力故實覺智釋曰又四初一句體二相三用四無礙後頌中有四初舉法佛成佛次表無數三顯輪圓後出所以謂六大者五大及識大日經謂我覺本不生出過語言道諸過得解脫遠離於因緣知空等虛空是其義也彼種子真言曰為阿字諸法本不生義者即是地大嚩字離言説謂之水大清淨無垢塵者是即囉字火大也因業不可得者訶字門風大也等虛空者欠字字相即空大也我覺本者識大也因位名識果位謂智智即覺故已上問即身成佛名義何答就前二頌初一頌釋即身二字次一頌釋成佛二字亦初四句如次體相用無礙於萬法一一有體相用故後四句如次成佛無數輪圓所由於諸法各具四德故依大師釋意即者有三義一相應涉入即義體之即也二不離即義相之即也三如常即時即日用之即也體者六大相者四曼用者三密此三盡諸法矣身者釋云身者我身佛身衆生身是名身又有四種身言自性受用變化等流是名曰身又有三種字印形是也如是等身縱橫重重如鏡中影像燈光涉入已上此外十界身三種世間身心王心數身互相涉入無礙互相加持互相相即重重無盡也成者大日經開題云成不壞故不斷故不滅故常恆故堅固故清淨故無始故無終故此即法爾所成非因緣所生故已上佛者同開題云佛者梵語之略也具沒馱翻云覺者言覺者不眼名覺開敷為義又常明故照了故如實知故此覺亦非因緣生法然所得故文云法佛自然智已得離一切暗已上隨求尊勝等者隨求陀羅尼經云淨土因行不退轉決定往生上上品生生值遇盧遮那世世持誦不忘念已上尊勝陀羅尼經云每日二十一遍誦之往生阿彌陀佛國已上阿嚕力迦經云先造十萬塔於一一塔前誦一萬遍如法供養者所求悉地皆得捨身已任意往生極樂世界已上無礙壽儀軌云此陀羅尼才誦一遍則滅身中十惡四重五無間罪一切業障悉皆消滅若苾芻苾芻尼犯根本罪誦七遍已即時還得戒品清淨誦滿一萬遍獲得不獲忘菩提心三摩地菩提心顯現心中皎潔圓明猶如淨月臨命終時見無量壽如來與無量俱低菩薩圍繞來迎安慰行者即生極樂世界上品上生已上大呪陀羅尼等者祕藏記云陀羅尼名總持者一字中含藏一切法文譬如大地含持一切諸法以此陀羅尼含藏義踰彼大地依持生長義故曰總持真言以何為體以念慧為體以總持力憶持一切法門經無量時不忘之故是顯之意也諸經中説陀羅尼或明或呪或密語或真言如是五其義如何陀羅尼者佛放光光中所説也是故陀羅尼與明其義不異呪者佛法未來漢地前有世間呪禁法能發神驗除災患令持此陀羅尼人能發神通除災患與呪禁法相似是故曰呪密語者凡夫二乘不能知故曰密語真言者如來言真實無虛妄故曰真言然皆是舉一邊所名也以曼荼羅為真言名耳言曼荼羅者梵語歟漢語歟梵語非漢語以曼荼羅翻漢語云何耶曼荼羅含衆多義依無相當者翻譯家不翻已上此宗如來滅後一千六百四年唐代第八玄宗皇帝治四年開元四年丙辰年中天竺善無畏三藏將來大日經七卷又同八年庚申年南天竺金剛智三藏將來金剛頂經三卷于時玄宗皇帝貴此於長安城令弘傳已上三國傳法記又云東寺真言者人王第五十代桓武天皇治二十三年延曆二十三年甲申年大安寺空海生年三十一承敕入唐奉值青龍寺慧果和尚受傳三部大法經三年了人王第五十二代嵯峨天皇治二年中大同二年丁酉八月生年三十四歸朝十月比天王奉捧灌頂其後五十四代仁明天皇治二年承和二年乙卯三月二十一日丙寅寅時生年六十三入定了已上天台真言者傳教慈覺智證之將來如此真言立兩界胎藏金剛三部佛金蓮十地名同義異十六大生等判攝釋尊五十餘所説并大日覺王三世常恆內證外用所説法門也十六大生者十六大菩薩之生也真言行者即身成佛之後所經也薩王愛喜寶光幢笑法利輪語業護牙拳矣胎藏界者此攝大日經并諸經從因向果所説也金剛界者此攝金剛頂并諸經從本向迹所説也三世常恆所説故別無説時於此所説立四種釋釋三部大法一淺略門顯教所説二深祕門入真言門後一行者顯德三祕中深祕門大日諸佛一門普門也四祕祕中深祕門一切衆生色心實相性淨圓明平等智身問東寺真言國王殊崇之何答弘法大師欲立即身成佛旨諸宗之學侶不用之于時大師為散不審於南殿向南方結智拳印面門俄開成金色大日從眉間放白光爰一人傾首諸侯合掌時三論道昌法相源仁華嚴道雄天台圓澄等皆竪降旗成實宗夫鹿園攝機之鑒用四阿含大槩之本心殆鄰大乘之磨呾理迦故學者多作大小之異義矣成謂能成之文實謂所成之理訶梨跋摩三藏所造也訶梨跋摩此云師子鎧此論即立五藏一修多羅藏佛在婆羅奈為㸸鄰頞鞞拔提拘利太子十力迦葉説之二毗尼藏佛次在羅閲祇為須提那説之三阿毗曇藏佛十二年後在毗舍離獼猴池為跋耆子説之四雜藏為前三藏諸衆説戒定慧次第不同五菩薩藏為阿含中菩薩説六度法矣總此宗就三藏空門明二十七賢聖位謂十八有學九無學也四向四果之七隨信行隨法行信解見至家家一間五種不還已上十八也退法思法護法安住堪達不動六種羅漢不退慧解脫俱解脫已上九無礙得名義可待下五取者指五藏歟四諦者苦集滅道細釋可待下此論有大小諍者三論玄云訶梨自言正論三藏故知成實理是小乘若言斯論亦明大者過在門人非跋摩之咎矣問若成實釋小不許兼明於大亦三論解大不應兼明於小答若明大乘必兼辨小乘小乘中不兼明大故大乘經初有小乘衆小乘經首無菩薩僧示大能包小小不含大佛經既爾在論例然問成實論文盛辨生法二空與大品明四諦平等義既無異故知應是探大釋小答四阿含教內有二空論明二空則還釋三藏云何云探大解小又身子毗曇亦辨二空而是小非大訶梨之論義亦應同問小明一空大辨二空可有差別既同其二空大小何異答同雖辨二空二空不同略明四種一者小乘析法明空大乘本性空寂二者小但明三界內人法二空二空義即短大乘明三界內外人法並空空義即長三者小乘但明於空未説不空大乘明空亦辨不空故涅槃云聲聞之人但見於空不見不空智者見空及以不空空者一切生死不空者謂大涅槃四者小乘名為但空謂但住於空菩薩名不可得空空亦不可得也故知雖明二空空義有異故分大小矣問毗曇但明人空成實具明二空云何兩論無有優劣答於小乘內自分三品一者但不得二空如犢子部下根人也二者薩衛之流但得人空不得法空為次根人也三者譬喻訶梨之流具得二空為上根人也約空義淺深則毗曇為小乘之劣成實為小內之勝問釋論云佛滅度後分為二分一但信人空不信法空二俱信人法二空但應有二何得分三答犢子入真觀故即見我空出於俗諦別有人體龍樹約其入觀義邊故但分二也已上略抄俱舍宗夫阿毗達磨俱舍論者六百頌之細釋大毗婆沙之肝要發智之慧命四師所量之栖心四阿含之理盡三藏之樞健顯密兩宗之明器依之婆數考數恐藪歟薩埵受請於迦濕彌羅而開本師悟入之疑於傳記之文是故七十五法之春林開三乘修行之花四諦緣理之秋空輝四向四果之月三十軸之露點消於無我觀之理光八品之串珠解無漏法之慧明總明之譽六足所不及顯正之鎮磨削六師之迹矣阿毗達磨俱舍論者頌疏云阿毗此云對達磨此云法俱舍此云藏謂無漏之慧名之為對對有二義一者對向謂對向涅槃二者對觀謂對觀四諦法有二種一勝義法謂是涅槃二法相法通四聖諦藏有二義一包含二所依言包含者如簣篋此論包含發智論等勝義言故名為藏發智論等為對法俱舍名藏而非對法然今此論名對法藏者對法之藏故名對法藏依主釋也言所依者正理釋云藏或所依猶引藏引彼義言造此論故以對法藏名對法藏論謂教誡學徒故稱為論矣次明品之前後者此頌上下總有八品一界品二根品三世間品四業品五隨眠品六賢聖品七智品八定品破我一品無別正頌初二品總明有漏無漏後六品別明有漏無漏初界品明諸法體根品明諸法用就別明六品中初三品別明有漏後三品別明無漏有漏可厭所以先説厭已令欣無漸故後説世間品明果業品明因略抄論宗旨者頌疏云一説部大衆部雞胤部説出世部此四部宗一切諸法無非是假但有言説若經部宗立一切法少分實有多分是假若薩婆多宗一切有法為所奉宗計有不同總有四説一類二相三位四待言類者尊者法救作如是説由類不同三世有異言相者尊者妙音説相不同三世有異言位者尊者世友説位不同三世有異言待者尊者覺天説待不同三世有異論主評云法救執法有轉變故應置數論外道明中妙音所立世間雜亂三世皆有三世相覺天所立世還雜亂一世法中應有三世世友立世最善依經部宗過未無體唯現在是有今評世親著論宗旨有其兩種一者顯宗即一切有二者密宗所謂經部經部所説有違理故此一部論多將經部破薩婆多故知世親密宗所評經部為宗已上略抄佛口三藏者佛在波羅奈最初為五人説契經修多羅藏佛在羅閲祗最初為須提那説毗尼藏佛在毗舍離獼猴池最初為跋耆子説阿毗曇藏矣又三藏教興皆有四意故婆娑云説素荼羅藏依力等流一為衆生得增上心學論道故二為衆生種種雜説故三一食衆生得種善根故四為衆生未入正法令入正法故説毗奈耶藏依悲等流故一為衆生得增上戒學論道故二為衆生論説諸學處故三為衆生已種善根者令相續成就故四為令入正法者令受持正法故説阿毗達磨藏依無畏等流一為衆生得增上慧學論道故二為分別諸法自相共相故三為已成就者令得正解脫故四為已受持學廣者通達諸法真實相故已上大毗婆娑三藏者頌疏云頂禮世友推為上座於是五百聖衆初集十萬頌釋素陀羅藏次造十萬頌釋毗那耶藏後造十萬頌釋阿毗達磨藏即大毗婆娑是也世友商確長明採翰偷釋三藏已上問婆娑論結集之因緣何答因迦膩色迦王之請結集之頌疏云問曰諸部立範孰最善乎我欲修行願尊者説尊者脅尊者也答曰諸部懿美也典莫越有宗王欲修行宜遵此矣以迦膩王之議五百羅漢結集迦濕彌羅國林木鬱茂泉石清間聖賢所居靈山遊止復山有四面城唯一門極堅固可結集已上問諸部等何答上座者大迦葉也謂為報佛恩五百羅漢共三藏結集衆中上座故迦葉為上座大衆部者不預大迦葉之衆諸學無學百千人欲報佛恩凡聖及愚智悉集即結集三藏慧暉云佛滅後七日外有二部之名雖有二部之名但共報佛恩無異執光記云佛滅後百有餘年無憂王時三藏二部成上座部大衆部十八部論引文殊問經云我弟子有二十部能令諸法住世部者並得四果三藏二十等無下中上譬如海水味無有異如人有二十子真實如來所説文殊師利根本二部從大乘出已上十八部如別紙今三藏者頌疏云一素怛覽藏此翻為綖或為經正詮於定二毗奈耶藏此翻稱調伏正詮於戒三阿毗達磨藏此云對法正詮於慧於此三中此論即是阿毗達磨藏攝已上次頌疏云釋此頌略為三分一序分二正宗三流通初三行頌是序分次六百行頌是正宗後四行頌是流通分已上明五位七十五法者五位者一色法有十一五根五境及無表色五根者一眼根二耳根三鼻根此三根處雖各二頓境識同故為一四舌根五身根此五根五識所依四大種所造其體清淨如珠寶光五境者一色境五根五境雖是色為差別最勝故獨得五色處名二聲境三香境四味境五觸境矣色境有二或説二十一顯色有十二二形色有八顯色十二者一青二黃三赤四白五影障光明生於中餘色可見名影六光日焰名光七明月星火𭴢等諸焰名明八暗翻景為暗九雲十煙十一塵十二霧形色八者一長二短三方四圓五高六下七正形平等八不正形不平等聲有八種四大種所造所作一有執受大種為因有情名可意聲語出好聲如歌詠等二有執受大種為因有情名不可意聲語出惡聲如惡罵等三有執受大種為因非有情名可意聲拍手好聲等如鼓樂等吉音四有執受大種為因非有情名不可意聲拍手惡聲等如如童子打板五無執受大種為因有情名不可意聲化者語惡鬼神等語七無執受大種為因非有情名可意聲風林河浪好聲如松風軟浪等八無執受大種為因非有情名可意聲風林河等聲惡如松風惡浪等香有四種本論但説三無不等普一好香如沈檀等二惡香如慈苔等三等香好惡香中益依身者四不等香好惡香中損依身等味有六種一甘二酢三鹹四辛五苦六淡觸有十一前四能造後七所造一地持用堅性二水攝用濕性三火熱用燸性四風長用動性五滑柔軟名滑六澀粗強名澀七重可稱名重八輕翻上名輕九冷燸欲名冷十飢食欲名飢十一渴飲欲名渴頌曰色二或二十聲唯有八種味六香四種觸十一為性已上五境無表色雖大種所造性其體非極微非令他表知心故名無表體性有二種身無表語無表身三語四七支身三殺生不與取欲邪行語四虛狂語雜間語粗惡語雜穢語無表有三種差別一律儀此復有三一別解脫律儀此亦有八種一苾芻律儀二苾芻尼律儀三正學律儀女戒四勤策律儀五勤策女律儀六近事律儀七近事女律儀八近住律儀男女通戒二靜慮律儀亦名定共戒與定同時故三無漏律儀亦名道共戒與無論道俱故二不律儀惡戒身三語四三非律儀非不律儀善惡處中論十四云能遮能滅惡戒相續故名律儀已上無表頌曰色者唯五根五境及無表已上色法十一矣二心法此一於心王一有三名心意識集記名心思量名意了別名識六識意根名七心界六識中前五識無分別第六識有分別居現在為識無間滅為意也三心所法有四十六心之所有故名心所大地法十大善地法十大煩惱地法六大不善地法二小煩惱地法十不定地法八大地法十者大謂受等遍諸心故地謂心王彼行成故大地法故名大地大地所有名大地法兩重依主釋下準之一受領納苦樂俱非二想於境取差別相三思能令心有造作四觸根境識三和合性能有觸對五欲悕求所得事業六慧於法能有簡擇七念於境明記不忘八作意令心驚覺九勝解於境印可十三摩地能令心王於一境轉頌曰受想思觸欲慧念與作意勝解三摩地遍於一切心大善地法十者唯遍善心故名大善一信令心澄淨二不放逸修諸善法三輕安心堪忍性四捨心平等性無驚覺性五慙於所造罪自觀有恥六愧於所造罪觀他有恥七無貪於境不著八不害謂無損害九無嗔於境不嗔十勤令心勇掉頌曰信及不放逸輕安捨慙愧二根及不害勤唯遍善心婆娑更説欣厭以非並起此論不説厭謂厭背如緣苦集欣謂欣向如緣滅道大煩惱地法六者一無明愚癡為性二放逸不修善法三懈怠心不勇掉四不信心不澄淨五惛沈令心惛重六掉舉令心不靜頌曰癡逸怠不信惛掉恆唯染大不善地法二者唯遍不善心名大不善一無慙於所造罪自觀無恥二無愧於所造罪觀他無恥頌曰唯遍不善心無慙及無愧小煩惱地法十者唯修所斷意癡相應各別現行故名小煩惱一忿深嗔及害於情非情二覆陰藏自罪三慳遠財魔法施令心吝著四嫉於他與盛事令心不喜五惱堅執有罪事不取知理諫誨六害於他能為遍惱由此行打罵事七恨於忿所緣數數尋思結怨不捨八諂謂心曲由是不如實自內彰九誑謂能惑他十憍染著自法令心觸繞小惑更有多種皆應忿等攝頌曰忿覆慳嫉惱害恨諂誑憍如是類名為小煩惱地法不定地法八者不入五地名為不定婆娑更説怖今據類俱八一尋謂尋求心粗性二伺謂伺察心細性三睡眠令心暗昧為性四惡作緣惡作事追悔性五貪謂受六嗔謂恚七慢謂對於他心自舉性八疑謂於諦理猶預為性略頌曰尋伺及眠悔貪嗔與慢疑不入五地故名不定地法已上心心所名相應法有五義一所依平等心心所必同所依根二所緣平等心心所必同所緣境三行相平等心心所法其體明淨隨緣何境名起行相四時平等謂心心所必定同時五事平等事者體心心所法其體名一已上四十六心所四心不相應行有十四不與心相應名心不相應一得謂獲成就二非得與上相違三同分有情等也四無想果無想天中心心所滅五無想定六滅盡定五六二無心定七命根體即壽也八生九住十異十一滅八九十十一四有為相十二名身名即是德總説名身十三句身句講章十四文身文即字頌曰心不相應行得非得同分無相二定命相名身等類問得獲成就差別云何答從來未得法上得創至生相名得名獲不論初後得至現在名成就也得總有四種有為法上唯有前三一與彼法俱此是法俱得亦名如影隨形得二在彼法前此是法前得亦名牛王引前得三在彼法後此是法後得亦名犢子隨後得四非前後俱此是前後俱得擇滅非擇滅得也此二無為不生不滅故無前後之義得有前後所得無為無前後故云非前後俱得非得總有三類一法前非得二法後非得三非前後非得二無為非得現在法無非得法現必有得故真諦三藏所譯中立現法非法是謬同分有二一無差別同是有情二有差別界地趣生各別同分又有二種一有情同分如前二法同分能令諸法互相似也問同分義云何答同者有情身形等諸法同似之同分者因義也謂諸法同之因同之分故名同分依主釋無想果者在無想天有情身中心心所滅外道計無想天真寂靜涅槃城為生彼修無想定是為因五百大劫之間引生無想果身中令不生心心所無想果亦云無想事二無心定定中唯此二滅心心所法一無想定外道修之二滅盡定不還阿羅漢聖者修之問無想定外道為生無想天修之滅盡定聖者為何修之乎答擬入無餘涅槃修之四有為相二一本相二隨相諸行有為由四本相本相有為由四隨相也四本相者相本法故亦名大相一生相能起名生未來世間在生相住施功能二住相能安名住三異相能衰名壞四滅相能異名滅此三在現四隨相者隨本相故亦名小相一生生相謂從小生生大生故下準之知之二住住相三異異相四滅滅相頌曰相謂諸有為生住異滅性名句文身三者一名身一名是名非名身二名名身如説色聲等三名已去名多名身如説色聲香等有三名也頌疏第五云論云名謂作想解云想者取像或契約義若取像名想是心所如説色名能生色想因名生想名為作想若契約義想即是名謂諸賢聖共為契約立色等名名即是想由此名相能有詮表故名作想矣諸法立名有六種釋略頌云持業依主與有財相違鄰近并帶數光記一云西方釋名多依六釋六釋者一依主釋謂此依彼或云依士名異義同如言水瓶水之瓶故名水瓶二有財釋如人有財亦名多財如有多財名異義同如以所領名為領主名三持業釋謂一法體雙持兩業業謂業用或云同依兩用同依一體名異義同如言石硯一法體雙持石與硯兩業明故四相違釋謂二法體彼此各異據互不相屬如言善法惡法東西五鄰近釋體非是彼近彼得名如當國言鄰國六帶數釋謂法帶數故如言五蘊已上二句身一句是句非自身兩句是句亦句身三句已去名多句身如説諸行無常一切法無我涅槃寂靜此皆有三句名多句身也頌疏第五云句者謂章詮義究竟如説諸行無常等章或能辨了業用德時相應差別此章稱句解云且如一色有所見業發識用青黃等德過未等時與四相合名為相應不相應者名句差別謂能辨色是所見等此章稱句也三文身一字是文非文身兩字文亦文身三字已去名多文身如迦佉伽等有三字得名多文身也頌疏第五云文者謂字如説惡阿一伊等字是不相應行中字不同此方墨書之字已上已上十四不相應也五無為法有三一擇滅無為即以離繫為性擇謂簡擇即慧差別各別簡擇四聖諦故擇力所得滅故名為擇滅如牛所駕車名曰牛車略去中言二非擇滅無為永礙當生得非擇滅謂能永礙未來法生得滅異前名非擇滅得非擇滅名不同擇但由緣闕擇者智名三虛空無為謂以無礙為性故色法於中行作矣已上七十五法問以七十五法如何立五蘊耶答一色色十一二受大地法中受心所三想大地法中想心所四行心所四十六中除受想餘四十四并十四不相應此五十八法也五識心王一問何故餘四十四心所總置行蘊受想別為二蘊耶答界品第一頌云諍根生死因及次第因故於諸心所法受想別為蘊同第一論云諍根有二謂著諸欲及著諸見此二受想如次第為最勝因味受力故貪著諸欲倒想力故貪著諸見諍根因又生死法以受及想為最勝因由耽著受起倒想故生死輪回生死因或從無始生死已來男女於色相愛樂此由耽著樂受味故耽受復由倒想生故此倒想生由業煩惱故如是煩惱依識而生次第因已上略抄問何故説無為在處界非蘊攝耶答界品第一頌曰蘊不攝無為義不相應故同論云三無為法不可説在色等蘊中與色等義不相應故謂體非色乃行非識亦不可説為第六蘊彼與蘊義不相應故聚義是蘊如前具説謂無為法非如色等有過去等品類差別可略一聚名無為蘊已上問以七十五法如何立十二處答十二處者六根六境其中五根五境十者色十一中五根五境也此名十處意處者心王也法處者有六十四法謂四十六心所十四不相應三無為并色中無表也問以七十五法如何立十八界耶答六根六境六識中六識界者心王一依六根起故成六識六境者依六根六境六識差別故根境識皆云界也問以七十五法如何分別三界繫耶答色十一中五根色聲觸并無表此九通欲色二界香味二境唯欲界繫也不通無色界處云無色故心王一通三界心所中大地法十大善地法十大煩惱六小煩惱憍不定中貪慢疑三此三十通三界小煩惱中諂誑二不定中尋伺二此四在欲界初禪不通二禪已上大不善二不定中惡作睡眠嗔煩惱中除諂誑憍三餘七此十二唯欲界繫不通色無色不相應中得非得同分命根四相此八通三界滅盡定唯在有頂下界無無想定無想果唯在第四禪名句文若隨語繫唯在欲界初禪若隨身繫通欲界并四禪三無為不隨界繫法故三界外也問以七十五法如何分別有漏無漏耶答色十一中無表一通有漏無漏餘十色唯有漏也心王一通有漏無漏心所中大地法十大善地法十不定中尋伺此二十二通有漏無漏餘二十四心所唯有漏也不相應中得四相五通有漏無漏所餘九唯有漏也三無為唯無漏也問有為無為分別何答七十五法中除三無為餘有為也問以七十五法如何分別四諦耶答有為法中以有漏物立苦集二諦有為法中以無漏物立道諦三無為中以擇滅立滅諦虛空非擇滅非四諦攝婆沙云若法是苦是苦因是苦盡是苦對治者世尊立為諦虛空非擇滅非苦非苦因非苦盡非苦對治者是故世尊不立為諦已上問於心所中諸煩惱中幾本煩惱耶答十隨眠是本煩惱也十隨眠者五見疑無明貪嗔慢五見者一身見計我我所二邊見計斷常三邪見撥無因果四見取見劣謂勝五戒禁取見非因道妄謂因道此五見大地法中慧一分也頌曰我我所斷常撥無劣謂勝非因道妄謂是五見自體已上問以本煩惱十隨眠如何分別九十八隨眠耶答苦諦下十五見疑無明貪嗔慢集諦下七邪見見取疑貪等四滅諦下七如集諦道諦下八集諦七加戒聚取四諦下合三十二見惑也修惑四貪嗔慢無明已上三十六欲界煩惱也頌曰十七七八四色界三十一五部四諦修道各除嗔無色三十一如色修故諦諦可云九六六七三於本煩惱三界見修二惑合九十八隨眠也八十八使見惑者此九十八隨眠中除修所斷十所餘八十八也三界四諦下欲界三十二色界二十八無色界二十八也是名迷理惑迷四諦理起煩惱故修所斷十者欲界四貪嗔慢無明色界三無色界三貪慢無明退名迷事惑迷事相起惑故八十一品修惑者此貪嗔慢無明四煩惱欲界四色界三無色界三隨所應三界九地各有九品故九九八十一品九品配當如常四煩惱九品者四九三十六品三煩惱九品者三九二十七品也上二界同合上上品乃至下下品同故云九品也三界九地者一欲界五趣地五趣者地獄傍生鬼人天也此一地名散地無禪定故二離生喜樂地初禪三定生喜樂地二禪四離喜妙樂地三禪五捨念清淨地四禪第二三四五四地色界也六空無邊處地七識無邊地八無所有處地九非想非非想處地第六七八九四地無色界也色界無色界八地名定地有禪定故也問於三界六識分別何答欲界具有六識色中初禪有眼耳身意四識除鼻舌二識二禪已上乃至無色界唯有意識問何以二禪已上無五識耶答五識必尋伺相應行相粗動二禪已上寂靜地尋伺無故無五識也問五受六識相應㨾何答苦樂五識相應憂喜意識相應捨六識相應也但第三禪樂意識相應問何故菩樂限五識憂喜限意識捨通六識耶答苦樂無分別憂喜有分別捨通有分別無分別故五識無分別識苦樂相應意識有分別識憂喜相應捨通分別無分別故六識相應第三禪意識極悅無分別故樂受相應也頌曰身不悅名苦即此悅名樂及三定心悅餘處此名喜心不悅名憂中捨二無別問五受三界九地分別何答欲界五受具有色界中初禪有三受一喜受意識相應二樂受眼意身三識相應三捨受眼耳身意四識相應二禪有二受一喜受意識相應二捨受意識相應三禪有二受一樂受意識相應二捨受意識相應四禪已上乃至有頂唯捨受地故無喜樂受四禪已上寂靜地故粗動喜受無之喜樂者粗計物問就斷八十八使見惑八十一品修惑三賢四善根見道修道無學道并四向四果廢立何答於此教有三乘一聲聞二獨覺三佛也一聲聞中三賢者一五停心停心者心直停一慈悲停心治嫉妬於親疏衆生不起惡心二數息停心治覺觀散亂衆生數息散心三因緣停心治愚癡觀十二因緣始終失愚癡心四不淨停心治貪欲觀身不淨停愛執心五念佛停心治障道觀佛六根六境六識止障佛道心二別想念處觀四念處治四顛倒四念處者亦云四念住一身念處觀身不淨治淨顛倒二受念處觀六識受皆苦治六道樂顛倒三心念處觀六識所愛善惡法皆無常治常顛倒四法念處觀色心諸法非我離執著治我顛倒三總想念處總身受心法同時觀破一切四顛倒此名外凡位四善根者一燸法者聖火前相故名為燸具觀四聖諦修十六行相雖退斷善造逆墮惡道無久流轉必至涅槃二頂法者在進退兩際如山頂故或退位中此為頂故名頂法位亦觀四聖諦修十六行相謂一苦諦下四苦空無常無我一苦行相者五陰是苦本四相遷流逼迫故受苦觀二空行相者五陰離時有合時有一相異相念皆虛無故空觀三無常行相者五陰剎那剎那生滅故無常觀四無我行相者五陰不可執著五物假和合觀二集諦四因集生緣一因者煩惱種子種子生一切苦果本故二集者煩惱有漏果和合招集苦故三生者煩惱所造之業生苦故四緣者煩惱惡業為緣苦果報生故生緣等觀三滅諦四滅靜妙離一滅者種種苦煩惱五蘊相續皆斷盡故二靜者貪嗔慢三火息故三妙者無諸煩惱衆患故妙四離者解脫世間生死有漏衆災故離妙等觀四道諦下四道如行出一道者四念處身受心法四正斷一令未生惡不生二令已生惡滅三令未生善生四令已生善增燸法修之四神足一欲神足二勤三心四觀頂法修之五根五力一信根二精進根三念根四定根五慧根根增長名力世第一法修之八正道分一正見二正思惟三正語四正業五正命六正精進七正念八正定聖位修之七覺支一擇法二精進三輕安四念捨六定七慧修道修之等三十七功德能通正理故二如者無漏功德叶正義非顛倒故三行者三十七品功德能趣向涅槃故四出者出生死三有界故此頂善根位修如是觀設雖有退等都不斷善根略頌云苦空無常無我苦因集生緣是集諦滅靜妙離是滅諦道如行出是道諦已上問四諦各名苦集滅道何答光記云四諦各有四行何故各一行標名解云婆沙七十九云復次苦相不共唯有漏法是苦非餘故名苦諦非常等三是餘共相謂非常相三諦皆有空非我遍一切法故此不名非常等諦復次集相但於有漏法有招集生死非無漏故因生緣相無漏復有以聖道亦名因生緣故集不共故立為諦名是故世尊但名集諦復次滅名不共故立諦名滅名唯顯究竟滅故靜名亂定妙離亂道故不名為靜妙離諦復次道名唯顯趣涅槃故立諦名如亂正理行通有漏出通涅槃名故此不名如行出諦廣如彼釋已上三忍法位者以智忍可四聖諦最殊勝故下忍具觀四諦修十六行相於三惡趣得非擇滅中忍位七周減緣二十四減行謂上二界四諦合為緣行下界四諦為緣行上下八諦歷七周二十四減緣行也緣減下苦行減八諦本諦一出二行三如上道一周四出五行六如下道二周七離八妙九靜上滅三周十離十一妙十二靜下滅四周十三緣十四生十五因上集五周十六緣十七生十八因下集六周十九無我二十無常二十一空上苦七周二十二無我二十三無常二十四空下苦已上上忍一行一剎那觀欲界苦下一行也四世第一法者此有漏故名為世間於世間法中此最勝故名第一唯觀欲界苦一行一剎那此位無間必入見道也頌曰燸必至涅槃頂終不斷善忍不墮惡趣第一入離生已上此三賢四善根見道加行位也此名七方便位見道者欲界上二界四諦上二界合緣上下八諦下八十八使見惑斷之有八忍無間道八智解脫道其十六心中前十五心名見道見無始已來未曾見四諦理故名見道頌曰忍智如次第無間解脫道前十五見道見未曾見故十六心者第十六心修道攝一苦法智忍二苦法智此二緣欲界苦三苦類智忍四苦類智此二緣上界苦五集法智忍六集法智此二緣欲界集七集類智忍八集類智此二緣上界集九滅法智忍十滅法智此二緣欲界滅十一滅類智忍十二滅類智此二緣上界滅十三道法智忍十四道法智此二緣欲界道十五道類智忍十六道類智此二緣上界道此十五心離煩惱故云無漏八十八使見惑者欲界四諦下總合有三十二煩惱謂苦諦下有十貪嗔癡慢疑身見邊見邪見見取見戒禁取見集下七貪嗔癡慢疑邪見見取見滅諦下七如集道諦下八貪嗔癡慢疑邪見見取見戒禁取見色界四諦總合有二十八苦諦下九貪癡慢疑身見邊見邪見見取見戒禁取見色無色無嗔故略之集諦下六貪癡慢疑邪見見取見滅諦下六如集道諦下七貪癡慢疑邪見見取見戒禁取見無色界四諦總合有二十八總如色界欲界煩惱強盛也上二界煩惱不熾盛矣以十五心無漏之智十五剎那之間斷八十八使之智慧云智忍斷煩惱所得之功德云類智矣此位有二聖一隨信行純根隨人教修行入見道人也二隨法行利根自見聖教悟入見道故云隨法此位修八聖道修道者從第十六心至有頂第九無間道金剛喻定是修道位也此位中斷三界九地九九八十一品修惑也斷品品各有無間道解脫道八十一品無間道八十一品解脫道合一百六十二心也其百六十一心修道第百六十二心有頂第九解脫盡智無學道也九品道斷九品惑上上上中上下中上中中中下下上下中下下下下品道斷上上品惑乃至上上品斷下下品惑無學道者有頂第九解脫道以後斷三界見修二惑已所作已辦故云無學道也四向四果者一預流向者見道十五心位也此約次第證人為超越證人一來向不還向也於異生位斷六七八品一來向也斷下八地不還向也異生凡夫位斷下八地惑五部合斷也五部合斷者四諦修道五部煩惱各九品五部上上品合一無間一解脫斷乃至下下品亦如是九無間九解脫斷云五部合斷也有漏道斷以上地近分道斷下地煩惱故不斷有頂惑也有漏智以六行觀斷六行觀者無間道觀下地作粗苦障行相解脫道觀上地作靜妙離行相也頌曰具修惑斷一至五向初果斷次三向二離八地向三已上二一來向者斷欲修惑從一品至五品一來向也此中家家聖者有二一天家家天三人二天二人一人中得道二人家家人三天二人二天一天中得道九品惑潤七中上上潤兩生上中上下中上各潤一生中中中下合潤一生下三品共潤一生三品斷者三生家家上上品二生上中品一生上下品一生潤此四生惑已斷故受三生四品斷者二生家家中上品已上五生潤生惑已斷故受二生也頌曰斷欲三四品三二生家家斷至五二向三不還向者斷欲修惑第七八品此中有一間聖者七品斷八品斷人下三品共潤人天合愛一生已斷七八品故人天中受一生云一間也頌曰斷七或八品一生名一間此即第三向已上四阿羅漢向者斷初定一品至有頂八品皆阿羅漢向頌曰斷初定一品至有頂八品皆阿羅漢向四果者初果必不退後三果亦有退一預流果者初預聖流故梵云須陀洹見道位斷三界見惑第十六心位證之也二一來果者梵云斯陀含此云薄貪嗔癡也住此果若不斷下三品惑後往天上一來人間而槃涅槃故名一來果也三不還果者梵云阿那含已斷欲界修惑必不還生欲界故名不還不還果有種種差別謂七種九種等也七種不還以初後名惑五種那含一中般那含者欲界沒住於色界住中有位般涅槃故二生般那含者生色界已不久起聖道斷餘煩惱般涅槃故三有行般那含者生已長時加行勤修由多功力方般涅槃故四無行般那含者生已經久無加行懈怠由多功用般涅槃故五上流般那含者是上行義謂於色界要轉上生方般涅槃故六無色般那含者欲界沒不生色界超生無色般涅槃故七現般那含者不生上界唯住欲界於現身中得涅槃故矣上流有二一樂慧二樂定一樂慧者即有雜修生色究竟其雜修靜慮總為三事雜修者中間有漏前後無漏以間雜修故名雜修由雜修五品生有五淨居一下品二中品三上品四勝品五上極品問中間有漏等者何答於上二界初禪有根本近分二根本離下地煩惱得無漏定近分伏下地煩惱得之但初禪近分云中間禪勝根本有尋有伺定無尋故云中間定唯伺二禪無尋無伺定不及捨受相應亦云未至定從欲界散地未至上界定地根本故名未至歟已上無漏二禪根本無漏喜受相應近分有漏捨受相應三禪本無漏樂受相應近分有漏捨受相應四禪根本無漏捨受相應近分有漏捨受相應五空無邊處根本無漏捨近分有漏捨六識無邊處根本無漏捨近分有漏捨七無處有處根本無漏捨近分有漏捨八非想非非想處根本有漏捨近分有漏捨問欲界散地故無無漏定理在不疑上七近分并有頂根本何故無無漏答上七近分劣未至定故無無漏有頂昧劣故無無漏樂慧上流有三一全超者梵衆天沒生色究竟頓超中間故名全超二半超者梵衆天沒或超一天乃至十三天沒生色究竟皆云半超非全超故三遍沒者於十六天遍受生故聖者必不生大梵天處僻見處故一道故二樂定者即無雜修能生有頂樂定那含雖生無色經色生故色界攝矣九種不還頌曰行色界有九謂三各分三業惑根有殊故成三九別中般三一速般二非速般三經久般生般三一生般二有行般三無行般上流三一全超二半超三遍沒七善士趣頌曰立七趣善士趣中上流無別於前九種不還不開上流經生聖者有二一欲界經生不往餘界生厭心強故二色界經生可生無色界厭心劣故十八有學者謂四向三果除羅漢果為七及隨信行鈍根隨法行利根信解鈍根見至利根家家從家至家一間唯一生及一品不還果為間隔故五種不還也四阿羅漢果者此云應供亦是殺賊不生之義能斷有頂第九品惑所作已辦不受後生無學聖者有九種差別九無學者一退法者遇退緣退所得也二思法懼退失恆思自害也三護法者於所得法能自防護也四安住法者無勝退緣不退無勝加行不進也五堪達法者性堪練根速達不動也六不動法者不為煩惱所退動故也已上六種羅漢學根凡同也於此六種性前五是退位總名時解脫後一不退名不時解脫七不退法者非練根得名為不退練根所得名為不動也八慧解脫者依慧力離煩惱障也九俱解脫者兼得滅定離解脫障此二即是時解脫不時解脫攝也已上二十七賢聖十八有學九無學問三乘修行得果差別何答一聲聞積三生六十劫行得四向四果之益聞佛所説四諦聲教故云聲聞二獨覺此有二種一部行獨覺前聲聞前三果或四善根人後得第四果雖佛邊獨悟故名獨覺部黨如聲聞二麟喻獨覺經百劫修行唯一出世觀十二因緣無師獨悟獨出世如麒麟一角故云麟喻如佛一座成覺也三佛三祇百劫修菩薩行於菩提樹下一座成覺先五部合斷斷下八地惑後於樹下入見道八忍八智斷有頂惑九無間解脫三十四心斷結成道從燸法或不淨觀一座成覺三祇者初僧祇三賢五停心總別等位發四弘願與四無量心從過去釋迦文佛至于罽那尸棄佛供養七萬五千佛行六度第二僧祇者燸法位發四弘願與四無量心從尸棄佛至于燃燈佛供養七萬六千佛行六度第三僧祇者頂法位發四弘願與四無量心從然燈佛至于毗婆尸佛供養七萬七千佛行六度矣百劫者忍法位自行位下忍種三十二相因中忍唱前五相一上天二下天託胎三出胎四出家五降魔上忍唱後三相六成道謂同居教主劣應身老比丘像七轉法輪謂悅諦緣度法八入涅槃謂四枯雙樹世第一法位起三十四智斷三界見思以八忍八智斷八十八使以九無礙九解脫斷八十一品思惑光寶二法師者彼宗抄物云釋新俱舍論普光法寶神泰圓暉云云若什門等者羅什有四弟子道生僧肇道融僧睿聲聞三生者俱舍論二十三云極速三生極遲六十劫聲聞修行又云極速四生極遲百劫獨覺修行又云聲聞三生獨覺四生非要利根亦通鈍根若極利者要經六十要經百劫已上此宗法相宗人傳來四分律夫波羅提木叉者諸佛要道佛家之前兆五乘之梯橙七衆之資糧也然則佛涅槃之夕阿難受教訓於樓豆大師臨般之後際示末師於木叉依之經説無戒之輩不受半錢一粒之供養不履精舍結界之地實破魔界之鐵城親入佛家之法宮唯在戒律矣此宗律者以五部律為所依此律藏以摩訶僧祇律而為根本部摩訶僧祇律者八十誦律是也優婆離尊者一夏九十日之間八十度登高座誦故名八十誦律也就律藏相承有橫竪五師竪五師者迦葉阿難末田地商那和須優婆毱多如來滅後百年之間相承傳持法藏化度衆生橫五師者優婆毱多門下五人異見忽起師力衰老不能和會遂令其教法分五部宗五部者一曇無德部曇無德此云法正從人為目此師所立稱從行名空宗今世所流布律藏是也二薩婆多有部薩婆多此云有亦名一切有從計為名律名十誦也三迦葉遺部迦葉遺此云重空觀從行為目律名解脫此有戒本律不傳之四彌沙塞部彌沙塞此云不著有無觀從行為目律名五分五婆粗富羅部婆粗富羅此云著有從計為目戒本為不傳律依大集經出之大集經云五部雖各別不妨諸佛法界涅槃已上此中漢土翻傳其廣文四宗也所謂僧祇十誦四分五分也僧祇律者根本上座具含五部佛滅後百年間唯一部無五部異大集經云廣博遍覽五部經典是故名摩訶僧祇已上戒疏云通含五意故是總也此云大衆所謂迦葉等五百無學結集故已上摩訶僧祇此云大衆已上根本總標又明人法者先人者有七衆一優婆夷二優婆二衆共五戒盡形壽八齋戒六齋日等三沙彌尼四沙彌二衆共十戒二無後具足戒五式叉摩尼具學六法六比丘尼戒本三百四十八戒智論五百戒次明法者初從三歸終至一切戒矣先三歸者有二一翻邪三歸二受戒三歸也翻邪三歸者靈芝云翻邪三歸凡夫無始繫屬於魔作法歸投悕求救護若但受三歸有善無戒若受衆戒必兼三歸已上受戒三歸者五八十具之戒皆三歸為戒緣而發得戒發七支戒善也故淨影云受持三歸在家戒也已上次一切戒者五戒為始五戒者律名句云新學大師一不殺生二不偷盜新云不與取三不邪淫新云欲邪行不犯非境非道非時非處等四不妄語新云慮誑語五不飲酒已上優婆塞戒經云五戒者天下大禁忌也若犯五戒在天則違五星在地則違五嶽在方則違五常在身則違五藏如是等世間違犯無量若約出世犯五戒者則破五分法身一切佛法所以者何一切大乘尸羅根本若犯五戒則不得更受大乘戒已上八戒者五戒如前六不塗飾鬘歌舞視聽七不能坐高廣嚴麗座八不非時食也此二種名近事戒光記云梵云塢波素迦唐云近事素是男聲舊云優婆塞訛言近事者婆沙一百二十三云問何故塢波素迦親近修事諸善法故謂彼身心狎習善法故名塢波素迦有餘師説親近承事諸善士故復有説言親近承事諸佛法故廣如彼釋梵云塢波斯迦新唐云近事女釋名如前斯是女聲舊云優婆夷訛也已上法界次第云佛為提謂等在家弟子受三歸已即受五戒為優婆塞已上十戒者律名句云一不殺生二不偷盜三不邪淫四不妄語五不綺語新云雜穢語六不惡口新云麁惡語七不兩舌新云離間語八貪欲九不嗔恚十不邪見已上此亦在家戒矣六法者律名句云一摩觸二盜四錢三殺畜生四小妄語五非時食六不飲酒已上式沙摩尼者佛在世有長者妻有身後夫依歎憔悴不覺有身而出家後月滿生子依之女人請出家先二年之間令學六法也三百四十八戒如戒本五百戒之名言如智論二百五十戒者開五篇成數四重者梵云波羅夷此翻斷頭犯此戒人今生久不得聖果故如斷頭人亦云邊罪人佛海邊外被捨縱雖懺悔成學悔沙彌永不復比丘僧位也此戒有四殺盜淫妄殺生以殺人為體盜業以五錢已上為體淫欲以過皮為體妄語以未得謂得大妄語為體僧殘者梵語云僧迦婆尸沙謂僧伽僧也婆尸沙殘也是梵漢並舉犯此戒人如喉咽殘此戒有十三摩獨考獨恐觸歟人於女人前説男女事乃至故漏失等也不定者突吉羅攝也此戒有四壁圍繞內僧為女人説法有伴非犯無伴即犯故云不定也捨墮者梵云波逸提此翻捨墮犯此戒人捨三乘果位墮惡道故云捨墮此戒有三十用未説淨衣離衣鉢等也懺悔者波逸提攝也對首懺悔法故云懺悔也亦云單對單對僧一人懺悔故此戒有九十小妄語綺語惡口兩舌飲酒非時食掘地拔草打比丘打畜生殺畜生等也衆學者梵云突吉羅此翻衆學亦云應當學戒相微細非學者難知故云衆學文云齊整著內衣應當學齊整著三衣應當學已上此戒有百一切雜談戲笑妄語乃至五益貪嗔睡眠掉舉疑是散亂心被侵知過不止皆犯突吉罪故犯一切諸戒時先犯此罪文云重緣始覺即入犯過已上言一念起處惡念不止二念相續云犯過也疑云二念相續處即犯戒大乘心地戒云何有差別哉答文云重緣等不覺起處初一念許也第二念相續為犯大乘戒初一念為犯故大差別文云微縱妄心即成業行滅諍者突吉羅攝也此戒有七就出世法門是非相論處以多人語為是當拒不用犯此戒也提舍尼者梵語此云性口罪此戒有四衆中自受美食他與粗食乃至非親里比丘尼受衣等也偷蘭者具云偷蘭遮此翻大障善道犯此戒人永不得三乘人善種故也此戒波羅夷方便也此有上中下且就盜物一錢下品二錢中下三四錢上品乃至斷食斷鹽無言等皆此戒攝也又此戒中有破僧罪名果偷蘭非波羅夷方便也已上戒相委見刪定戒品三百四十八戒者波羅夷八謂一殺二盜三四妄五摩觸六八事律名句云一提手二提衣三入屏處四共立五共語六身相倚八共期已上七覆尼八隨舉苾芻矣僧殘十七不定二僧有尼無捨墮三十單對百七十八提舍八衆學百滅諍七已上三百上四十八比丘尼戒二百五十戒者四重四僧殘十三不定二捨墮三十懺悔九十衆學百滅諍七提舍四已上二百五十僧戒若約戒法於業體總云六聚謂波夷羅燒熱地獄僧殘大叫喚偷蘭遮叫喚波逸提衆合提舍尼黑繩突吉羅等活若約果罪云五篇謂波夷羅僧殘波逸提提舍尼突吉羅矣若約行相云七聚謂波夷羅僧殘偷蘭遮波逸提提舍尼惡作惡説矣問就戒律大小次第何答依善戒經瓔珞經先受小戒後受大戒謂五八具足戒如此次第此中具足戒者五八十二百五十五百戒皆一一不缺故云具足戒如此戒受持畢後受大乘戒也故瓔珞經云若受菩薩戒先發大乘心受優婆塞乃至大比丘戒若不受比丘戒受菩薩戒無有是處已上同善戒經大戒者三聚淨戒也一攝律儀戒律者梵云毗尼即制止義謂防護身語七支二攝善法戒謂修習一切善事十力無畏等一切佛法三饒益有情戒謂教化衆生入於佛道中瓔珞經律儀戒十波羅夷攝善謂八萬四千法門攝生謂慈悲喜捨化及衆生令得安穩已上問此大乘權實中何答實大乘戒體也爰如來出世戒唯一乘但寂滅道場小機不契故降迹於鹿園從大開流出五八十具戒律根通示之祖師云始從鹿園終至鶴林隨根制戒乃有萬差已上梵網經隔出持美彰於上乘鹿園漸施暫為安於小智善戒經從小入大猶未了偏即圓鷲嶺開權使殊途同轍鶴林扶律點異味悉是醍醐絶執大乖小之疑息是妙非粗之謗決聲聞法暢出世之本懷唯是二經法花涅槃是為了義已上見法花涅槃涅槃扶律談常戒法花開權顯實律明鏡也已上佛意開會戒四分律者戒疏云四度傳文盡所詮相故云四分已上初分二十卷從序至二十卷比丘戒本并緣起時處廣解持犯開制等相故有二十卷第二分十五卷從二十一至二十八卷尼戒本從二十九至三十二受戒揵度從三十三至三十五卷説戒揵度第三分十四卷總有十六種揵度三十六安居揵度三十七自恣揵度三十八皮革揵度三十九至四十衣揵度四十一二半卷藥揵度四十二半卷迦絺那衣揵度四十三半卷拘睒彌揵度四十三半瞻波揵度四十四卷訶責揵度四十五卷半人揵度四十五卷半覆藏揵度四十六卷半遮揵度四十六卷半破僧揵度四十七滅諍揵度四十八尼揵度四十九法揵度第四分十一卷至終即房舍雜二揵度并五百結集七百結集調部毗尼毗尼增一等五十至五十一二房舍揵度五十三雜揵度五十四卷半五百結集五十四卷半七百結集從五十五至五十七調部毗尼從五十八至六十卷毗尼增一也矣諸家教相同異集疏家鈔家兩家者疏家者指第一法礪疏十卷為疏家鈔家者指第三道宣律德事鈔等極樂寺守一云南山祖師究大聖示現之本懷得二經開扶之深趣教弘律藏旨在圓宗上品發心作受戒樞機真如妙觀為出家學本立懺無違於唯識奉持咸契於圓修示迹於三生垂言一教並令託事觀理要在理事以圓融挹流尋源方見源流之高遠搜玄義士宜體聖懷已上今抄有三家懷素開宗記非山王院相傳歟道宣律師作五大部鈔一行事鈔上有四卷於衆行明十三篇中有四卷於自行明四篇下有四卷於共行明十四篇二比丘尼鈔三卷分為六卷三十篇三毗尼義鈔上中二卷分四卷四段明義四含注戒本三卷疏分八八段明義五隨機羯磨二卷疏分八明八篇瞻病送終篇者出行事鈔下卷此宗如來滅後一千三百五十一年後秦姚興王弘始六年甲辰當東晉安帝元興三年此時罽賓國沙門弗惹多羅秦曰功德苑於秦帝安中寺譯出十誦律五十卷同國沙門佛陀耶舍秦曰覺明同弘始十年戊申譯四分律六十卷矣日本朗辨僧正傍使於遣唐副使從四位上大伴宿禰古麻呂船奉請唐揚州龍興寺鑑真和尚令來朝四分律一部六十卷此時將來也次年天皇聖武帝於東大寺受具足戒也大宋高僧傳十料考料恐料譯經篇者頭釋經一例事譯一代諸經故云譯經譯者釋義也翻梵語作漢語變梵字作漢字且如華嚴者罽賓國三藏賜紫沙門般若宣梵文東都天官寺沙門廣濟譯語西明寺賜紫沙門圓照筆受保壽寺沙門智柔智通回綴成都府正覺寺沙門道弘潤文章敬寺沙門鑒靈潤文大覺寺沙門道章校勘證義千福寺沙門大通證禪義大原府崇福寺沙門澄觀評定千福寺沙門靈邃評定貞元十二年六月十日奉詔於長安崇福寺同十四年二月二十四日譯畢進上餘經例爾義解篇者南三北七諸宗如前習禪篇者頭禪宗事如慧可大師六祖等彼宗意立十心判教內教外之差別日本覺阿相傳宗門名目云此心有十心一佛心禪宗二心王心真言三即一心天台四圓融心華嚴五畢竟心三論六圓成心法相七戒定心律宗八偏真心成實九建立心俱舍十淨土心淨土宗第一佛心者夫不立文字宗不立教時本無煩惱談不論斷證元是菩提為宗見性成佛為期不隨有佛教不求無佛法超有相無相上毗盧頂越前念後念住天地之外悟道得法輪中巧也見性得果胸中妄也心中本無一物也私云此段宗門總標也對後第二第三乃至第十心故云第一已下舉宗門諸位為公案次第位失智亡情可見下諸位矣向上者堪在群象外卓立萬機先天地未開無善惡佛祖未生萬法無咎此時真空不空妙有不有無邪正無迷悟無三世無十方無東西無南北劫前運步世外橫身無衆生削迷無諸佛失悟忽然住而不住大虛身任運而居不居法界心無修者無一喝無問者無一棒無法也無生也淨而明虛而靈故向上一句者天地不開無一物之時也佛祖不來諸法不説之時也無問無答向下者萬象總持句諸塵三昧門心心法法成佛事花花葉葉受春恩諸法相不空寂妙存之性非有無一塵飛巨海片雪點紅爐離見聞覺知有智非分別心離地水火風有身非和合相隨呼而應虛答有無盡之音對像而形圓鑑在不私之照雲無心而間天無際而能寬道無靈而普應神無像而常安隨之也不見去遠迎之也不見來端有志忘諸軀無心契諸己真乘無門號佛佛道同面壁有句號祖祖心空默默有得靈靈無依真見無我真得無名全超影響非塵情了心非相了相非心天地開後佛祖來後一物不拘一棒不當直乘鐵船馳虛空海鞭泥牛到佛祖頂理智者即一如於萬像之上住三昧於諸塵之中窮萬化之淵源得一真之住處念念舉緣一切覺心心永斷諸分別既一心示萬像萬像示一心不近不遠極深而乾坤同其覆載而日月同其照臨心明潔若珊瑚之樹體相茸馨如薝蔔之林大用自在也獲輪王髻寶正聲和合也奏師子絲拳互休去歇去絶言也廓無所依妙無所住轉歷歷機運綿綿步神遊方外靈臺道契琢中虛空故盡是之修求法喝非之始明心舉大諍小説權求實只貯心底妄思見性得果聚眼中境執悟道得法教內求佛是妄佛也教外求法是塵法也離內不可生智解離外不可求大悟內外猶立境之塵善惡忽起妄之要也直佛處不親有佛臨有佛處不疏無佛真證不可以言傳妙契不可以言到不能不所機管者木人詠花泥牛食土石兒飲砂鐵童玩火天地未開可説無法佛祖未來可示無機任運無一物湛寂無高下欲言其詞虛空海欲悟其心一物無大疑者丹霞燒木佛南泉斬貓川老殺有佛唐老擲無佛八萬教標月指十方佛起妄塵湛湛空寂之岸自頽殺魚岸有何罪歷歷法然之風吹花供佛花有何善見泥牛為友念無咎乘木馬為海心含月明月為食身體虛空也雲霧為衣寒溫無煩朗一念不見有自極十方不見有他大悟者自果界墻便見自他是礙三界三界豈曾礙儞一法若有毗盧墮在凡夫萬法若無普賢失其境界死中常活不被礙空活中常死不被礙物在裡不失照在外不涉緣在這邊不被轉諸法在那邊不被拘寂寞也有不是有無不是無默時一字一點缺無缺少説時一言一句曾沒分外以法為法也能郭擲而絶方隅以智為身也能混融而忘此彼以本際之光洗長夜之暗以法界之智破塵劫之妄生滅紛紛而至真淨之處真空不空妙有不有是萬像生滅之根即二儀造化之母方隅不可定其居劫數不可窮其壽大用者生心即乖動念即錯超毗盧越釋迦來淨妙法身得金剛眼睛獨立卓卓不倚一切自照靈靈不隨諸教無為住非住融古今於一時會凡聖於當處內不動外不亂實相是無相之相真心是無心之心真得是無得之得真用是無用之用空空絶迹一點不昏湛湛忘言一機自轉釋迦彌勒到箇時節不敢喚師達磨老盧到箇當處不敢稱祖身非塵取卑卑妙存心非情緣冥冥獨覺其體也出諸障礙其用也得大自在無去無來非顯非晦應色應聲亡存亡亡佛腳下步衆生掌內納隨所放光明隨呼成問答存諸智大徹者心無所寄形無所倚足無所履言無所謂不可見而名模不可得而摩揣森羅等其用大虛同其體離見聞覺知有智非分別心離地水火風有身非和合相天地之外運步佛祖之前橫身出有無之外超思議之情離取捨之心無相緣之塵一棒者舉一棒不得與三十棒狗子無佛性師示弟子公案如何是庭前柏樹枝如何是狗子無佛性又問者猶一棒又問猶一棒去能去所空寂一喝者無能無所問者云答也閉口無言撥手無疑一喝體如何止善惡與一棒知始終與一喝天地一時一棒也方隅一時一喝也一棒者法定相絶形之時也一喝者心定相失念之時也故一棒為悟道與之悟道向上之時無之一喝為見性與之見性向下之時無之不投一棒之時無自他無能所不示一喝之時無心念無淺深可知兔角十丈沙油千石不投一棒泥牛飛虛空不示一喝木人忘一華本來面目者諸佛本源衆生本有也本源者水也本有者冰也水冰全無二物我不見有分外之他他不見有分外我他不外我則聲色磨消我不外他則見聞情遁法法又法法也佛佛又佛佛也步超有無住般若則心心歷歷離是非法為法此法則心之門也踏超自他佛為佛此佛則身之使別離是非居法身則念念靈靈本來面目我等本有之體不求有佛不住解脫不願天堂只能心間超佛祖三千考千恐世歟十方成虛空界身虛空界身則法也法身則我未生之前體法身説法聞聲便悟道應化感應見色必明心明月之船乘明月琉璃之臺重琉璃泥牛之食土木馬之升木心之心則悟之心也念之念則迷之念也迷念者非悟心悟念者非迷心離心念念法法佛心鏡如如如虛空萬法湛湛似清水切斷終了者切念斷心終法了佛絶言絶慮棒去喝去身亡體亡非內非非內非外非非外非空非假非中非理非智斷大斷小止權止實非坐非禪無一指無一喝無工夫無公案無用無相天地開不開本不言佛祖來不來本不謂向上言中巧向下法中術歷歷心內無一物可用何巧明明胸中無遮礙可寄誰術況理智佛祖之喘也機管道者之敵也擲尊無種者得犬野干之身可削智者之名有尊人擲之白雲深處獨步獨住閉柴門忘年月自看青黃知時遷古寺之鐘聲告旦暮一輪之明月勸坐禪聖教履之佛祖床之天地枕之陰陽食之寒溫衣之天地已前者無一物悟多物是號悟道人名得法者佛祖已後者有多物悟一物是號見性人名得果者教內者八萬教也是標月指天地之上塵毛爪上之土也教外者教外別傳不立文字直指人身見性成佛示一切善惡都莫思量心內者教中心也學教得法人心也是未出輪心也一棒一喝之處擬疑心外者教外心也無師無示無教自悟人已上覺阿唐相傳書私云此宗意教外為宗旨以花嚴并大佛頂宗為所學大佛頂宗者謂首楞嚴經圓覺經金剛經起信論等三經一論是也就中東福寺開山佛地師已來禪首楞嚴禪釋論之所謂新書等是也此宗如來滅後一千四百七十五年梁武帝普通元年庚子當後魏孝明帝正光三年此時達磨大師西來而遇梁帝與魏主二主暗然不知不至此法終傳慧可大師於此法日本人王第五十代桓武天皇治二十八年延曆二十三年傳教弘法入唐奉值道邃慧果始傳天台真言并此宗歸朝矣問諸宗立教教相何答花嚴以法相為地位之教相天台以俱舍為才覺教以三論為宗旨之教相三論攝地論法相攝攝論真言以釋論菩提心論為所依之論以法相為才覺四分律宗以俱舍為聲聞戒之教相以法相為菩薩戒之教相天台菩薩戒以四分律中菩薩戒為戒相以中道實相之妙體為宗旨矣寂滅道場之春天以櫻梅桃李之花潔十佛寶處王舍城之夏池波靜開內證無作之蓮花一念三千之匂薰圓行之袖諸法靜而遁衆患立法於八不廣離一異去來之情色空一致不滯巨海波自寂寂天月白明三性各別雖隔情執廢詮談旨道場增圓成實之玉光性相異體之窗前不即不離之鏡祥也圓融無作之戒光照一實中道之山謗法闡提之露消五十二位之瓔珞巍巍堂堂十界一圓影豐金剛胎藏諸尊雙光行者心中歷歷舉萬象一端佛印自表風氣出一韻十界陀羅尼鹿園攝機床以五比丘因説諦緣度之法與三乘以戒定慧之三學為宗鈔家所立之大戒雖開會之戒動荷權之名戒相全與小故國寶儒者舉諸聖於十料考料恐科明贈德於末代以使法器成緣教家之十心且判自他共不可定量總顯密權實教內教外聖道淨土各存時機之益判教敢莫令乖經論違佛意矣爰愚僧良山之昔所侵重病為既退學文春陽之日長日長而間間兮內有病氣心倦外感長日冷時不意披見此初學抄諸宗章疏之目録連珠玉羅列一代八萬之經緯織宗家立義於是懸泡沫之身未來類電影之質于過去吁人身難受如爪上土佛教希值似蘊曇花今度不驗者未來無量劫期何時如斯思定日而任身命於天運投情志于佛境全不綺世事欲雜身於聖教飛神睦三國之聖人遂不懈螢雪之窗明暮讀誦之功入三部妙典偏此抄恩德也為此報謝故欲消釋唯題額然本抄意深廣也豫所學淺狹也雖勘諸文亦不足惟夥適所勘還誤繁何備上明若如豫後輩加一見者冀添削之矣願回此功德遍通於法界自他至安養證菩提妙果應永二年十一月中旬始之同三年甲申三月三日功了春秋五十二歲拭老眼疏之期淨國沙門良山題額集別紙良山記問楞伽經二云大慧報佛説一切法自相同相故以執著虛妄體相因分別心熏習故大慧是名分別虛妄體相大慧是名報佛説法之相大慧法佛説法者離心相應體故內證聖行境界故大慧是名法佛説法之相大慧應化佛所作應佛説施戒忍精進禪定智慧故陰入界八解脫故建立識相差別行故説諸外道無色三摩拔次第相故大慧是名應佛所作應佛説法相已上金剛頂瑜祇經云金剛遍照如來以五智所成四種法身於本有金剛心殿中與自性所成眷屬乃至微細法身祕密心地超過十地身語心金剛乃至諸地菩薩無有能見俱不覺知已上分別聖位經云自受用佛從心流出無量菩薩皆同一性謂金剛性如是諸佛菩薩自受法樂故各説自證三密門已上又云真言陀羅尼宗者一切如來祕奧之教自覺聖智修證法門亦是入一切如來海會壇受菩薩職位超過三界受佛教勑三摩地門具是因緣頓集功德廣大智慧於無上菩提皆不退轉離諸天魔一切煩惱及諸罪障念念消融證佛四種身謂自性身受用身變化身等流身滿足五智三十七尊不共佛法門此標宗大意然如來變化身於閻浮提摩竭陀國菩提道場成等正覺為地前菩薩聲聞緣覺凡夫説三乘教法或依他意趣説或依自意趣説種種根器種種方便如説修行得人天或得三乘解脫果或進或退於無上菩提三無數大劫修行勤苦方得成佛王宮生雙樹滅遺身舍利起塔供養感受人天勝妙果報及涅槃因此界表釋迦之教主得益不同報身毗盧遮那於色界頂第四禪阿迦尼吒天宮雲集盡虛空遍法界一切諸佛十地滿足諸大菩薩證明驚覺身心頓證無上菩提此表他受用身説法得益自受用佛從心流出無量菩薩皆同一性謂金剛性對遍照如來受灌頂職位彼等菩薩各説三密門以獻毗盧遮那及一切如來便請加持教敕毗盧遮那佛言汝等將來於無量世界為最上乘者令得現生世出世間悉地成就此説自性身自受用身説法及得益此等經文明三身説法差別淺深應化所説之顯教淺法身所説之密教深盡妙顯教所言斷心滅何答此問似深還淺且徹經文宜對賓士且徹經文者金剛心殿者瑜祇經云光明心殿大日經云法界宮會皆此報身內證圓滿時內證法身妙理萬法出生自在之德顯兹處云法界宮等故佛地論一云果相云何最極自在淨識為相謂大宮殿最極自在佛無漏心以為體相唯有識故非離識外別有寶等即佛淨心如是變現似衆寶等已上五智者佛地經五法同之謂此經法界體性智彼經清淨法界餘四智彼此全同四種法身者佛身之説相諸經論不同華嚴説十佛佛地論云十佛如華嚴亦云四佛一受用非變化自受用身二變化非受用變化身化地前類三亦受用亦變化他受用身化十地菩薩四非受用非變化法身金光明經説四種一化非應佛為物所現龍鬼等形不以為佛身名化非應二應身非化地前菩薩所見佛依定而見非以五趣攝名應非他即四善根所見一大千一應身也三亦應亦化諸聲聞所見佛身見相修成故名為應見人同類故名為化四非應非化佛真身前三化後法報楞伽經云一應化佛二功德三智慧佛四如如佛初一化身中二報身後一是法身佛地論七云或處説佛有二種身一者生身二者法身若自性身若實受用俱名法身諸功德法所依止故諸功德法所集成故若變化身若他受用俱名生身隨衆所宜數現生故已上般若論説二一真佛二非真佛初法身後餘二身六波羅蜜經説一身經云第一法寶即是摩訶般若解脫法身已上此等皆萬德圓滿果界上隨德德且説佛身品數故隨機上下見佛身異説處異矣對賓士者若顯密各別教主各別云者何故楞伽經三身説法文金剛頂分別聖位經文同引之耶亦佛身有何差別一佛説密教説會一切佛皆同可然一閻浮提內一時成正覺故顯密大小權實皆可同教可與隨機根佛於一體異隨根上下然則以一音令蒙萬機有之淨名經云佛以一音演説法衆生隨類各得解矣或以別法而令蒙別機有之六波羅蜜經云法寶者所謂過去無量諸佛所説正法及我今所説所謂八萬四千諸妙法縵乃至調伏純熟有緣衆生而令阿難陀等諸大弟子一聞耳皆悉憶持攝為五分一素呾纜二毗奈耶三阿毗達磨四般若波羅蜜多五陀羅尼門此五種藏教化有情隨所應度而為説之若彼有情樂處山林常居間家修靜慮者而為彼説素呾纜藏乳味令受持阿難陀等若彼有情樂習威儀護持正法一味和合令得久住而為彼説毗奈耶藏酪味令受持塢波離等若彼有情樂説正法分別性相循環研核究竟甚深而為彼説阿毗達磨藏生蘇味令受持迦多衍那等若彼有情樂習大乘真實智慧離於我法執著分別而為彼説般若波羅蜜多藏熟蘇味令受持曼疏笙利菩薩等若彼有情不能受持契經調伏對法般若或復有情造諸惡業四重八重五無間罪謗方等經一闡提等種種重罪使得消滅速疾解脫頓悟涅槃而為彼説諸陀羅尼藏妙醍醐味也令受持金剛手菩薩等此經文見伊王善逝雖一身而依痛機之器明投五味寶藏所被機緣雖萬差而依自乘之法顯得脫依果何云應身之釋迦不説密藏法身大日説陀羅尼而佛付不自在之失寶士所解釋迦不覺可不説密教大日覺可説陀羅尼若爾者亦大日可説有字陀羅尼而不可説無字陀羅尼教説之面計絶果界故但以天眼見經説問梵網經云我今盧舍那方坐蓮華臺他受用身周匝千華上復現千釋迦淨土大化身也一華百億國一國一釋迦穢土小化身也已上此經文三身各別見是亦分別聖位同之何一體三身云乎答先徹經文者梵網經説菩提樹下成佛入定定中往第四禪大自在宮放光攝衆還下菩提樹下出定今説梵網戒品但於最初成道同華嚴經於説相者少有異故太賢云大小乘機所見不同菩薩衆見初成佛已往第四禪大自在王宮放光攝衆事盧遮那聽心地品還來樹下出定而説十世界已上探玄記云今尋彼經梵網經也十一處説法六處同此彼云化樂天説十禪定初禪説十金剛心二禪説願三禪説十忍四禪摩醯首羅宮説心地法門不言重會普光及祇洹重閣已上六處者摩竭提國菩提樹下説十世界普光法堂説十信帝釋宮説十住夜摩天宮説十行兜率天宮説十回向他化自在天宮説十地法門一代化儀皆同之聖位經亦同之問梵網經説見受用變化別佛聖位經亦三身各別有何相違答自本隨機見故見別佛理也於果海堅勿執一佛別佛故華嚴經云普賢菩薩告諸菩薩即説偈言或見釋迦成佛道已經不可思議劫或見始今為菩薩十方利益諸群生或見久遠已涅槃或見初始成菩提或見壽命八十年或壽百千萬億劫已上此普賢菩薩嘆盧遮那德但就一代説教而於始成正覺之面且判三身業皆據機見也問付機見即各別三身三身各別故説教各別各別説教故大日所説陀羅尼勝報應所説顯教何乎答且徹陀羅尼之體宜對寶士陀羅尼有淺深高野大師陀羅尼義云問陀羅尼體者何物耶答且依始教者體性不同有依因出體即説是定有依能簡擇出體即説是智有依記憶出體即説是念有依可尋之出體即以所持之法名為總持基法師所説各據一義皆悉不相違依終教者智度論云以禪定得智慧果故智慧在菩薩心中名般若小乘人心名道品不忘人心中名陀羅尼云云依此文者陀羅尼體是智慧也圓教意而以緣起諸法為陀羅尼體問何故緣起法陀羅尼云解云一文中攝無量義文即多即一重重無盡如帝釋網珠故緣起法陀羅尼云依深祕教者真言是如實相以如來不生不滅心為體問何故是真言如實相云答此真言相非一切諸佛所作不令他作亦不隨喜何以故以是諸法法如是若諸如來出現若諸如來不出諸法法爾如是住已上經文故真言是如實相云云大品經云諸法平等非聲聞作非辟支佛作非諸菩薩作非諸佛作有佛無佛諸法性常空已上此等顯密更一同也矣宜對寶士者顯密有人非法若強云各別者顯宗生滅門分而全非真如摩訶衍汝所解法身劣顯教主亦不説平等之理故難云此義不爾我大日遍照平等之理上立差別差別上説印真言印真言顯宗不説之何答印契者顯教所説之戒表德也縱令依三密加持現雖放大日遍照之光而無戒德者不可也故祕鍵云于時弘仁九年春天下大疫爰帝皇自染黃金於筆端握紺紙於爪掌奉書寫般若心經一卷豫範講談之撰綴經旨之宗未吐結願詞蘇生族彳途夜變而日光赫奕是非愚身戒德金輪御信力所為也已上帝者縒峨帝真言者此亦顯教同之涅槃經云粗語軟語皆歸第一義已上舌相言語皆是真言同之何云各別乎但細説相家家皆有一德謂律二百五百戒相八萬細行三千威儀餘家不爾華嚴十佛等餘宗不爾梵網四十八輕等餘宗不爾悲華經五百大願等餘宗不爾大乘同性經四箇十地餘經不爾大日經等密號名字等餘經不爾楞嚴經二十五圓通餘家不爾此等德德皆宰自宗雖然餘不事之已上常平等義畢次常差別義次非同非別義云云
