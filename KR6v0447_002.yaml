body:
  text: 華嚴宗華嚴經六十卷者經云大方廣佛華嚴經云云骨目章云頭華嚴教事大以周遍為其義心性周遍法界唯心萬法一如平等無差別心性常住不生不滅是故世間森羅常住有情非情其性恆如方者寂用作言之異名也一光遍照之琳影也理智常住之慧無礙作情之源也廣者弘也謂自性廣弘號無隔院佛者梵語也此云為道謂道者通也遍也通理通事自性宛麻不變遍天遍地本理苟無替佛道通遍硯筆墨字花者門也謂行之門將開而入本來之理宗宗者其家也家者諸佛之家也諸佛家者法界自性也嚴者飾莊也海上之波也根本智之上以七珠莊嚴實報世界也好眾寶合成之大宅金剛無漏之寶堂也經者性也性能不變一果常住故名為經矣已上六十卷等者八會章云頭華嚴經誓事今明此經有七處八會謂人中三處天上四處為七處重會普光法堂是為八會於中第一會佛在摩竭提國菩提樹下盧遮那佛加普賢菩薩入如來淨藏三昧說十方世界及果德法門有四品經第二會佛在普光法堂文殊師利承佛神力說信位法門有四品經第三會佛在帝釋宮佛加法慧菩薩入菩薩無量方便三昧說十住法門有六品經第四會佛在夜摩天宮加功德林菩薩入善伏三昧說十行法門有四經品第五會佛在兜率天宮加金剛幢菩薩入明智三昧說十回向法門有三品經第六會佛在他化自在天宮加金剛藏菩薩入大智慧光明三昧說十地法門有十一品經第七會佛在重會普光法堂普賢菩薩承佛神力入佛華嚴三昧法慧菩薩問普賢菩薩答有二品經第八會佛在舍衛國重閣講堂自入如來師子奮迅三昧說法界法門有一品經已上略抄私云第一會有四品經者一世間淨眼品二盧遮那佛品三如來名號品四四諦品第二會有四品經者一如來光明覺品二菩薩明難品三淨行品四賢首菩薩品第三會有六品經者一昇須彌頂品二雲集妙勝殿上說偈品三菩薩十住品四梵行品五初發心菩薩功德品六明法品第四會有四品經者一昇夜摩天宮自在品二夜摩天宮菩薩說偈品三菩薩十行品四菩薩無盡藏品第五會有三品經者一昇兜率天一切寶殿品二兜率天宮菩薩讚佛品三菩薩回向品第六會有十一品經者一十地品二十定品三十忍品四阿僧祇品五壽命品六菩薩處品七佛不思議品八如相好品九佛小相光明品十普賢菩薩行品十一如來性起品第七會有一品經者離世間品第八會有一品經者入法界品又新譯為九處十會品名與今或替復加五品為三十九也問此經教主三身中何身哉答一體不分非今非古身也清凉大師云分三身名目自是三乘教內今一乘玄旨一體不分已上如來出現品云為令眾生生欣樂故出於世欲令眾生生戀慕故示涅槃而實如來無有出世亦無涅槃何以如來常住清淨法界隨眾生心示現涅槃已上清凉釋云約迹能今能久約本非古非今已上問此經十佛并現相樣何答經四十三離世間品云有十種見佛何等為十所謂無著佛安住世間成就正覺故願佛出生故業報佛信故持佛隨順故涅槃佛永度故法界佛無處不至故心佛安住故三昧佛無礙無著故性佛決定故如意佛普覆故探玄記十七云行障既離佛境斯現故云見佛十中各標名釋義者無著者不滯著謂不滯體著現於世間示正覺此是摠句下九別顯一由願力出現故二示往善業得此妙果此令他信知業不虛三淨識體住持善根順成正覺四雖現世間而常住涅槃故五此現覺之身即遍一切處故六方乃安住心即是佛七以於留處皆無著故八體性不變故九如能化意普覆群機故已上私云於一佛隨上功能立十名問此經大意何答宗密云信解行證也信者初會六品十一卷舉依正二果勸大眾信樂也解者二修因契異生其智解謂第二會十信三會十住四會十行五會十回向六會十地七會等妙二覺行者託前信解之法進修令成正行也即第八會證者第九會初佛入師子奮迅三昧海會頓證法界善財遍親善友歷位漸證也破塵抄云摠分一部經為四謂信解行證初以如來果德及普賢法界為所信以文殊智慧為能信第二會於普光明殿說十信從第三會乃至第七會說六位行布至第八會正說圓融行其行布圓融說有前後義乃一時皆是不出理智解行其解行者文殊為能起妙解普賢為所起圓行乃至第九會法界品初皆證入法界也是故品初如來自入三昧現相無言表所證絕言而普賢開顯考顯一本作題放光令其解表能證絕言文殊開顯考顯一本作題如來自入三昧者顯二聖法門相融普賢行因滿離相絕言沒同果海是名毗盧遮那光明遍照也是知一部經不離於三聖其末會亦是文殊為始普賢為終華嚴論云又此經四十品中以法界品為正宗餘品為伴已上五教十宗十玄六相等者法藏大師云教類有五頭華嚴教相事一小乘教但說我空縱少說法空亦不明顯但依六識三毒建立染淨根本未盡法源故多諍論諸部小乘經論四阿含俱舍婆沙等二大乘始教亦名分教於中但說諸法皆空未盡大乘法理故名為始但說一切法相有不成佛故名為分楞伽深密等經瑜伽唯識等論也三終教亦名實教說如來藏隨緣成阿賴耶識緣起無性一切皆如定性二乘無性闡提悉當成佛方盡大乘至極之說名為終故以稱實理故名為實般若法華等經起信寶性等論四頓教摠不說法相唯辨真性亦無八識差別之相訶考訶恐呵歟教勸離毀相泯心但一念不生即名為佛不依地位漸次故說為頓大乘經中即心是佛談不說位漸次等諸文意五圓教所說唯是法界性海圓融緣起無礙相即相入帝網重重主伴無盡已上有同教別教二五教章上云一別教二同教初中亦二一是性海果分當是不可說義何以故不與教相應故即十佛自境界也故地論云因分可說果分不可說者是也二是緣起因分即普賢境界也此二無二全體遍收其猶波水思之可見已上就普賢境界有十玄緣起六相圓融經十宗者五教章云一依菩提流支依維摩經等立一音教經云佛以一音演說法眾生隨類各得解云云二依誕法師等依楞伽等經立漸頓二教謂以先習小乘後趣大乘等大由小起故名為漸大小俱陳經涅槃經等如直往菩薩等大不由小故名為頓教華嚴經三依光統律師立三種教謂漸頓圓以根未熟先說無常後說常先說空後說不空深妙義如此漸次說故名為漸教為根未熟之流於一法門具足演說一切佛法常與無常空與不空俱說更無漸次故名為頓為於上達分階佛教者說於如來無礙解脫究竟果滿圓極祕密自在法門故名圓即此經是也四依大衍法師立四宗教以通收一代聖教一因緣宗小乘薩婆多等部二假名宗成實經部三不真宗諸部般若說即空理明一切法不真實等四真宗涅槃華嚴等明佛性法界真理等五依護身法師立五種教三種教同前衍師第四名真宗教涅槃等經明佛性真理第五法界宗華嚴明法界自在無礙法門六依耆闍法師立六種教初二同衍師第三不真宗明諸大乘通說諸法如幻化等第四真宗說諸法真空理第五常宗明說真理恆沙功德常恆等義第六圓宗明法界自在緣起無礙德用圓備華嚴是也七依南岳思禪師及天台智者禪師立四教該攝一代東流教一名三藏教智度論中說小乘為三藏教大乘為摩訶衍藏二名通教諸大乘經中法通益三乘人及大品經中乾慧等十地通大小是也三名別教諸大乘經中所明道理不通小乘者是也亦名頓教四名圓教法界自在具足一切無盡法門一即一切一切即一等華嚴是也亦名祕密教以聲聞等不見聞故八依江南敏法師立二教一釋迦經謂屈曲教以遂物機隨計破著故如涅槃等二盧舍那經謂平道教以遂法性自在說故即華嚴是九依梁朝光宅寺雲法師立四乘教謂臨門三車為三乘四衢所授大白牛車方為第四以彼臨門中牛車亦同羊鹿俱不得故餘義同上辨後代信行禪師依此宗立二教謂一乘三乘三乘者即別解別行及三乘差別并先習小乘後趣大乘是也一乘者謂普行唯是一乘亦華嚴法門及直進等是也十依大唐王藏玄奘法師依深密經金光明經及瑜伽論立三種教即三法輪是也一名轉法輪於初時鹿野園中轉四諦法輪小乘法二名照法輪於中時於大乘內密意說諸法空等三名持法輪後時於大乘中顯了意說三性及真如不空理等就普賢之境界十玄緣起六相圓融同中云十玄緣起無礙法門義頭十玄事一者同時具足相應門十義同時相應成一緣起無有前後始終等別具足一切自在逆順二者一多相容不同門隨一門中攝因果理事法各住自位一切法門無礙自在無盡經云以一佛土滿十方十方入一亦無餘世界本不壞三者諸法相即自在門一即一切一切即一圓融自在無礙成耳經云初發心菩薩一念功德深廣無邊際如來分別說窮功不能盡四者因陀羅網境界門經云於一微塵中各示那由他無數億諸佛於中而說法於一微塵中現無量佛國須彌金剛鐵圍世界不迫迮於一微塵中現有三惡道天人阿修羅各受報業已上三世間說也五微細相容安立門於一念中具足始終同時前後逆順等一切法門於一念中炳然同時齊顯顯現無不明了六祕密隱顯俱成門諸法隱覆顯了俱時成就也故經云於此方入正受他方三昧起眼根入正受色塵三昧起已上又云於一微塵入正受一切微塵三昧起一切微微塵入正受一毛端頭三昧起已上如是自在此隱彼現正受及起定同時祕密成七諸藏純雜具德門於諸義或純或雜如人法等若以人門取者即一切皆人故名為純此人門具含事理等一切差別法故名為雜如是繁興法界純雜自無不具足者八者十世隔法異成門於諸義遍一世中同時異時具足顯現以時與法不相離言十世者過去未來現在三世各有過去未來及現在即為大世也然此九世迭相即入故成一摠句別合成十世此十世具足別異同時顯現成緣起故得即入也經云或以長劫入短劫短劫入長劫或百千大劫為一念或一念即為百千大劫或過去劫入未來劫未來劫入過去劫如是自在時劫無礙相即入渾融成九唯心回轉善成門於諸義唯是一如來藏自性清淨心轉也然一心亦具足十種德如是自在具種種德此心自在作用十託事顯法性解門於諸義隨託別事以顯別法謂理事等一切法門已上此十門隨一門攝諸門已上十玄緣起畢六相圓融者頭六相事同章云初列名者謂摠相別相同相異相成相壞相摠相者一含多德故相別者多德非一故別依止摠滿彼摠故同相者多義不相違同成摠故異相者多義相望各各異故成相者由此諸義緣起成故壞相者諸義各住自法不移動故第二教興意者此教為顯一乘圓教法界緣起無盡圓融自在相即無礙容持乃至因陀羅無窮事等此義現前一切惑障一斷一切斷得九世十世滅行德即一成一切成理性即一顯一切顯竝普別具足始終皆齊初發心時便成正覺良由如此法界緣起六相容融因果同時相即自在具足逆順因即普賢解行及以證入果即十佛境界所顯無窮已上問此宗斷惑分齊何答五教章釋五教斷惑然小乘始教如下終教意諸聲聞緣覺於煩惱尚不能斷但能伏不知所知障其菩薩人於二障中不分俱生及分別但有正使及習氣地前伏使現初地斷使種地上除習氣佛地究竟淨此等菩薩唯怖智障故修唯識真如等觀伏斷彼障然於煩惱障非直不怖不修對治頓教意一切煩惱本來自離不可說斷與及不斷如法界體性經云佛告文殊師利汝云何教諸善男子等發菩提心文殊言我教發我見心何以故我見際即是菩提故以之准之若依圓教一切煩惱不可說其體性但約其用即甚深廣大以所障法一即一切具足主伴等故彼能障惑亦如是也是故不分使習現種但如法果一得一切得故是煩惱亦一斷一切斷也故普賢品明一障一切障小相品明一斷一切斷者此義也又此斷惑分齊准上下經文有四種一約證謂十行已去斷二約位謂十住已去斷三約行謂十信終心斷四約實謂無可斷以本來清淨故廣如經文又前三乘等諸門斷惑若一障一切障一斷一切斷即入此教道已上終教下取意頓教圓教五教章全文問此宗將來何答三國傳法記云後魏明帝之時東晉安帝詔天竺佛他跋陀譯出華嚴經六十卷已上又陳世杜順禪師清凉山文殊應化居終南山弘華嚴又智儼大師發揮五教證悟六相又香象賢首大師普羅應迹顯揚一乘恢弘十宗又則天皇后御宇聖曆二年己亥十月八日弘福寺法藏法師奉詔令講華嚴經至于世界品講堂及寺地皆震動矣華嚴宗自此興焉孝謙天皇天平勝寶三年辛卯良辨為少僧都住東大寺弘華嚴宗已上三國傳法記文少加他書天台宗妙法蓮華經國天台教事妙者祕密奧藏稱之為妙法者示權實正軌故為法蓮者久遠之本果喻之為蓮華者會不定於同道喻之為華經者聲為作佛事稱之為經矣摠大師於此經而設三部釋義一玄義法華釋名立五重玄義一者法華為名二者實相為體三者一乘因果為宗四者斷權疑生實信為用迹門斷近疑生遠信為用本門五者醍醐味為教相二文句法華入文判釋設四種釋一因緣者所化之機感時至能化之應用任運顯故文句一云因緣亦名感應眾生無機雖近不見慈善根力遠而自通感應道交故用因緣釋已上二約教者感應道交六塵得道中聲塵得道此國風俗設修多羅教文而引迷妄群類句云若十方機感廣若虛空今論娑婆國土音聲為佛事則甘露門開依教釋者處中說明矣三本迹者尋迹有本自顯故句云若應機說教教有權實淺深不同須置指存月亡迹尋本故肇師云非本無以垂迹非迹無以顯本故用本跡釋矣四觀心者前因緣約教本迹三釋如來在世儀式故廢之所詮觀萬法在一念之心是我等得義故專所詮觀心自然可滿足自利利陀句云若尋迹迹廣廣徒自疲勞若尋本本高高不可極日夜數他寶自無半錢分但觀己心之高廣扣無窮之聖應機成致感逮得己利故用觀心釋矣三止觀法華之大意矣止觀有三種一漸次止觀自三藏至圓教二不定止觀頓漸等互學三圓頓止觀自初學圓此三種釋皆是大乘俱互圓實相矣此一家己心相傳之肝要也然則止觀一云天台傳南岳三種止觀已上問南岳相傳何答止觀一云聞師用心一依釋論論是龍樹所說已上慧聞南岳相傳來問慧聞依釋論者何文哉答論云三智實在一心中得已上四教五味者藏等四教化法所說法門淺深也乳酪等五味化儀五時說法儀式也四教者一三藏教教主劣應身同居士佛說小乘半字權門界內方便事教明生滅四諦之修行拙度拆空之理三乘所學四門得道三藏者一修多羅藏亦云定藏修多羅此翻經法本體義也經者四阿含謂長雜增一中也二毗尼藏亦云戒此翻律滅惡義也律者曇無德部薩婆多部迦葉遺部彌沙塞部婆麤富羅部等也三阿毗曇藏亦云慧此翻論無比法義也俱舍婆沙等也三乘者一聲聞修四諦行斷三界八十八使見惑至初向發無漏心斷八十一品思惑得羅漢果此極果無學位二緣覺觀十二因緣發無漏智得辟支佛三菩薩三祇百劫之間修六度八相成道轉法輪已上三乘所學地位劫數可待下二通教教主勝應身居方便土說大乘滿字權門界內偏真理教明無生滅四諦十二六度之行教巧度體空之觀三乘共學四門得道立十地判三乘之行位矣一乾惠地智慧水淺未得四善根深水故云乾慧外凡三賢位修四念處四正斷四神足五根五力七等覺支八正道支此位利根菩薩斷煩惱二乘伏煩惱二性地得燸法等理水增進伏煩惱強盛內凡位同三藏四善根三八忍地三乘人發無漏智斷三界四諦下見惑無漏智自苦法忍至道類忍十五心初果位四見地三乘同斷三界八十八使見惑畢見無生四諦理證須陀洹果位也又此位有上根被接被接者通教利根菩薩為別教圓教人五薄地斷欲界九品思惑前六品證一來果九品殘三品故云薄六離欲地斷欲界九品惑盡故云離欲證不還果七已辦地斷色界四禪無色界四處摠八地七十二品思惑證阿羅漢果也聲聞無學道菩薩入空觀位此地有中根被接三界所作已辦也八支佛地緣覺利根智慧力大故非唯斷正煩惱亦兼侵煩惱上習氣也菩薩此位出假利生也九菩薩地斷習氣教化眾生修習無生四諦發菩提心修六度至六七地如二乘斷三界煩惱證偏真理但空觀法成就至第八地從空出假修利他行出假者利益眾生也斷正煩惱畢故留于習氣加誓願還生三界利益眾生通菩薩名誓扶習生也習氣力弱故加願淨佛國土成就眾生學佛種種功德已上分聖此二地下根菩薩被後教接也十佛地以一念相應智慧斷餘殘習氣亦少分塵沙塵沙者習氣上細抹如沙障利益眾生行煩惱也以天衣為座成勝應身佛劣應身一丈六尺也勝劣應故云勝應同居土佛也又界外方便有餘土有此通教佛八相成道八相同三藏釋云丈六尊特合真佛已上二乘鈍根菩薩見丈六佛大乘利根菩薩見報身佛通有八種義教理智斷行位因果矣一教通者三乘人同稟如幻即空教故二理通者三乘人同見偏真空理故三智通者三乘人同得巧度一切智故巧度者通教三藏教智慧勝不失有空四斷通者三乘人同斷見思惑故五行通者三乘人同斷見思無漏行同故六位通者從乾慧地至已辨地三乘人同居故七因通者三乘人同用九無礙道斷煩惱故無礙道者無間斷煩惱智慧八果通者三乘人同用九無礙道證無餘涅槃果故解脫道者諸果位此教有即空空有不二相即教也三別教教主報身居實報土說大乘滿字權門外獨菩薩事教明無量四諦六度之行教二乘不共但中理四門得道立五十二位國五十二位事一十信此位皆以信為根本一信心二精進心三念心四定心五慧心六施心七戒心八護心九回向心十願心此十信伏三界八十八使見惑九地八十一品思惑位淺故先觀生滅空理用拆空觀智同三藏教漸誘心故空觀成就伏忍位亦外凡位二十住位伏位習種性位忍位內凡位一發心住斷三界見惑位二持地住三修行住四生貴住五方便具足住六正心住舍利弗此位值乞眼婆羅門退菩提心入凡夫地七不退住自第二住至第七住斷三界八十一品思惑八童真住九法王子住十灌頂住自第八住至第十住除習氣亦斷上品塵沙出假利生位三十行位伏位內凡位聖種性賢位一歡喜行二饒益行三無嗔行四無盡行五離癡行六善現行七無著行八尊重行九善法行十真實行此十位名行以進趣為行斷中品塵沙惑強息生死惡心出假位四十回向位伏位內凡通種性賢位一救護眾生回向二不壞一切回向三平等一切佛回向四至一切處回向五無盡功德回向六隨順平等善根回向七隨順等觀一切眾生回向八如相回向九無縛無著回向十法界無盡回向此位斷下品塵沙惑出假利益眾生心勇猛五十地位斷位真位分聖位顯中位證道位一歡喜地見道位謂斷一品無明見一分中道理云見道此位八相成道此位百佛世界作佛二離欲地千佛世界作佛三發光地萬佛世界作佛四燄慧地五極難地六現前地七遠行地已上功用八不動地九善慧地十法雲地已上十地斷十品無明顯十分中道理六等覺位此位斷一品無明即顯十一分中道理等覺了登平等峯分明了亦名金剛心因位智慧強盛如金剛分聖位也七妙覺位斷一品無明最後無明已上摠斷十二品無明極聖位矣他受用報身居有餘實報土八萬四千相好具足光明無邊音聲色像無邊斷無明證中道菩薩為所化非二乘凡夫境界已上別教者教理智斷行位因果皆三教別故云別教也教別者次第隔歷教也理別者明但中理不具空假故智別者三諦智前後次第故斷別者一時非斷三惑先見思次塵沙後無明次第斷也行別者次第隔歷行故位別者五十二位次第歷歷故一位不具諸位功德故因別者不收萬善次第捨前法得後法故果別者但中果不具諸法故有教無果人四圓教教主法身居寂光士說界外無作四諦二諦一諦三觀十二因緣六度明中道不但中理教十界眾生皆入佛智見道此立六即位一理即此位全不知佛法惡業煩惱顛倒之身卵身中眾生未聞三諦之名字三諦法雖我境界如食木之蟲不知是字非字二名字即位此位纔聞三諦名字小分依知識經卷通達解了知一切法皆是佛法信解三觀行即位此即五品弟子位五品者一十心具足初隨喜品十心者十法成乘觀門也一觀不思議境觀一念心具足三千性相百界千如無闕三諦觀二真正發菩提心依妙境發無作四弘願上求下化三善巧安心止觀體前妙理寂然名止常照名觀四破法偏以三觀破三惑五識通塞六蔽塵沙無明等名塞六度一心三觀名通六修道品調適無作道品一一調停七對治助開若正道多障圓理不開須修事助八知次位修位五十二位免增上慢故九能安忍故於逆順不動進入六根十無法愛不著十信相似道可入初住真空理已上十心四教義取意二讀誦經典品三更加說法品加者讀誦四兼行六度品兼者上之讀誦說法五正行六度品為眾生依習此觀行即習觀心位此位伏三惑即外凡位四相似即位此位明十信一信心斷三界八十八使見惑從二信至七信斷三界九地八十一品思惑從八信至十信斷上中下三品塵沙伏無明出假位五分真即位十住斷十品無明顯十分中道理十行斷十品無明十向斷十品無明十地斷十品無明等覺斷一品無明摠斷四十一品無明顯四十一品中道理十住初住分身散影能遍十方剎土隨眾生機八相成道利益眾生也此位轉煩惱業苦之三道為法身般若解脫之三德也此云三德者祕藏之義如次顯法報應三身也等覺位四十一地無明之雲晴等覺之峯十四夜月明了金剛心位入重玄門也入重玄門者等覺還凡夫地修四十一地之行上求下化利眾生六究竟即位斷最後品無明所顯三身即一佛也以虛空為座成佛居寂光土為最上利根之眾生說此教圓教亦有八種義謂教理智斷行位因果矣教圓者正說三諦一諦中道不偏空非偏假之教理圓者中道實相遍法界一法無非中道智圓者萬法一念覺了斷圓者一斷一切斷三惑無前後同時斷行圓者一行一切行戒一法備定慧等位圓者初一地具後後諸地功德因圓者三諦功德雙自然流入後後位果圓者妙覺不思議三德祕藏不縱不橫也譬如伊字三點面上三目也五味者一華嚴如乳味兼別圓三七日二阿含如酪味但三藏十二年三方等如生蘇味對藏通別圓說時不定四般若如熟蘇味帶通別圓卅年五法華如醍醐味純圓八年涅槃如醍醐味真說四教一日一夜三觀者一空觀二假觀三中觀於森羅之萬法恆沙之俗諦不落有無意空觀之智此法體眼前歷照之心假觀之智此法諦之不傾空假之識中道之智矣森羅之萬法恆沙之俗諦非我等是非思量之境之處空諦此法諦眼前堂堂當體假諦此法諦不傾空假而被云空被云假中諦問此三諦唯一物不分別何答爾也若觀行者觀中有有病與空藥有空病與假藥中觀不落此二病之療藥若落言句而可憶持中觀者亦可與圓融之妙藥唯一心為先問若爾能觀所觀之境智何答於此一心三觀之境智而有慧心檀那之兩流義先檀那流義者法華悵講云一心三諦境一心三觀智一行一切行恆修此三昧已上是境一心三觀智一心三觀境智相應一言一心三觀是也境智相應者以無緣智緣無相境意也又觀經疏遍諸境觀諸法實相意有之問云傳教大師以無緣智緣無相境意如何師云境智相應一心三觀故是於法界一如理慧相應色心相應意已上義傳教意慈覺大師己心中記云一心中何分別境智先念為境後念為智已上前念為境者先觀空觀此空法爾三觀即此念前念亦照此三觀云後念為智三觀也已上傳教釋境一心三觀面慈覺釋智一心三觀面次慧心流一心三觀者先貪嗔癡具足眾生常我癡我見我愛我慢之四煩惱相應元初一念無明心可觀即空假中此觀即止觀具足止名佛智觀名佛見於念念中止觀現前此即眾生開佛知見名於明一心三觀次歷餘一心三觀者因緣所生法為觀境是即根塵相對一念心也一切時一念或欲心或嗔心或慢心等起觀即空即假即中曆餘下迹門觀釋云觀心即向若境若智同在一心故須更明以顯妙行我一念心自本境智相應全體釋云以如如智契如如境已上問此二流中何可用哉答抄主慧心五代孫弟故可用慧心流之義也所以世無隱諺云檀那流永辨智海如梅櫻義花花叡岳慧心流法持法然如秋月止觀之玉照山上矣圓頓一實戒珠澄末代濁世之水血脈不可疑矣六即者地位如前問圓教六即圓融無礙義其地位何答六故地位階降歷歷即故一位一切位融即例如花嚴云別是摠之別故行布不礙圓融摠是別之摠故圓融不礙行布即融故理即如來放光照不聞法之癡闍六佛一位廣廣六布故五十一地羅綾之文不亂因果位新新摠六即位我等開佛知佛見一心上所建立大師妙解法華中微觀法梯隥問此宗於唐國何代與答三國傳法記云於陳朝南岳慧思大師為國師又智顗禪師智者大師始登天台山卜寂室建國清寺大隋文帝時智者大師於荊州玉泉寺說摩訶止觀灌頂法師章安大師一聞記之天台宗自是起玄宗皇帝天寶九年荊州湛然法師妙樂大師造釋籤疏記弘決合三十卷贊智者大師義已上王代記云人王第五十一代桓武天王治二十八年延曆二十三年甲申年傳教奉勅生年三十八歲入唐奉值台州佛龍禪林寺道邃和尚并行滿座主奉受八十二卷天台宗章疏同二十四年乙酉歲秋歸朝十二月二十六日以所持聖教進我朝天王矣又奉值天竺善無畏三藏第三弟子順曉和尚受真言三部大法於高雄寺行於灌頂奉授平城天王於延曆寺弘法華矣此大師第五十三代嵯峨天王治十三年大同十七年壬寅六月四日辰時生年五十六入滅三論宗問國三論事三論大意何答三論玄云考聖心以息患為主統教意以通理為宗論雖有三義唯二轍一曰顯正二曰破邪破邪則下極沈淪顯正則上弘大法已上取意又云明中論以二諦為宗二諦是佛法根本如來自行化他皆由二諦如瓔珞經佛母品明二諦能生佛故二諦是佛母矣論云諸佛依二諦為眾生說法已上取意又云問既名中論何故不用中道為宗乃以二諦為宗耶答即二諦是中道既以二諦為宗即是中道為宗中道有世諦中道真諦中道非真非俗中道已上又云明百論宗者百論破邪申智明二諦以為宗中論以二諦為宗百論用二智為宗即欲明諦智互相成問百論何故用二智為宗哉答提婆與外道對面擊揚鬪一時權巧智慧但提婆權智巧能破邪巧能顯正而實無所破亦無所顯故名實智一論始終明此二智故以二智為宗中論用所申二諦為宗百論用能申二智為宗矣又云明十二門論宗者此論亦破內迷申明二諦亦以二諦為宗但今欲示三論不同宜以境智為宗所言境智者論云大分深義所謂空也若通達此義即通達大乘具六波羅蜜無所障礙大分深義謂實相之境由實相境發生般若由般若故萬行得成即是境智之義故用境智為宗已上又云三論通破眾迷通申眾教智度論別破波若之迷別申波若之教矣次明四論破申不同門頭破申事所言破申有三義一者破外人迷教之病故名為破申佛二諦教門故名為申二者申佛正教而邪迷自破故名為申破耳三者論主申明佛破故名申破諸大乘經破眾生虛妄以顯一道但末代鈍根不了如來破病顯道之意四依菩薩還申明佛破已上取意又云三論所斥略辨四宗一摧外道二折毗曇三排成實四呵大執矣外道不達二空橫存人法毗曇已得無我而執法有性跋摩具辨二空而照猶未盡大乘乃言究竟但封執成迷已上摧外道第一至妙虛通目之為道心遊道外故名外道外道多端略陳其二一天竺異執二震旦眾師矣先論西域四執盛行一計邪因邪果二執無因有果三立有因無果四辨無因無果矣有外道云大自在天能生萬物萬物若滅還歸本天故云自在天若嗔四生皆苦天若喜六道咸樂然天非物因物非天果故名邪因邪果自在既爾七計例然復有外道窮推萬物無所由籍故謂無因而親覩諸法當知有果故云無因有果也有人言自然有因自然無因萬化不同皆自然有故曰斯謬夫論自者謂非佗為義因他則非自矣又斷見之流唯有現在更無後世類如草木盡在一期有因無果撥無後世受果亦無現在之因故六師云無有黑業報無有黑業無有白業無有白業報釋迦末興盛行天竺能仁既出殄斯謬計佛滅度後柯條更繁龍樹興重加剪伐已上略抄次排震旦眾師釋僧肇云每讀老子莊周之書因而歎曰美即美矣然期神冥累之方猶未盡也老莊入玄故應易惑耳目凡夫之智孟浪之言言之似極而未始詣也推之似盡而未誰至也伯陽之道道指虛無牟尼之道道超四句淺深既懸體何由一已上取意折毗曇第二阿毗曇者名無比法無漏慧根會理隔凡其功冠絕故云無比無比之名有餘所明之理不足非但遠乖方等亦近迷三藏言見有得道乃是見有非見道也故淨名云法名無染若染於法乃是染著非求法也為未識源者示之以流令尋流以得源為未見月者示之以指令因指以得月窮流則唯是一源亡指則但是一月盖是如來說小之意也矣阿含文親說無相故善吉觀法空而悟道身子入空定而佛歎阿毗曇人但明見有故自迷本宗雖知俗有不悟真空既惑真空亦迷俗有是故真俗二俱竝喪已上略抄排成實第三龍樹釋波若累教品云善吉觀生法二空欲比菩薩二空譬如毛孔之空比十方空即小空為淺大空為深成實所明但是聲聞空非大士所得耳成實毗曇各執空有互相排斥障道增見皆失佛旨也已上略抄訶考訶恐呵歟大執第四有大乘師曰四術三玄竝為外教毗曇成實益是小乘明理不周在文不足既障大乘理宜須破自方等紘宗眾聖軌轍教稱滿字理曰無餘信之則獲福無邊毀傍招莫太之罪矣若謂有大異小有小異大名為二見大品云諸有二者無道無果涅槃云明與無明愚者謂二又若實有大乘者名有所得有所得者為魔眷屬非佛弟子矣大乘之宗永斷生死名為斷見涅槃是常即是常見乃為斷常何大之有已上略抄問若內外竝呵大小俱斥此論宗旨何所依據乎答若心存內外情寄大小則墮在偏邪失於正理乃至內外竝冥大小俱寂始名正理悟斯正理則發生正觀正觀若生則戲論斯滅戲論斯滅則苦輪便壞三論大宗其意若此問若內外竝除大小俱斥乃為斷見何名正宗答既內外竝冥則斷常斯寂二邊既捨寧非正宗耶矣難曰既有邪可破有正可顯則心存取捨何謂無依答為息於邪強名為正有邪既息則正亦不留故心無所著正觀論云大聖說空法為離諸見故若復見有空諸佛所不化矣有依有得為生死本無住無著為經論大宗已上略抄問破顯大意何答三論玄云惣談破顯凡有四門一破不取二取不破三亦破亦取四不破不取言不會道破而不取說必契理取而不破學教起迷亦破亦取諸法實相言亡慮絕實無可破亦無可取泯上三門歸乎一相已上略抄此宗立二藏三法輪判一代聖教所謂二藏者一聲聞藏智度論云三藏此小乘教二菩薩藏智論云摩訶衍藏是大乘經等三法輪者一根本法輪華嚴經二枝末法輪阿含方等般若經等三攝末歸本法輪法華經一一論各具三義一破邪二顯正三言教以同具此三義故合名三論矣八不中道者大論五云不生不滅不斷不常不一不異不去不來因緣生法滅諸戲論佛能說是我今當禮乃至諸法不生不滅非不生非不滅非非不生滅亦非非非不生滅已得解脫非空非不空如是等捨滅諸戲論言語道斷深入佛法心通無礙不動不退名無生忍是助佛道初門已上如此不落生滅斷常一異去來之八計者即中道也三論玄云問中有幾種答既稱為中則非多非一隨義對緣得說多一所言一中者一道清淨更無二道一道者即一中道所言二中者則約二諦辨中謂世諦中真諦中以世諦不偏故名為中真諦不偏名為真諦中所言三中者二諦中及非真非俗中所言四中者對偏中者對大小學入斷常偏病是故說對偏中盡偏中者大小學人有於斷常偏病則不成中偏病若盡即名為中無常無斷乃名中道故名盡偏中絕待中者本對偏病是故有中偏病既除中亦不立為絕待中成假中者有無為假非有非無為中此中為成於假謂成假中略抄論云若無有始終中當之何有經云遠離二邊不著中道已上二諦者如前方言四段者三論玄云依名釋義者中以實為義以正為義中論序云以中為名者照其實也照謂顯也立於中名為顯諸法實故云照其實也所言正者華嚴云正法性遠離一切言語道一切趣非趣悉皆寂滅相此之正法即是中道離偏曰中對邪名正理教釋義者中以不中為義所以然者法實相非中非不中無名相法為眾生故強名相說欲令因此名以悟無名是故說中為顯不中問中以不中為義出何文答華嚴云一切有無法了達非有無若爾一切中偏法了達非中偏互相釋義者中以偏為義偏以中為義所以然者中偏是因緣之義故說偏令悟中說中令識偏如經云說世諦令識第一義諦說第一義諦令識世諦無方釋義者中以色為義中以心為義是故華嚴經云一中解無量無量中解一故一法得以一切法為義一切法得以一法為義已上無依無得者一一釋義下皆見心融放明三祇成佛者經五十二位之斷證三祇成佛也大乘玄涅槃義嘉祥云今明十信伏見一處住地十解斷盡證人無我解十解伏欲愛住地十行伏色愛住地十回向伏有愛住地初地初心斷四住地盡初地已上斷十住無明已上統略下法華釋云伏斷位義不同且依一途十行第七心去伏四住習及無明正使乃至初地至法雲開四住習及無明正使各為三品初地至七地斷上品習八九斷中品佛智斷下品已上正使者現行煩惱因兹流轉三界習氣者煩惱種子智論疏僧侃云派論煩惱有四種一者四住根本二者四住習氣三者無明根本四者無明習氣若就二乘始之一種是正使後之三種皆是二乘家習若就菩薩初三是正使後一是習氣已上問伏斷位何答十信者一信心二精進心三念心四定心五慧心六施心七戒心八護心九回向心此九心見一處漸伏十願心斷見一處入十解十住十住者一發心住斷見一處盡二持地住三修行住四生貴住五方便具足住六正心住七不退住八童真住九法王子住九住欲愛漸伏十灌頂住斷欲愛盡入十行十行者一歡喜行二饒益行三無嗔行四無盡行五離癡行六善現行七無著行八尊重行九善法行九行色愛漸伏十真實行斷色愛盡入回向十回向者一救護眾生回向二不壞回向三等一切回向四至一切處回向五無盡功德藏回向六隨順平等善根回向七隨順等觀一切眾生回向八如相回向九無縛無著回向九回向有愛漸伏十法界無盡回向斷有愛盡入初地十地者一歡喜地二離欲地三發光地四焰慧地五難勝地六現前地七遠行地已上二地斷上品習無明八不動地九善慧地已上二地斷中品習十法雲地斷下品習八九十地斷中品無明佛地斷下品無明已上五十一位斷位珍海意地前卅心初僧祇自初地至一地第二僧祇八九十地第三僧祇問此等斷惑以何觀智哉答無生觀之力也嘉祥大師中論疏云五十一位賢聖皆就無生觀內分其階級已上問三論宗將來何答三國王代記云如來滅後一千三百九十年東晉第六代哀帝隆和元年壬戌天竺龜兹國沙門羅什三藏從天竺將來七十四部三百八十四卷經論時哀帝貴之於長安城令譯出件經論三藏有四人弟子謂僧叡僧肇道融竺道生也弘始十一年為四人弟子授龍樹所造中觀論十二門論并提婆所造百論矣此中道融有弟子名僧詮詮有弟子名吉藏嘉祥大師此師所立傳日域矣已上唐土日本人王三十五代推古天王三十三年乙酉高麗慧灌來其夏大旱詔灌祈雨灌著青衣講三論雨大降帝喜為僧正後於內州立井上寺弘三論矣佛法自西天來漢土經三百歲來百濟國經一百年來日本矣法相宗應理圓實宗國法相宗事亦云唯識宗依解深密經之法相品立性相各別之理故從餘宗名法相宗法相宗非自宗名成唯識論十卷者義林章云唯識之成名成唯識依主釋也唯識疏云唯謂簡別遮無外境識謂能了詮有內心識相有為依佗識性圓成實理皆不離識心所心王以識為主歸心泯相總言唯識已上亦唯識有五位一識自相唯識八識心王解深密經二識相應唯識五十一心所解深密經三識所變唯識色法十一厚嚴經四識分位唯識不相應二十四楞伽經五識實性唯識六無為圓成實華嚴法華等論者樞要云教誡學徒故稱為論問答決擇諸法性相故稱為論初解依悲利眾生故後解依智辨諸法故已上諸藏章引瑜伽八十一云謂諸經典循環研覈摩呾理迦一切了義經皆名摩呾理迦謂於是處世尊自廣分別法相及聖弟子已見諦跡依自所證亦無倒分別諸法體性此亦名為摩呾理迦亦名阿毗達磨由此文故傳受釋云許佛滅後十二分中論議一分三藏之內對法藏通弟子說不餘之十一分教并餘二藏通弟子說然此論中且論弟子見諦者說舉其勝者顯離諸失有所證故若實而論通取不見聖論者造亦是彼攝已上十卷者十大論師就三十頌一一造釋故天竺百卷論玄奘略譯為十卷述記云佛滅後九百年中天親生也同時唯有親勝火辨二大論師造此頌釋千一百年後餘八論師造此釋教興主者三十頌本天親菩薩之所作也已上疏云此論本頌唯有正說論其釋文具有三藏分已上三分者一宗前敬敘分從稽首唯識性至利益諸有情二依教廣成分從由假說我法至大牟尼名法三十頌三釋結施願分從已依聖教及正理至願共即登正上覺第三依教廣成分頌說五位百法等頭五位百法事論引六經十一論立宗義疏云又此論引六經十一部論華嚴深密如來出現功德莊嚴阿毗達磨楞伽華嚴也瑜伽顯揚莊嚴集量攝論十地分別瑜伽觀所緣緣二十唯識辨中邊論雜集也等為證理明唯識三性十地因果行位了相大乘故第三時中道之教也已上次上五位百法者所謂心王心所色法不相應無為也一一細分而成百法矣百法問答抄云頭心王心所事問先心王八者何乎答一眼識緣色生了別用識也以眼為所依住故名眼識二耳識緣聲生分別用識也以耳為所依住故名耳識三鼻識緣香生了別用識也以鼻為所依住故名鼻識四舌識緣味生分別用識也以舌為所依住故名舌識五身識緣堅濕燸動等觸生了別用識也以身為所依住故名身識已上五合名前五識行相相似故也六意識緣一切諸法生了別用識也以末那意為所依住故名意識此識別名第六識教中第六說故也七末那識緣阿羅耶識生了別用識也以阿羅耶識為所依住此識別名第七識教中第七說故也此識以第八賴耶識為所依為所緣也末那者梵語此云意意者思量之義此識恒起內緣阿羅耶見分思量我我故名末那也思量者思慮之義故意名雖通一切心法我我思量恒時無間斷故此識獨思量義勝故名末那也八阿羅耶識緣種子五根器界三種境生了別用識也以第七識為所依住故阿羅耶者梵語此云藏識此識具能藏所藏執藏三義故名藏識已上疏云此識體總有三位一我愛執藏現行位即唯七地以前菩薩二乘有學一切異生從無始來謂名阿賴耶至無人執位此名執藏二善惡業果位謂從無始乃至金剛心或解脫道時乃至二乘無餘依位謂名毘播迦此云異熟識至無所知障位三相續執持位謂從無始乃至盡未來際利益有情位謂名阿陀那此云執持或名心等長短分限已上璋圓抄云一我愛執藏位名阿賴耶一切異生二乘有學七地已前菩薩是也二善惡業果位名異熟識二乘無學等覺以還菩薩是也三相續執持位名阿陀那通佛果已上後二位不遮通前位第一位不通二乘無學八地已上第二位不通佛果已上依此有三位不同已上八識五十一心所者遍行五別境五善十一煩惱六隨煩惱二十不定四遍行五者一作意以特覺為性警覺心引令趣境故名作意以引心為業起作意義也問於心所作用何名性用何名業用答符自體性親用名性用疎自性用名業用也然心所本用名親伴作用名疎也警覺作意心所剋體本能也引心用警覺用上所帶伴用也警如火以燸為性用火體親用故燒物用名業用望火自體燸性上所帶用與火性疎遠燸性燒性共雖火能望火名義二用中有親疎餘心所性業用以此可知二觸心所令心心所觸境為性和合一切心王及心所令同取境是觸自性受想思等所依為業由此引起餘心所法各別功能故以受等所依為業三受心所領納順逆俱非境相為性起愛為業四想心所於境取像為性施設種種名言為業謂要安立境分齊相方能隨起種種名言五思心所以造作為性以塹促為業謂取境上正因邪因俱相違因塹入心善等分位即令造善等業此五心所一切心王心所起時必遍相應故名遍行此下有三受五受等不同別境五者一欲心所於所樂境希望為性勤依為業二勝解心所於決定境印持為性不可引轉為業三念心所於曾受境令心明記不忘為性定依為業四定心所於所觀境令心專注不散為性智依為業五慧心所於所觀境簡擇為性斷疑為業此慧心所有推求推度用皆是簡擇性用上差別也此五心所非必遍一切心隨應與心相應謂心若緣所樂境時有欲心所若緣決定境時有勝解也若緣所觀境時有定慧也若緣曾受境時有念心所既緣於別別境生故名別境心所也於定心所有生得散定修得禪定二類不同善十一者一信心所心淨為性對治不信樂善為業以印可決定勝解為因生二精進心所勇悍為性對治懈怠滿善為業三慙心所崇重賢善為性對治無慙止息惡行為業四愧心所輕拒暴惡為性對治無愧止息惡行為業慙愧俱以羞恥為用五無貪無着為性對治貪着作善為業六無癡明解為性對治愚癡作善為業七無嗔無恚為性對治嗔恚作善為業八輕安調暢身心堪忍為性對治惛沈轉依為業轉依者轉捨定障轉得安適也九不放逸於所斷所修防修為性滿善為業十行捨令心正等正直無功用住為性對治悼舉靜住為業十一不害心所於諸有情不為損惱為性能對治害悲愍為業煩惱六者一貪煩惱染著為性能障無貪生苦為業二嗔煩惱憎恚為性不安惡行所依為業三癡煩惱於諸理事迷闇為性一切雜染所依為業一切惑障以愚癡為前導生一切障生起四慢煩惱恃己於佗高舉為性能障不慢生苦為業於慢有七種本慢九種慢類略世五疑於諸諦理猶預為性能障不疑疑善品為業六惡見顛倒推度染慧為性能障善見生苦為業見者推求推度之義也隨煩惱二十者一忿心所憤發為性執杖為業二恨心所結怨為性熱惱為業三惱心所追觸暴熱恨候為性能障不惱蛆螯為業以上三心所以本惑中嗔惱為體無別體故假非實四覆心所於自作罪恐失利譽隱藏為性能障不覆悔惱為業此心所以貪癡二煩惱為體五誑心所為獲利譽現有德詭詐為性能障不誑邪命為業此心所以貪癡為體六諂心所為網陀矯設異義險曲為性能隘不謂教誨為業此心所為取佗意隨他氣色不現自本儀矯隨設異儀以險曲心為性也網者迫駈他心網帽自心七憍心所於自盛事深生染着憍醉徵為性能障不憍染依為業此心所行相顯此以本惑中貪煩惱為體憍醉者生長一切雜染故雜染所依為業也八害心所損惱為性逼惱為業九嫉心所殉自名利不耐他榮嫉妬為性能障不妬憂戚為業十慳心所不能惠捨祕悋為性能障不慳鄙吝為業此心所行相顯貪煩惱一分為體十一無慙心不顧自法輕拒賢善為性生長惡行為業十二無愧心所不願世間崇重慕惡為性能障礙愧生長惡行為業十三不信心所心穢為性惰所依為業翻信可知也十四懈怠心所懶惰為性此心所雖中惑別有體也能障精進增染所依為業十五放逸心所於染淨品不能防修縱蕩為性能障不放逸增惡損善所依為業行相顯此心所離隨煩惱中懈怠及本惑中貪嗔癡為體十九惛沈心所令心於境無堪任為性能障輕安毗鉢舍那為業此心所令瞢重也離本惑別有體十七掉舉心所不寂靜為性能障行捨奢摩佗為業此心所離本惑別有體也十八失念心所於所緣境不能明記為性能障正念散亂所依為業此心所別境中念煩惱中癡以為體十九不正知心所於所觀境謬解為性能障正知毀犯為業此心所以別境中慧及煩惱中癡為體二十散亂心所於諸緣令心流蕩為性能障正定惡慧所依為業問掉舉與散亂如何異乎答彼令易解此令易緣是二心所差別也不定四者一悔心所惡所作業追悔為性障止為業此心所亦名惡作惡所作業生追悔故也作者所作也惡者此心所行相也故名惡作也二睡眠心所令心不自在昧略為性障觀為業論云謂睡眠位心不自在心極闇劣一門轉故已上一門者睡眠位唯意識一門轉故也三尋心所尋謂尋求令心忩遽於意言境麤轉為性安不安住所依為業四伺心所伺謂伺察令心忩遽於意言境細轉為性安不安住所依為業意言境者聲名句文言說境也語言是唯意識所緣也意識所發也色法十一者一眼眼識所依根也能發眼識取色境令緣慮眼識二耳耳識所依根也能發耳識取聲境令慮耳識三鼻鼻識所依根能發鼻識取香境令緣鼻識四舌舌識所依根能發舌識取味境令慮舌識五身身識所依根也能發身識取堅濕燸動等觸境令緣身識以上五色名五根根者有勝用增上力故也根可訓根謂物根有勝用力生菓眼等亦爾也以是為根自此生識故也六色眼識所慮境也眼根所照境也於此色境有三類不同謂顯色形色表色也顯色者此有四青黃赤白也亦有九顯色種類謂影光明暗雲煙塵霧及空顯色也次形色者謂長短方圓細正不正高下是也次表色者取捨屈伸行住坐臥是也七聲耳識所緣境耳根所取也於氣有三類謂一內聲有情音聲二外聲外苑林風等音聲三內外聲拍掌等聲八香鼻識所緣境鼻根所取也於香好惡等種類不同准上可知九味舌識所緣舌根所取於味有六謂一苦二酢三辛四甘五鹹六淡十觸身識所緣境身根所取於觸有四堅濕燸動性是名地水火風觸處四大種十一法處所攝色是第六識所緣境於此有五種謂極略極逈受所引定所生遍計所起色已上五十一心所畢二十四不相應者一得獲成就者名之為得二命根者依業所引第八識種令色心不斷名為命根命即是根持業釋也或種實命假業為命因此依主釋三眾同分者類相似故名為同分眾即同分眾之同分持業依主二釋如次四異生性者由二障種令趣差別名異生性異生之性或異聖之性依主持業二釋如次皆得五無想定者由出離想不恆心滅名無想定六滅盡定者由止息想恆不恆心滅名滅盡定此二種或依主持業釋今存後釋七無想事者由欲界修感彼天果名無想報無想之報依主釋八名身者一名二名能詮自性名曰名身九句身者一句二句能詮差別名句身十文身者一字二字多字能為二所依名為文身此上三種皆持業釋十一生者先無今有名生十二異者法非凝然名異十三住者法有暫用名住十四無常者有法後無名為無常十五流轉者因果不斷故名流轉十六定異者善惡因果互相差別故名為定異十七相應者因果感起名曰相應十八勢速者諸行迅疾故名勢速十九次第者編列有敘故名次第此上五種竝持業釋二十時者過未等名時隨方域所說時分名時二十一方者色處分齊故名為方二十二數者度量諸法故名為數二十三和合性者不相乖故名和合性二十四不和合性者翻上應知此後五種竝無六釋已上二十四不相應義忠意六無為者頭六無為事一虛空無為者離諸障礙無物所照名曰虛空以虛望空亦無六釋若望無為即持業釋二擇滅無為者擇謂蕳擇滅謂斷染無漏智起斷諸障染所顯真理名擇滅無為若能滅名滅擇即滅擇滅之無為二釋如次若所滅名滅擇之與滅唯相違釋而望無為依主同前若滅性名滅滅即無為持業釋無為望擇亦依主釋不由擇力而本性清淨三非擇滅無為者滅緣闕所顯故名非擇滅若非擇名滅所滅性名滅滅性名滅持業相違依主三釋如次俱得非擇滅而望無為依前持業相違二釋非擇滅而望無為俱依主釋依前依主滅即是無為如理思擇若談真理不由擇力即但持業亦應思惟四不動無為者第四禪中出八災患所顯無為名不動無為不動兩字全無六釋不動之無為亦依主釋也五想受滅無為者無所有處想受不行所顯真如名想受滅無為想受即滅持業釋想受滅之無為依主釋也或滅定中想受不行從勝而說名想受滅無為六真如無為者理非妄倒故名真如真蕳於妄如簡於倒遍計依佗如次應知又真如者顯示常義真即是如即是無為俱持業釋已上問三乘修行差別何答百法問答云先三乘差別者此有五種性謂一切有情從無始第八識法爾無漏之種子五種各別一人天乘性二聲聞乘性三獨覺乘性四菩薩乘性五不定乘性是人天乘性類者都不具三乘無漏法爾種子故永不斷二障全不證二空唯受三界五趣有漏果永沒生死海依修五戒十善等世間戒善纔雖受人天勝妙果都不得出世解脫果此類亦名無性乘無三乘無漏種子故也次後四乘俱具無漏種子故名有種性於此聲聞獨覺二乘種性人唯斷煩惱障唯證我空理至自果極位菩薩乘種性人俱斷二障竝證二空理至佛果圓滿位也次不定乘性人者聲聞獨覺菩薩之三乘種性俱具入也於此有四類一菩薩聲聞二種不定二菩薩獨覺二性不定三聲聞二性不定四三乘俱不定也問聲聞乘人至自乘果行位何答凡位修七方便在聖位得四果如下卷俱舍等問緣覺乘人至自乘果行位何答根性極利根故不依佛果師友力不聞佛教聲獨得道得果故名獨覺也於此有二類一麟喻獨覺二部行獨覺麟喻獨覺者深作世無二佛思永不遇佛出世一大三千界唯獨一出無多類竝出纔初發心之時遇佛教法百劫練根之間無師自然修行百劫之後出無佛世界證辟支佛果即無學果也此人我出世國土若聞補處菩薩下生或移佗方或入涅槃也此類定性也次部行者此人初發心及百劫練根之間遇佛出世習學之於百劫練根後者有二義一義不遇佛出世百劫後者證獨覺之果故也一義百劫後雖遇佛出世正證果之時作世無二佛思往無佛世界或死出無佛世證獨覺果也正證果位一大三千界雖獨住證果後多類竝出故名眾出類於此有二類一本性類謂法爾種性安住部行人也二不聲聞類行聲聞乘回心成獨覺類也即聲聞獨覺二種性具人先心學聲聞乘後回心入獨覺道也從淺入深有道理故於此有二類一未得果回趣二已得果回趣也於得果四果回心各別也已上言菩薩者入道章有五位國五位事一資糧位有三十心所謂十住菩薩在此位安其心於六度等行未殊勝但得住名一發心住菩薩此位菩薩始發大菩提心二治地住淨治三業悲及有識三修行住修勝理觀起上妙行四生貴住從諸聖法正教中生五方便具足住所修善根皆為救物六正心住所聞讚毀心定不動七不退住聞說三寶三際有無心堅不轉八童真住三業清潔悟二世間真蕳偽虛童表無咎亦猶涅槃嬰兒之行九法王子住解真俗諦悟法王法將有所襲十灌頂住此位菩薩如王太子堪受王位矣十行者此位菩薩行六度等諸行勝故名之為行一歡喜行此位菩薩為大施主一切能捨三時無悔利譽不怖愍生慕法睹者歡敬故名歡喜行二饒益行常持淨戒不染五欲能令伏眾魔一切眾生立無上戒得不退地三無恚行常修忍辱謙卑恭敬和顏愛語不害自佗悟身空寂怨對能忍四無盡行設多劫受諸劇苦求法濟生念念不息五離癡亂行常住正念恆無散亂於一切法乃至生死入住出胎無有癡亂六善現行善入人法皆無性相三業寂滅無縛無著而復不捨化眾生心巧能隨類現生救物七無著行歷諸塵剎供養佛求法傳燈度生心無厭足然以寂滅觀諸法故而於一切心無所著八尊重行尊重善根智慧等法皆悉成就而由得斯諸尊重法二利之行更增修習九善法行得四無礙陀羅尼門諸善慧法能為眾生作清涼池守護正法佛種不絕十真實行此位菩薩成就第一義諦之語學三世佛真實之語無二之語如說能行如行能說語行相應色心皆順矣十回向者在斯位已凡所修行皆為回向者立回向名一救護眾生相回向此位菩薩而行六度四攝法等悉為救護一切有情令離生死得涅槃名救護眾生入平等觀不見怨親眾生等相稱離生相二不壞回向於三寶所得不壞信因持諸善回向眾生令獲善利三等諸佛回向學三世佛不著生死不離菩提修回向事四至一切處回向後習一切諸善根時彼以善根如是回向令此善根功德之力至於一切三寶之所一切世界之眾生處作諸供養利益之事五無盡功德藏回向修悔遇善根離一切業障於諸如來一切眾生所有善根皆悉隨喜以此善根皆悉回向莊嚴一切諸佛淨剎作佛事善巧方便具諸功德離諸虛妄而無所著由回向已得無盡善根六隨順一切堅固善根回向以內外財隨眾生意而惠施之見諸苦者悲以身代堅固安住自在功德以如是等諸功德而回向已令一切生得大智慧除滅大苦名隨順一切堅固回向七等心隨順一切眾生回向而能增長一切善根修習究竟安住忍力閉惡趣門永離顛倒不著諸行一切善根由皆悉回向為一切眾生作功德藏普覆一切拔出生死令得眾苦業無差異八如相回向成就念智安住不動心無所依寂然不亂不違一切平等正法嚴利度生所修諸善皆順如相而為回向九無縛無著解脫心回向所攝善根離憍慢等所有縛著得解脫心行普賢行所習諸善不犯為己及以他人以無縛著解脫之心回向饒益品物一切十法界無量回向此位菩薩離垢繒繫頂受大法師記法施化生嚴淨世界出生智等悉同虛空而無限量凡有善根修於回向等法界如是義廣如花嚴問此位初首有十信謂信進念定慧施戒護願回向計心四十何故但言三十心耶答即十住中初住離出以初發心甚難故聖教言四十心即據總別說也已上頌曰乃至未起識求住唯識性於二取隨眠猶未能伏滅已上此三賢頌也二加行位欲界善趣依身依第四靜慮起此四善根也見大化身佛界外入道章云加行者加功用而趣見道故名加行唯識云近見道故立加行名見道者無漏智唯識云此四總名順決擇分順趣真實決擇分故決擇者順無漏智名一燸此位菩薩初得見道火之前相故名為燸然見道體能斷煩惱如火燒薪故喻火燸位菩薩未得火體而得火相故名燸二頂此位菩薩依尋思智觀所取空此位功極故名為頂如山頂極三忍忍者印可達悟之義此位菩薩知妄執識及心外境而體皆空故名為忍四世第一法此位菩薩所得智等一切世間所有法中無先此者名世第一已上頌云現前立少物謂是唯識性以有所得故非實住唯識已上三通達位亦分二種一釋摠名言通達者證會之義此位菩薩無漏之智了證真如故名通達唯識云加行無間此智生時體會真如名通達位即是見道見道名真無漏智照理名見故唯識云初照理故亦名見道二釋別名二一真見道體離虛妄親能證理實能斷障故名為真又釋真者是理見者智證真之智名真見道二相見道者類似之義真見道後而起於於行解安模傲像真見所有功能不能證理及斷於障類似真故名相見已上頌云若時於所緣智都無所得爾時住唯識離二取相故已上四修道位此位菩薩修無分別智斷所餘障故名修習唯識云為斷除障證得轉依修無分別智已上十地見他受用身佛也一極喜地論云初獲聖性具證二空能益自他生大喜故已上斷異生性障證遍行真如修布施波羅蜜二離垢地論云具淨尸羅遠離能起微細毀犯煩惱故已上斷邪行障證清淨真如修淨戒波羅蜜三發光地論云成就勝定大法總持能發無邊妙慧光故已上斷闇鈍障證勝流真如修安忍波羅蜜也四燄慧地論云安住最勝菩提分法燒煩惱薪慧燄增故已上斷微細煩惱現行障證無攝受真如修精進波羅蜜也五極難勝地論云真俗兩智行相互違合令相應故已上斷下乘般涅槃障證無分別真如修禪波羅蜜也六現前地論云住緣起智引無分別最勝般若令現前故已上斷麤相現行障證無染淨真如修般若波羅蜜也七遠行地論云至無相住功用後遍出過世間二乘道故已上斷細相現行障證法無分別真如修方便善巧波羅蜜也八不動地論云無分別智任運起相用煩惱不能動故已上斷無相中作加行障證不增減真如修願波羅蜜也九善慧地論云成就微妙四無礙解能遍十方善說法故已上斷利他中不欲行障證智自在所依真如修力波羅蜜也十法雲地論云大法智雲含眾德水蔽如空麤重充滿法身故已上斷於諸法中未得自在障證菩薩自在所依真如修智波羅蜜也論云如是十地總攝有為無為功德以為自性所修行為勝依持令得生長故名為地已上又云十於十地離實皆修與隨相增地地修一離十地行有無量門而皆攝在十到彼岸已上說十勝行文也又云離真如性實無差別而隨勝德假立十種離初地中已達一切而能修行猶未圓滿為令圓滿彼彼建立已上說十如文問於十地一障二愚配立何答十種障者一異生性障二邪行障三闇鈍障四微細煩惱現行障五下乘般涅槃障六麤相現行障七細相現行障八無相中作加行障九利佗中不欲行障十於諸法中未得自在障如次十地斷之一執著我法愚二惡趣雜染愚初地三微細悞犯愚四種種業趣愚二地五欲貪愚六圓滿聞持陀羅尼愚三地七等至愛愚八法愛愚四地九純作意背生死愚十純作意向涅槃愚五地十一現觀察行流轉愚十二相多現行愚六地十三細相現行愚十四純作意求無相愚七地十五於無相作功用愚十六於相自在愚八地十七於無量所說法無量名句字後後慧辨陀羅尼自在愚十八辯才自在愚九地十九大神通愚二十悟入微細祕密愚十地二十一於一切所知境極微細愚二十二極微細凝愚佛地已上於十地等覺位位斷之問一障二愚斷大意何答唯識十云煩惱障中見所斷種於極喜地中見道初斷彼障現起地前伏修所斷種金剛喻定現在前時一切頓斷彼障現起地前漸伏初地以上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失八地以上畢竟不行所知障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種於十地中漸次斷滅金剛喻定現在前時方永斷盡彼障現起地前漸伏乃至十地終心永盡八地以上六識俱者不復現行已上一煩惱障者論云煩惱障者謂執遍計所執實我薩遮那見而為上首二十八根本煩惱及後等流諸隨煩惱此皆憂惱有情身心能障涅槃名煩惱障已上二所知障者論云所知障者謂執邊計所執實法薩迦那見而為上首疑無明愛恚慢等覆所知障境無顛倒性能障菩提名所知障已上論云如是二障分別起者見所斷攝任運起者修所斷攝已上二乘但能斷煩惱障菩薩俱永斷二障唯聖道能伏二現行通有漏道已上言斷煩惱者一見所斷由邪教邪師自分別三緣起在第六識通二障亦云分別惑第六力所引五識亦有之問極微細礙愚佛地斷云何智斷之乎答金剛喻定現在前時以一念相應慧斷之問此金剛喻定之無間道者因果二位中何哉答因位也問十地之間斷地地障皆以當地智品斷之謂於當地智起無間解脫二道之智無間道斷惑解脫道證理也何至佛果障以因位智為無間道耶既是佛果勝智之障也定以彼勝智可斷之何以因位劣智可斷之耶凡斷惑如明闇相違闇是與明障也明亦與闇障也故明來闇去斷惑義亦如是既是佛果障也佛智明法現前雖違彼障可生何非佛智因位智現前位先立滅之也答斷惑必有無間道解脫道無間道正斷惑解脫道證彼擇滅及斷麤重故無間道未圓滿未清淨解脫道圓滿清淨也而若佛果智為無間道者彼位未捨麤重故可非清淨又正敵對惑位故未已脫圓滿若爾豈無佛果勝劣過耶故以十地圓滿最後念智品為佛果無間道也但於明闇相違難者自本因位最極智引極圓明佛智故彼最極智其性與佛果微細障相違性也故彼金剛無間智生時佛果障明闇相違永斷也雖是劣智其性法爾與佛果障相違性故也於彼麤重者與金剛無間智不相違故此位未斷第八識猶有漏異熟無記猶為麤重所依不佛也此智無間起佛果解脫道智之時與彼相違彼麤重滅故第八識成無漏入圓滿佛位也既彼麤重障以佛果解脫道智捨故佛果智對障非無明闇相違之義麤重闇與佛智明闇相違捨故問何故以彼因位最後智名金剛無間耶答金剛者能斷之義也智如金剛輪以喻為名無間者有二義或加行心無間正能斷智生故名無間或此智無間必解脫道生證彼擇滅故名無間也問何故名等覺乎答等覺妙覺智如十四五月功德智慧大旨等佛果故名等覺也雖有微細障是不幾障礙如羅網中見月等也譬如王與太子立等覺名最有其謂也問金剛無間道在第十地滿心者經幾時分耶答正斷惑位唯最後一念也若論方便道可多時問其方便道者何位乎答於得佛智有等覺妙覺妙覺者正解脫道佛果也等覺者為得此位第十地滿心所修也是皆金剛心方便也問修方何耶答瓔珞經云百劫修千三昧千劫學佛威儀萬劫化現成佛入大寂定是等覺菩薩意云第十地有入住出三心其出心滿心為成佛修彼方便謂菩薩十地滿心為受佛位色究竟摩醯首羅智處城住此名大自在宮菩薩在彼百劫之間修千三昧其間修學佛果功德次千劫之間漸學佛威儀次萬劫已示現成佛相也謂十方諸佛來集頂灌智水現授佛位儀式名授戒灌頂儀式如是習學其最後念起一念金剛無間智斷佛果障也如是千劫習儀式名等覺位也故正斷惑金剛心雖一剎那以方便攝根本名金剛心者可多時也五究竟位二障雲悉霽顯二轉妙果二種生死共離備三身妙體諸有漏法永盡八識皆圓明舍容無邊希有大功德能生五乘世出世利樂車因行既無邊故果德亦無限也是為究竟位相也已上五位又初宗儀者立三時教解深密經二云爾時勝義生菩薩復白佛言世尊初於一時在婆羅痆斯仙人隨處施鹿林中唯為發趣聲聞乘者以四諦相傳正法輪惟是甚奇為希有一切世間諸天人等先有能如法轉者而於彼時所轉法輪有上有容是未了義是諸諍論安足處所有教世尊昔在第二時中唯為發趣修大乘者依一切法皆無自性無生無滅本來寂靜自性涅槃以隱密相轉正法輪雖更甚奇為希有而於彼時所轉法輪亦是有所容受猶未了義是諸諍論安足處所空教世尊若善男子或善女人於此如來依一切法皆無自性無生無滅本來寂靜自性涅槃所說甚深了義言教聞已信解書寫護持供養流布受誦但如理思惟以其修相發起加行生幾所福說是語已爾時世尊告勝義生菩薩勝義生是善男或善女人其所生福無量無數難可喻知已上私云經文三分可見一有教亦名人空法有教此攝諸部小乘教二空教亦名人法皆空教此攝諸部般若教三中道教亦名非有非空教此攝祕密華嚴法華等經唯識三性者解深密經第二一切法相品云謂諸法相略有三種一者遍計所執相二者依佗起相三者圓成實相如何諸法遍計所執相謂一切法名假安立自性差別乃至為令隨起言說云何諸法依佗起相謂一切法緣生自性則此有故彼有生此故彼生謂無明緣行乃至招集純大苦蘊云何諸法圓成實相謂一切法平等真如於此真如諸菩薩眾勇猛精進為因緣故如理作意無倒思惟為因緣故乃至能通達於此通達漸漸修習乃至無上正等菩提方證圓滿已上唯識三十頌云由彼彼遍計邊考邊恐遍計種種物此遍計所執自性無所有已上同論云或初句顯能遍計識六七二識周遍計度故名遍計品類眾多說為彼彼第二句示所遍計境謂所妄執蘊處界等若法若我自性差別如是自性都無所有理教推徵不可得故略抄頌云依他起自性分別緣所生已上論云由薰習力所變二分從緣生故亦依佗起遍計依斯妄執定實有無一異俱不俱等略抄頌云圓成實於彼常遠離前性已上論云二空所顯圓滿成就諸法實性名圓成實無漏有為離倒究竟勝用周遍亦得此名今此頌中說初非後依此即於彼依佗起上常遠離前遍計所執二空所顯真如為性已上三性顯名體問三性各別體哉答盡遍計之情者不即不離也唯識論云此三為異為不異乎應說俱非無別體故妄執緣起真義別故已上同疏云若言異者無別體故謂妄所執名利非離依他別有初性體若彼有體可說異故圓成實性是依他之實性不可說三性異也非不異者妄執是初性緣起是第二性真義是第三性既此三別不可言非不異矣十地因果行位者如上了相大乘者唯識論云我法非有空識非無離有離無故契中道已上此宗意盡情量後八識皆中道五分十支者瑜伽師地論百卷義理大分為五分五分者一本地分者從初一卷至五十一二攝決擇分者從五十二至八十二三攝釋分者從八十三至八十四四攝異門分者從八十五至九十五攝事分者從九十至百矣瑜伽師地者抄云般若波羅蜜是為無上瑜伽法故餘處說此慧度一攝無分別空名為瑜伽能發一切勝功德故餘處後說菩薩所有殊勝慧悲平等雙轉名為瑜伽能證無住大涅槃故如是等說諸不共行名為瑜伽能證無上菩提故於如是等諸經論中說一切行皆名瑜伽已上又云如是瑜伽隨分滿足展轉調化諸有情故名瑜伽師或諸如來證瑜伽滿隨其所應持此瑜伽調化一切聖弟子等令其次第修正行故名瑜伽師地已上又云今此諸體摠有五分一本地分略廣分別十七地義二攝決擇分略攝決擇十七地中深隱要義三攝釋分攝略解釋諸經儀則四攝異門分略攝申諸經法名義差別五攝事分略攝宣三藏眾要事義已上十支者一者百法論一卷名略陳教論世親造玄奘譯二者五蘊論一卷名粗釋體義論又名依名釋義論世親造玄奘譯三者顯揚論二十卷名摠包眾義論無著造玄奘譯四者攝大乘論本三卷名廣包大義論本無著造釋天親無性等玄奘譯五者雜集論名分別名數論又名廣陳體義論無著造釋師子覺釋安慧菩薩玄奘譯六者辨中邊論名離僻彰中論名摧破邪山論本一卷彌勒造釋三卷天親造玄奘譯七者二十唯識論一卷名摧破邪山論世親造玄奘譯八者三十唯識論名高建法幢論本世親造玄奘譯釋護法等九者大莊嚴論名莊嚴體義論十三卷又十五卷本慈氏造釋天親十者分別瑜伽論名攝散歸觀論未翻彌勒造略頌云百五顯攝及雜集中邊二十與三十莊嚴分別瑜伽論或除攝論加理門正理門論名建正摧邪論已上法相宗者如來滅後一千五百七十九年唐太宗王治三年貞觀三年己丑玄奘三藏至中天竺大那蘭陀寺奉值戒賢論師習瑜伽唯識并俱舍論等戒賢生年百四歲也同十九年歸唐土時太宗王貴此事進金縷袈裟又於長安宮令譯彼經論等太宗二十三年己酉崩御後高宗王庚戌年又同貴此奉詔令出經論二帝之間七十二部一千三百四十七卷其中以六經十一論而為所依弘此法時有三千人弟子其中有七十人長者其中又有四人達者謂眆尚光墓考墓恐基也中以墓考墓恐基法師為寫瓶弟子慈恩大師是也此師所立名法相宗也次我朝人王第四十代天武天王治十九年朱鳥五年智周大師弟子新羅國智鳳傳來一切經律論於日本白鳳十四年甲戌年於川原寺始寫一切經論日本義淵僧正傳此法授良辨僧正也又智通智達二沙門奉勅乘新羅國舟渡海奉值玄奘受無性義并俱舍宗來又第四十四代元正天王治九年癸亥三國傳元正寶龜二年丙辰南都玄眆僧正入唐經八年聖武王天平二年庚午將來五千餘卷經論已上地論宗南地北地者漢土帝王所居南北分矣南方三宗北方七宗也如日本南都北京南三者天台玄義十云虎岳笈法師立三教一頓教華嚴二漸教此亦有三一有相教十二年前明三藏見有得道二無相教十二年後至法華明見空得道三雙林常住教明眾生佛性闡提作佛三不定教勝鬘金光明楞伽鸞掘經宗愛法師立三教一頓教花嚴二漸教四時三不定教如前漸教四時者一有相教阿含十二年前見有得道二無相教十二年後方等般若三同歸教法華四常住教涅槃定林柔次二師及道場觀法師立三教一頓教華嚴二漸教五時三不定教勝鬘經等漸教五時者一有相教華嚴二無相教如前三褒貶抑揚教淨名思益等諸方等四同歸教如前五常住教如前已上取意北七者玄十云北地師立五時一人天教提謂經二無相教淨名般若三四五同南菩提流支立二教一半字教十二年前小乘教二滿字教十二年後大乘又約教理根證同異判一代佛教佛陀三藏學士光統立四宗一因緣宗毗曇六因四緣二假名宗成實三假三誑相宗大品大論真宗通宗四常住宗涅槃華嚴等常住佛性本有湛然真實宗通宗護身法師開五宗前四宗如上五法界宗華嚴耆闍法師開六宗前四宗如上五真宗法花萬善同歸六圓宗大集經染淨俱融性海圓普北地師明二種大乘教一相大乘華嚴瓔珞大品等二無相大乘楞伽思益等北地師非四宗五宗六宗二教半滿等教而立一音教也已上取意又南北通用三教一頓教華嚴二漸教有二一有相教十二年半字教二無相教般若乃至常住三不定教勝鬘金光明等已上玄十取意教證等者華嚴經一心法界圓融之教歟其故六相圓融名目同華嚴故證者五十二位位位證佛智云之歟其故六相圓融者除斷常邊邪見蕩一異隔別之情入摠持無礙義門得究竟自在道理故位位成佛無疑矣六相者如華嚴明四宗者一立性宗毗曇之意二破性宗成實之意三破相宗大乘空無相之義四顯實宗真如法界隨緣之義矣攝論宗鏡水抄云頭攝論宗事攝大乘等者阿毗達磨經中有攝大乘品中攝十種殊勝義故名攝大品此論解彼攝大乘論名攝大乘論已上亦此論立十種之名而釋法相一法名謂五蘊十二處十八界之三科二人名謂十信三賢十地等覺妙覺三教名謂修多羅此云法本長行祇耶此云重頌亦云應頌伽佗此云諷誦三四六句和伽羅此云授記菩薩等優陀那此云無問自說設機授尼陀那此云緣起應緣起說目陀伽此云本事說弟子先世事阿婆多那此云譬喻舉喻況彼所說之法舍陀伽此云本性說佛因行毗佛略此云方廣謂正理云方包含云廣阿浮陀此云希有法亦云未曾有大乘實理優婆提舍此云論議問答往復顯真理等十二部四義名謂蘊處界等所顯義理明分別之五性名謂無義文字無所詮表不生義解六略名謂眾生等十界生摠云眾生故云略名歟七廣名謂眾生之種類各有差別隨名義無量八不淨名謂凡夫等不入無漏之淨地故不淨九淨名謂生滅假法即真如之實理也十究竟名謂真如也不落機情之處法體云真如已上摠名依止等十種者以攝論可考之梁代攝論來此土者四意趣四祕密如傳通記
