body:
  text: 期淨國沙門良山集靜以國序事法性自爾圓海萬象一如而言斷真如常住卓處諸法雙亡兮心滅焉高高寂寂更無凡聖形湛湛廣廣曾盡迷悟情然月氏佛陀説性海無礙法法自在震旦僧伽述當位即妙事事實相十界性相併莫不一曼荼羅會場雖然凡夫昏盲不識二諦中道不明八識所現起自他念受顛倒生因茲諸佛番番出世挑法燈照迷衢器雖區各得其益爾上根勇猛而得脫速下機怯弱兮取悟遲此彌陀覺王獨發濟凡願導難度者教主隨自意在此哉今我元祖空上人者摩訶那鉢菩薩化現而誕應日域假作凡身示有塵垢外尋自身出離法內求衆生解脫術總開千函祕藏金典窺釋尊密意深法別探八帖靈相玉章契善導殷勤勸化或述雜詞花於諸山長者讚授心珠乎一州窮子是併導師冥授之功哉尚又下露點於楮而洽末葉其中有一軸號淨土初學鈔雖枚紙少義廣而牽八萬藏綱紀意深兮張十三宗羅網歎有餘哉或余閲之雖解知不臻志在遺弟故忘他嘲僅記所勘得名初學題額集録為上中下分為本末六卷上卷三國緣起并淨家題名中卷華嚴法華三論法相地論攝論題名下卷圓戒真言成實俱舍戒律宗門題名焉問成劫相何答成劫相者三災火水風壞劫後唯有虛空無有世界經二十劫已諸有情業增上力故下際微風發是時諸天見微風起唱言此劫欲成如是展轉其風盛猶若金剛以為風輪堪持世界次光音天二禪天也下金藏雲雲色如金注雨遍滿風輪上三千界內其雨一渧如車軸如是水輪深八洛叉八洛叉水上餘水厚三億二萬凝結成金輪是成水金二輪次金輪更注大雨其深至欲界頂又大風吹此水次第從上成天宮乃至四天下山河大地等也水上清者初成天宮上是最勝下漸劣如是從上六天乃至須彌七金山等次第成已次昏濁水成餘山河大地等已上劫章問有情世間成相何答有情世間成相者器界成已二禪梵王下生初禪獨住一增滅劫見下界成已次方作是念我無梵子作是念時有極光淨天來生初禪梵王言因我念而來梵子亦云我因王念而至如是從上次第皆成已上劫章器世間一劫成有情世間十九劫成問何名住劫答劫初時此洲人壽無量至住劫初壽方漸減從無量減至十歲名住一小劫此後有十八劫最後第二十劫唯有增無減此名住劫增無過八萬減唯極十年問劫初時人身量并壽量何答劫初時人長千尺二千尺形色端嚴身帶光明飛空自在壽命無量者指八萬四千歲問彼時人何以為食答劫章云所食地肥地味地餅香味具足資諸人已上地肥等者地膏其味如甘露其色如乳蜜能凝者餅也問此等人身相等減相何答時有一人耽味香起愛取嘗便食餘人隨學競取食之爾時初名受段食故身漸堅重身光隱沒黑暗便生日月衆星從兹出現人漸貪地味故地味便隱沒從此以後地皮餅生競取食時地餅復隱時復林藤果生耽食果復隱復有自然香稻不種自生衆共取之以充所食唯有粳米祥白無皮所食粗故生大小便仍人生男女二根宿習力故相視作非理作意欲貪鬼魅惑亂身心遂行非梵行時有一人取香稻貯擬後食餘人隨學漸多停貯多收無厭稻仞朝生暮果人多貯故後不爾漸減日數過生爾時分田定疆時諸人聚議衆內立一有德之人名為田主各以所收之物六分之一以貢田主以一人為主以政法治之佛本行集經云此賢劫初地建立已有一最尊富貴轉輪王種名曰田主王田主有一子名真實為轉輪王王四天下真實王千子內有長子名意賢意賢王千子內有長子名自用自用王千子內有一長子名智者智者王之千子內最初長子名頂生紹父位乃至難勝王子名葇草葇草王子名大葇草大葇草王世世相承子子孫孫苗裔合有一百八王彼百八最後大葇草王無有子即作是念我今無兒誰當繼我王種我今斷諸王種後生此念我今若不出家修道則斷一切賢聖種思惟已以王位付諸大臣剃除鬢髮服出家衣已持戒精進成就四禪具足五通得成王仙壽命極長年至衰老雖後柱杖不能遠行時彼王仙諸弟子等欲往東西覓飲食取好軟草安置籠裏用盛王仙懸樹枝上以何故畏諸蟲獸來觸王仙故時諸弟子乞食去有一獦師遙見王仙謂是白鳥即射之彼王仙被射已有雨滴血出墮於地即便命終爾時彼地有雨滴血即生二甘蔗以高大時至甘蔗熟日灸開割其一甘蔗出一童子更一甘蔗出一童女端正無比時諸弟子及諸大臣往至彼林迎二童子時逐入宮童子名善生後甘蔗生亦名甘蔗種其童女名善賢復名水波時諸大臣以彼童子即立為王其善賢女為王第一之妃時甘蔗王有第二妃生於四子一名炬面二名金色三名象衆四名別成其善賢妃唯生一子名為長壽端正無比時甘蔗王三子沒後唯有一子名尼㸸羅此言別威為王住迦毗羅城治化人民尼㸸羅王生於一子名曰㸸盧其拘盧王生一子名瞿㸸盧其瞿㸸盧王有一子名師子頰師子頰王生四子第一名閻頭檀王此云淨飯第二名輸㸸盧檀那此云白飯第三名途盧檀那此云斛飯第四名阿彌都檀那此云甘露飯有一女名甘露味第一淨飯王次繼王位還在父城治化人民王有二子一悉達二難陀第二白飯王有二子一跋提二婆婆第三斛飯王有二子一提婆達多二阿難第四甘露飯王有二子一摩訶男二阿泥留豆第五甘露味女有一子名施婆羅已上悉達太子十九二月八日踰都城捨國位行四百八十里至阿那摩國於檀特山出家六年苦行三十而摩竭提國菩提樹下金剛座上二月八日成等正覺南閻浮提中天竺有摩竭提國此寂滅道場三七箇日間對金剛幢金剛藏法慧功德林之四菩薩加説華嚴次經五十七日赴梵王請於波羅奈國鹿野園對五比丘等十二年間説四阿舍次王舍城鷲峯山七會逝多林給孤獨園七會他化自在宮摩尼寶藏殿一會王舍城竹林園中白露池側一會對大乘根性機三十年間説般若經次靈山二會虛空一會對大乘調熟機八箇年説法華經佛年四十二年初説法華經也王舍城釋尊四十二對韋提等説淨土經等㸸尸那國城跋提河沙羅雙樹下一日一夜間説涅槃經佛五十年化緣盡御年八十二月十五日夜半沙羅雙樹下入涅槃矣佛滅後摩訶迦葉等一千餘羅漢坐列阿難登高座正唱佛所説餘九百餘羅漢染筆阿難一唱言寫多羅葉自其次第相續迦葉等二十餘聖者相傳正法千年間天竺流布問釋尊出家之相何答釋迦譜引普曜經云以劒自剃髮而作是言今落鬚髮願共一切除斷煩惱及以習障已上五分律云菩薩隨緣之示現不可定量問釋迦佛菩薩何時學藝乎答依普曜經太子七歲到於學堂有博士名毗奢密多此云還友見菩薩威迷悶躃地都率天子名曰清淨牽手令起菩薩問師云有六十四書汝欲教何師聞未聞喜捨慢即歎菩薩無比德已上西域記云七歲之後漸授五明大論云一曰聲明釋話訓字詮目流別二曰工巧明技術機關陰陽曆數三曰醫方明禁呪間邪藥石針艾四曰因明考定正邪研核真偽五曰圓明究暢五乘因果妙理已上補注名之內五明外五明者前三同內四呪術明五符明也已上助宣記云外五明者前四名同內五符印明也已上問外道法所立何答慧睴云成劫中有外道出世梵云劫毗羅此云黃赤色以頭髮眉面色皆黃赤故時人號為黃赤仙人古云迦毗毗仙人訛也其後弟子十八部中上首者名筏里沙此名雨雨際生故其雨徒黨名為雨衆梵云倌奢薩怛羅此云數論謂以智數數度諸法從數起論論能生數故名數論造論者及學人名數論師論造二十五諦法亦名金七十論金耳國王外道與七十斤金裹美故名金七十論即是數論也論有二十五諦一者我以思為體欲受外境三德便變三德者勇塵暗之三也我思勝境時勇塵暗變起二自性古云冥性未成大等名自性三將成大等名勝將勝異舊故自性別名即三德梵云薩埵剌闍答摩薩埵此云有情及勇健義今取勇健義次剌闍此云微亦云塵坌取塵義後答摩此云暗鈍鈍暗自性正名勇塵暗言至德者如論言名染粗黑今為赤黑舊名喜憂暗亦名貪嗔癡舊云苦樂捨由此三德是生死因神我本性解脫我思勝境三德即變我為境纏縛不得解脫後厭欲境修道我不思境自性不變我離境縛即得解脫也外道前八萬劫之外為冥冥性如我臣佐也我為二十五諦也三德從自性生大我思外境三德體故四從大生覺八萬劫內有所覺知故八萬劫前不覺為冥性五從覺生五遺量即色聲香味觸即是能造六以五遺量生五大即所造法七從五大生十一根眼耳鼻舌身大小便兩手足語具心平等即內心也二十三諦皆是轉變無常色能造火火還赤色能成眼眼能見色聲能造空空有聲聲成耳根耳根能聞聲香能造地地多香故地成鼻鼻能取香故味造水水多味水能成舌舌能嘗味觸能造風故風能成身身能覺觸五塵共生五大五大共成五作業根五作業根肉舌手足大便小便及心平等根我若受用外境即從前生後我若不受用外境即從後却入冥性四句分別一有能變化即名冥諦二有從他變即十一根三有能變化亦從他變即覺五遺量五大四不能變化不從他變即神我是造二十五諦論了作大石方圓如一張床告門人曰有人問汝二十五諦不得答者即書問石上後至天親菩薩弟子陳那菩薩即問汝所立我為作者為受者答言受者又問為常為無常即欲言常不答受境若言無常我義不成答言常比量故破汝我義是有法應無常宗法因云以受外境故同喻云如受蘊住主數日答義不得石即流汗震吼破散已上成劫之末有外道出名吠世史迹奢薩怛羅舊云衛世師此云勝論即造六句論勝前數論或勝人故名勝論亦名唱路迦此云鴟鶹舊云憂樓迦訛也謂身形醜惡驚他産婦死因此晝藏夜出求食於場粳中因人云食米齋仙人造六句論一梵云陀羅標此云主諦即實句義以九法為體地水火風空時方我及意是常世界成即聚不增壞即散為極微故不減與二十四法為所依二梵云求那此云依諦是德句義以二十四法為體頌曰色味香觸與數量一異合離彼此覺苦樂欲嗔勤考勤一作動勇重海洞行法及作聲此別配前九法六句論説三梵云羯磨此云即作諦是業句義五法為體取捨屈伸行離實德外別有五法令實德作業四梵云三摩若此云總相諦是大有句義十句論名總同句義即前實德業不能自有由別有一大有有之五梵云毗尸沙諦此云別相諦是同異句義十句論名俱句分別句離實德業外有別自性人與人同別有同法令同人與畜異別有異法令異實德業三各有總別之同異六梵云三摩夜諦此云無障礙諦是和合句義能令實等不相離或此論如父母令能生其子地水和合能生萬物造六句論成要得一人傳受須具七德一生中同二上種姓三寂滅因四身相同五聰明辨捷六性行柔和七具大悲心後劫減位波羅底斯國有波羅門名摩納婆此云儒童儒童有子名般遮尸奇此云五頂頭有五角髮有五旋七德雖具根熟稍遲為染妻妃卒難化導後同遊戲與妻競花由此相厭即却念言性目仙人在於何處仙人得通應時而至迎至住處為説六句論矣後末代十八部中上首名戰米建底此云慧月造十句論開同異句為二更加有能無能俱分三句也已上俱舍抄也慧月十句者一實句二總句三業句四大有句五俱句六分別句七有能句八無能句九俱分句十無説句也總外道有本源之三師支流之六師本源之三師者一迦毗羅計因中有果二漚樓僧伽計因中無果三勒沙婆計因中亦有果亦無果支流六師各有三種法一富蘭那迦葉計不生不滅持三種法一得一切智法解心明利通一切法名一切智外道二得神通法發得五通停恆河在耳名神通外通三得韋陀法世間文字等悉能解知者名韋陀外道二末伽梨拘賒梨子計衆生之苦樂無有因緣自然而爾三種法如前三刪闍夜毗羅胝子計衆生時熟得道必經劫數任運自盡苦際三種法如前四阿耆多翅金銀婆羅計非因三種法如前五迦羅鳩馱迦旃延計諸法亦有亦無三種法如前六尼犍陀若提子計業所作定不可改三種法如前釋摩迦衍論鈔慈行云四宗外道者一數論師執有性與諸法一即當有句二勝論師孰有等性與諸法不一當非有句三無慚外道執有等性與諸法亦一亦異四邪命外道執有等性與諸法非一非異已上取意引廣百論問外道所期極果何答祕藏寶鑰云上生非想下住仙宮身量四萬由旬壽命八萬劫厭下界如瘡瘀見人間如蜉蝣光明蔽日月福報超輪王已上問以何行相得此報答寶鑰云諸外道等亦立三寶三學等名梵天等為覺寶四吠陀論等為法寶傳授修行者為僧寶十善等為戒四禪那即定此定由六行而得問諸外道同修三學生彼二界證空三昧言亡慮絶何由不得斷煩惱證涅槃答觀著二邊定帶二見故問同觀非有非無何墮二邊二見乎繫屬他主不知因緣中道故因緣中道其意云何觀因緣有故不墮斷邊觀自性空故不墮常見觀有空即法界則得中道正觀由此中道正觀故早得涅槃外道邪見人不知此義是故不得真圓寂已上此等外道無始時相承佛法違失佛法之本旨故見解僻見故非因計因執天等震旦興法者弘決引清淨法行經云月光菩薩彼稱顏回孔子弟子光淨菩薩稱仲尼孔子迦葉菩薩彼稱老子已上法苑珠林云周時老子者姓季名耳字伯陽其母感大流星而有懷經八十一歲乃生生時割其母左腋出出而白首故謂之老子已上老子經云虛無自然道吾不知其名故字之曰道乃至一氣道者萬物之奧奧藏也道為萬物之藏無所不容玄德深矣遠矣玄德之人深不可測遠不可極妙已上周易鉤命訣云天地未分之前謂之一氣於中轉有五運運謂運數謂時改易取易義謂太易太初大始大素大極氣象未分謂之太易此是一氣正取最初極本元氣始萠謂之太初氣形之端謂之太始氣形變有質謂之太素質形已具謂之太極轉變五故名五運從太易轉成四焰本五運已上纂要云五氣運通為天地之二靈天地形別謂之二儀已上圓覺鈔引周易云天是定體之名乾是體用之稱即體之用天以乾為用故運行不息應化無窮此天之自然之理故聖人當法此自然而施人事亦當應物成務云為不已終日乾乾無時懈怠是以因天象以教人事矣文言云孔子周易末乾始能以美利利天下不言所利大矣哉已上乾有四德謂元亨利貞也文言云元者善之長也莊子云天之元德始生萬物善之大者莫大施生如父母之恩最重良由能生此身故故辜其恩不報者五刑之屬三千而罪莫大於不孝若報者孝順之福亦世大故古來至孝皆德感天動地即知能生人命世之上上善故佛教云造千箇佛圖不如活一人命然萬物雖各有所生之處展轉推窮至於最初是乾陽為始生之本故乾於此得名為元即知元者善之長也亨者嘉之會也天能通暢萬物使之會聚故云爾也利者善之和也天能利益庶品各得其宜而和同也貞者事之幹也天能以中正之氣成就萬物各得幹濟莊氏之意以是四句明天德元是物始於時配春亨是通暢於時配夏利為和義於時配秋秋既物成各合其宜貞為幹濟於時配冬物成收藏事皆幹了於五行之氣唯少於土土則王四氣四氣運行非土不載故也四氣即四時矣已上人叶此四德儀正為德又云君子行此四德者元仁亨禮利義貞信為四德不論智者行此四事並須智故乾者總也元亨等別也次坤德者正具元亨利之德兼具貞之德也繫辭云乾知太始坤作成物乾以易知坤以簡能天地之道不為而善始不勞而善成故曰易簡易知簡則易從易知則有親易從則有功順萬物之情故曰有親親通天下之志故曰有功有親則可久有功則可大有易簡之德則能成可久可大之功可久則賢人之德可大則賢人之業天地易簡萬物各載其形聖人不為群方各遂其業德業既成則入於形器故以賢人目其德業易簡而天下之理得矣天下之理莫不由易簡而各得順其分位也已上圓覺經鈔孔子自然道注千字文云有人問顏回曰汝之夫子道德多少如何也回答我夫子道德如人湯於大海飲水水足而去亦不可測量海水深淺升斗多少之數我量夫子道藝亦然已上又云人須恆懼五常在天為五星在地為五嶽在人為五常也五星者東方歲星南方熒惑星西方太白星北方辰星中央鎮星此為五星在地為五嶽者東嶽泰山南嶽衡山西嶽華山北嶽恆山中嶽嵩山此為五嶽在人為五常者仁義禮智信是也問曰何名為仁答好生惡殺名仁敵而無怨名義敬上愛下名禮怨親平等善惡俱齊名智言無反覆名信能行此者至立道已上次道士法者雖周易人異作法異也法違宗人術作為先周易意乾者卦之名其卦者繫辭云乾知太始坤作成物已上周易辭云卦者挂也言懸挂物以示於人故謂之卦但二畫之體雖象陰陽之氣未成萬物之象不得成卦必三畫以象三才寫天地雷風水火山澤之象方謂之卦故繫辭云八卦成列象在其中是也但初有三畫於萬物變通未畫故更有之而有備萬物之形象窮天地之能事故六畫成卦已上此封一長為陽畫二短為陰畫也纂要云陽氣輕清上浮為天陰氣重濁下凝為地融和之氣為人謂之三才人者盤古君龍首人身呼為風雨吠為雷電開眼明閉眼夜死後有開闢左目為日右目為月毛髮為草木骨節為山林小腸為江大腸為海血為灌瀆已上取意此宗盤古王為根本而思量諸法思度天下以八卦與算術正計日月星宿新定天下之吉凶現十八變等纂要云天地元氣之所生也天謂之乾地謂之坤天圓而色玄地方而色黃也已上元氣成天地天地云二儀以天地人云三才地盤古君混天圖云首君盤古治天下九萬八千年天皇氏十二頭兄弟十二人治天一萬八千歲地皇氏十一頭兄弟十一人治天五萬四千歲人皇氏九頭兄弟九人治天四萬五千六百歲五龍氏兄弟五人此一人異本凡合九百三十七萬三千六百歲私云已下少少加別書攝提氏治天六十四萬九千五百歲合熊氏治天六萬三千歲連遙氏治天三萬三千歲敘命氏治天四萬歲有巢氏治天百餘歲燧人氏治天三萬六千歲伏羲氏女媧乃至帝堯已上女媧氏下有十四帝謂女媧氏共工氏大庭氏柏星氏中央氏粟陸氏驪連氏赫胥氏尊盧氏渾沌氏昊英氏朱襄氏葛天氏無懷氏此十四皆襲伏羲名異書葛天氏次加陰康氏為十五帝曆代互見圖曰皇宋馬仲虎作大國王代記至皇宋末此書略抄也大昊伏羲氏風注木德都大昊之墟亦曰包羲之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文於是始畫八卦造書契以代結繩之政由是文籍生焉教民為網罟以佃以教教民在位百一十年炎帝神農氏薑姓火德都魯始教民播種五穀後斷木為相操木為耒以教天下日中為市在位百四十年臨魅承明直釐哀倫共八代合五百二十年末代侵淩諸侯諸侯咸歸於軒轅黃帝有熊氏公孫姓名軒轅士總都軒轅之丘黃帝生而神靈弱而能言幼而徇齊長而敦敏鍔木為舟剡木為楫服牛乘馬重門擊柝以待暴客斷木為杵掘地為臼弦木為弧剡木為矢以威天下上棟下宇以待風雨在位一百年少昊金天氏名摰字青陽黃帝之子金德都曲阜鳳凰適故起於官為鳥官在位八十四年顓頊高陽氏姬姓黃帝孫水德都帝丘養材以任地轂時以象天在位七十八年帝嚳高辛氏黃帝曾孫木都毫生而神靈自言其名普旋利物聰明順天之義仁而威天下服曆日月迎送明鬼神敬事在位七十一年帝堯陶唐氏伊祁姓名放勛帝嚳之子火德都平陽其仁如天其智如神富而不驕貴而能降伯夷典禮夔龍典樂舜時有仕趍視四時天下服其言在位九十八年起甲辰止辛也帝舜有虞氏姚姓名重花顓頊五代孫瞽叟之子母曰握登見大蛇感生舜土德都蒲坂幸友聞於四方受天命依于二女命二十二臣率堯舊職巡守四海五載一始在位五十年舜生三十徵庸三十在位起戌申止丁酉有試三十攝位三十八年服喪三年其一在三十年之數為天子五十年凡壽百十二歲十四代此下平出正統天子下處諸侯或同位國王夏代起戊戌止己酉都平陽以建寅月為歲首帝禹姒姓名文命金德在位十五年帝仲康在位三年帝相為羿所逐羿自立二年復為寒浞所殺浞立十年少康殺之共四十年少康在位四十九年帝槐在位十六年帝芒在位八年帝泄在位六十年不降在位六十三年帝扃在位十年帝厪在位七年孔甲在位三十一年帝臯在位十一年帝發在位十年履癸號曰桀成湯放于南巢夏氏遂滅在位五十二年右十四主合四百三十二年而天下歸商商初云殷起庚戌止戊寅都毫以建丑為歲首帝成湯子姓水德在位十三年外丙在位二年仲壬在位四年大甲又曰太宗在位三十三年沃丁在位三十三年大庚在位二十五年小甲十七年雍已十二年大戊又曰中宗毫在祥柔轂共生于朝一暮大拱帝修德祥桑枯在位十七年仲丁一年外壬十五年河亶甲九年祖乙十九年祖帝十六年沃甲二十五年祖丁二十三年南庚二十九年陽甲十七年盤庚改殷曰商在位十八年小辛二十一年小乙二十年武丁又曰高宗夜夢得聖人名曰説於傅岩之中以為相五十九年祖庚七年祖甲十六年廩辛六年庚丁二十一年武乙四年太丁三年乙三十七年辛帝乙小子也乙長子曰微子啓以母賤不得嗣也正后子謂紂帝在位三十三年狎侮五常武王伐之右商三十主合六百二十九年而天下歸周周代起己卯終乙巳都鎬建子月為年首從武王至幽王居西周從平王至定王居東周考王以下復號西周武王發姬姓木德伐紂後革商受命偃武修文歸馬于花山之陽放牛于桃林之野示弗服私云諡父昌曰文王也在位六年成王誦四十七年康王釗二十六年照王瑕四十二年穆王滿五十五年共王緊尼十二年懿王二十五年孝王辟方十五年夷王燮十六年厲王胡好利暴虐國人畔襲王王出命於彝召穆二公行政號曰共和王死於彝在年三十七年共和召公私云攝政十四年宣王靜召穆二公輔之四十六年幽王宮涅娶申女為后又得褒姒生伯服犬戎攻王遂殺十一年平王宜臼五十一年桓王林二十三年莊王他十五年僖王胡齋五年惠王閬二十五年襄王鄭二十三年十六年晉文公重耳立項王臣六年𭅖王班六年定王瑜二十一年簡王夷十四年靈王泄心簡王之子生髭二十一年景王貴二十五年敬王丐四十三年也二十九年魯西狩獲麟春秋於此終元王仁八年貞定王介二十八年考王嵬在位十五年初貞定王立長子去疾為哀王哀王立三月弟叔襲殺哀王自立是為思王思王立五月其弟嵬殺思王自立是考王也右周并哀思共三十六主合八百六十七年而天下併於秦十二諸侯魯周公旦姬姓武王弟起己卯止辛亥周公不就魯伯禽代就武王元年封旦伯禽七世至獻公年不可考獻公子直公直公孝公惠公隱公桓公莊公閔公釐公文公宣公成公襄公昭公定公哀公西狩獲麟孔子卒當惠敬王四十一年也元公穆公共公康公景公平公緍公項公當周赧王為家人魯祀遂絶楚考烈王滅右卅四君八百七十二年楚考烈王滅之齊太公東海上人也本姓薑氏後曰呂武王元年封齊起己卯終壬寅自太公七世至獻公獻公子武公也不勘本紀故不載武公厲公文公成公莊公僖公襄公齊君桓公公子孝公昭公懿公惠公項公靈公莊公景公晏孺子悼公簡公平公宣公康公右卅一君合七百四十四年齊田氏滅之晉唐叔虞姬姓武王子成王弟也武王崩成王立封弟虞於叔唐是成王元年也起乙酉終乙巳自叔五世而至厲侯厲侯子靖侯靖侯僖侯獻侯穆侯殤侯文侯昭侯孝侯鄂侯小子侯晉侯武侯獻侯惠侯懷公文公襄公靈公成公景公厲公悼公平公昭公項公定公出公哀公幽公烈公孝公靖公右三十八君合七百四十一年而韓趙魏共滅之秦非子嬴姓非子好馬及善養問孝王召使主馬孝王分土為附庸後曰秦嬴秦嬴三世至公伯年不可考公伯之子秦仲也秦仲莊公襄公文公寧公出公武公德公宣公成公穆公康公共公桓公景公哀公惠公悼公厲共公躁公懷公靈公簡公惠公出公獻公孝公右三十君合五百六十三年事入戰國楚熊繹芋姓周成王時舉文武勞故封楚成王元年起乙酉終己卯自繹九世至熊延年不可考延之子熊勇也熊勇熊嚴熊霜熊徇熊鄂若敖霄敖蚡武王文王杜敖成王穆王莊王共王康王陜敖靈王平王昭王惠王簡王聲王右三十二君合七百十五年入戰國宋微子子姓封之庶兄也周成王乃命微子開代商後奉其先祠起乙酉終乙亥此國七世而厲公之子僖公也僖公惠公戴公武公宣公穆公殤公莊公閔公新君桓公襄公成公昭公杵舊文公共公平公元公景公昭公特悼公休公辟公宋公右三十二君合八百三十一年齊楚魏共滅之而三分其地衛康叔姬姓周武王討紂封紂子武庚奉其先祠武王令其弟管叔蔡叔傅相二相與武庚欲攻成周公旦冢宰令殺武庚殺管叔于商囚蔡郭鄰衛國封庚叔成王元年封起乙酉終壬辰此間八世頃侯頃侯之子僖侯也僖侯武公莊公楊桓公衛君州吁宣公惠公衛君黔年懿公戴公文公成公穆公定公獻公殤公襄公靈公出公莊公荊聵衛君起悼公敬公昭公懷公慎公聲公成侯平侯嗣君懷君元君衛君角右四十一君合九百八年而秦二世滅之陳胡公媯姓虞舜之後也昔舜為庶人時妻堯二女居媯汭後以為姓桀崩商均為封國夏時或失或續周武封求桀後紂之陳奉帝桀起己卯終癸亥此間五世慎公慎公之子幽公也幽公僖公武公夷公平公文公桓公厲公利公莊公宣公穆公共公靈公成公哀公惠公懷公閔公右二十四君合六百四十五年而楚惠王滅之蔡叔度姬姓武王弟殺武庚與管叔遷癸叔郭鄰叔郭鄰而死其子曰胡馴善周公聞為魯鄉士成王復封蔡起己卯終甲午此間五世而厲侯厲侯次武侯也武侯夷侯僖侯共侯戴侯宣侯桓侯哀侯穆侯莊侯文侯景侯靈侯平侯悼侯昭侯成侯聲侯元侯齊侯右二十五君合六百七十六年而楚惠王滅之曹叔振鐸姬姓武王弟武王克紂封曹武王元年立起己卯終甲寅此間五世而孝伯孝伯之子夷伯也夷伯幽伯戴伯惠伯穆公桓公莊公僖公昭公共公文公宣公成公武公平公悼公聲公隱公靖公曹伯右二十五君合六百三十六年而宋景公滅之鄭桓公姬姓周厲王少子宣王草二年封之起二未終丙午武公莊公昭公厲公子亹鄭子文公穆公靈公襄公悼公成公僖公簡公定公獻公聲公哀公共公函公繻公康公右草三君合四百三十一年韓哀侯滅之燕召公姬姓周武王滅紂封之成王時為三公鄉邑有棠樹其下侯伯庶人無失職後人思召公不敢伐甘棠遂歌之起己卯終戌午此間九世而惠侯也惠侯僖侯項侯哀侯鄭侯穆侯宣侯桓侯莊公襄公桓公宣公昭公武公文公懿公惠公悼公共公平公簡公獻公孝公成公閔公僖公桓公文公右三十七君合七百九十年事入戰國吳周章姬姓仲雍四代孫也大伯弟也武王討紂後求大伯仲雍之後得周章時君吳因封之起己卯終戊辰此間十三世而去齊去齊之子壽夢也王壽夢王諸樊王餘奈王僚王闔廬王夫差右二十君六百五十年越王勾踐滅之是十二侯外也七國秦惠文王孝公之子以周顯王卅二年立至顯王四十四年初稱王起甲申終甲寅武王昭王孝文王莊襄王右五君合九十一年事入始皇紀魏文侯畢姓武舉封畢公高於畢其後絶或在夷狄其苗裔畢萬事晉獻公獻公伐魏封萬次桓侯文侯武侯武侯惠王襄王昭王安僖王景閔五王假右八君合二百七十九年當秦始皇二十二年始皇滅之趙烈侯周穆王賜遺父趙城由此為趙氏韓康子魏相子共滅智伯分其地後烈侯為諸侯起戊寅終己卯周顯王四十六年諸侯皆稱王也武侯敬侯成侯肅侯武靈王惠文王孝威王悼襄王幽穆王代王右十一君合百八十二年當秦始皇始皇滅之韓景侯韓氏事普封韓遂康子與趙襄子魏桓子共伐智伯分其地後為諸侯起戊寅終辛未烈侯文侯哀侯懿侯昭侯宣惠王襄王僖王桓惠王王安右十一君合百七十四年秦始皇滅之齊太公和相齊宣公及康公立淫酒太公遷康海上周安十六年許之為諸侯起乙未終庚辰桓公威王宣王閔王襄王王建右七君合百六十六年始皇滅之楚悼王聲王之子周安王元年立起庚辰終戌寅肅王宣王威王懷王項襄王考烈王幽王右九君合百七年始皇滅之燕易王文公之子周顯王時立起己丑終己卯王噲昭王惠王武成王孝王王喜右七君合百十一年始皇滅之秦始皇水德都雍莊襄之子以十月為正在位三十七年起乙卯終甲午二世皇帝丞相趙高以天下盜往織恐二世誅己乃弒帝於望夷宮在位三年也子嬰二世之兄之扶蘇之子趙高立之沛公入武關子嬰奉天子符靈降沛公在位四十六日居月餘頃籍殺之右三主合四十年天下歸于漢西漢高祖劉姓火德沛豐邑中陽里人都長安以亥月為正滅西楚頃籍燕王天下