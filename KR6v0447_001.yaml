已上淨土論云淨土果報離二種機嫌過應知一者體二者名體有三種一者二乘人二者女人三者諸根不具人無此三過故已上此宗三經一論為所依俱舉大意先大經大意者考大經大意事彌陀四十八願也序分義云此明彌陀本國四十八願願願皆發增上勝因依因起於勝行依行感於勝果依果感勝報依報感成極樂依樂顯通悲化依於悲化顯開智慧之門然悲心無盡智亦無窮悲智雙行即廣開甘露因兹法潤普攝群生已上群生者五乘也五乘者人天聲聞緣覺菩薩也故玄義云正由託佛願致使五乘齊人已上於六八願初十一及十五六十八九二十草一草七三十三四五三十七八九攝凡願第十四二乘所託願第二十二已下多菩薩所託願也問菩薩等往生何答大經下云彌勒菩薩白佛言世尊於此世界有幾所不退菩薩生彼佛國佛告彌勒於此世界有六十七億不退菩薩往生彼國一一菩薩已曾供養無數諸佛次如彌勒諸小行菩薩及修習少功德者不可稱計皆當往生佛告彌勒不但我剎諸菩薩等往生彼國他方佛土亦復如是其第一佛名曰遠照彼有百八十億菩薩皆當往生其第二佛名曰寶藏其第三佛名曰無量音其第四佛名曰甘露其第五佛名曰龍勝其第六佛名曰勝力其第七佛名曰師子其第八佛名曰離垢光其第九佛名曰德首其第十佛名曰妙德山其第十一佛名曰人王其第十二佛名曰無上花有無數菩薩不退轉智慧勇猛供養諸佛於七日中能攝取百千億劫大士堅固之法皆往生其第十三佛名曰無畏不但此十四佛國中諸菩薩等當往生也十方世界無量佛國其往生者亦復如是甚多無數我但説十方諸佛名號及菩薩比丘生彼國者晝夜一劫尚未能竟我今為汝略説之耳已上往生諸菩薩略抄問此十四佛國等菩薩往生極樂意何答自行成就增進佛道淨佛國土教化衆生利他圓滿故也故華嚴經普賢行願品云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩薩記蒙彼如來授記已化身無數百俱胝智慧廣大遍十方普利一切衆生界乃至虛空世界盡衆生及業煩惱盡如是一切無盡時我願究竟恆無盡文殊願亦如是大經下應時無量壽佛授菩薩記言十方來正士吾悉知彼願志求嚴淨土受決當作佛通達諸法性一切空無我專求淨佛土必成如是剎諸佛告菩薩令覲安養佛聞法樂受行疾得清淨處至彼嚴淨國便速得神通必於無量尊受記成等覺已上諸大菩薩往生極樂大意若斯矣人天二乘準之應知次觀經大意考觀經大意事雖説定散之諸善本意以阿彌陀佛而為事故玄義云人法並彰故名阿彌陀佛流通釋云上來雖説定散兩門之益望佛本願意在衆生一向專稱彌陀佛名已上因問人法差別例證何答華嚴宗普賢為人一乘果分為法五教章云一乘教義分齊開為二門一別教二同教初中亦二一是性海果分當是不可説義何以故不與教相應故即十佛自境界也故地論云因分可説果分不可説者是也二是緣起因分即普賢境界也此二無二全體遍收其猶波水已上天台宗以觀音為人以妙法為法故觀音玄云此品之內不云妙法故知觀音妙法體同已上真言宗以普賢為人以祕密瑜伽為法故菩提心論云何能證無上菩提當知法爾應住普賢大菩提心一切衆生本有薩埵為貪嗔癡煩惱之所縛故諸佛大悲以善巧智説此甚深祕密瑜伽令修行者於內心中觀日月輪已上三論宗文殊人八不中道法法相宗彌勒人三無自性法也人法之名目光明大師所立也密宗名法門主問今宗以彌陀果人為法門主諸宗以菩薩等因人為法門主之意何答解經經本意自顯解一代經諸宗意行者內證自心即佛故因人自分進升進道果人顯故今真宗意彌陀果人應用垂下誘引五乘故他力別願故後彌陀經大意考小經大意事十惡五逆衆生以一日七日之稱名直入無漏無生之報土開無生悟教主但讚歎彌陀別願不思議名號時六方諸佛證誠經云東方亦有阿閦鞞佛須彌相佛大須彌佛須彌光佛妙音佛如是等恆河沙數諸佛南方有日月燈佛名聞光佛大焰肩佛須彌燈佛無量精進佛如是等恆河沙數諸佛西方有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恆河沙數諸佛北方有焰肩佛最勝音佛難爼佛日生佛網明佛如是等恆河沙數諸佛下方有師子佛名聞佛名光佛達磨佛法幢佛持法佛如是等恆沙數諸佛上方有梵音佛宿音秀王佛香上佛香光佛大焰肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恆河沙數諸佛各於其國出廣長舌相遍覆三千大千世界説誠實言汝等衆生當信是稱讚不可思議功德一切諸佛所護念經已上稱讚經説十方諸佛問説誠實言者此事不審法華云一大事因緣故出現於世已上一大事者無相甚深諸法實相一理也故多寶佛涌出證誠今經所説法有相彌陀名號所期往生極樂何諸佛證誠哉答法華尤甚深也多寶佛之證誠實丁寧也仰可信但今證誠異於他至所説法凡慮之所不及也有相無相在機情而非關法體實相一理者能化向機根立名法體本自不落一名字以萬物而為名攝萬機但可仰信佛言經云舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間説此難信之法是為甚深已上行此難事者釋尊出世成道因彌陀法故念佛鏡引月燈三昧經云本師自説我行此念阿彌陀佛難事得無上菩提月燈三昧經云十方三世一切過去未來及現作佛皆學念佛速證無上菩提已上世世番番諸佛皆學念彌陀佛故悲華經五百大願第一云我未來世於濁惡世中宣説阿彌陀經若不爾者不取正覺已上此文合阿彌陀經釋尊本懷全在彌陀故諸經所説出世本懷唯一世今經云釋尊本願云諸佛三世修學可為世世本懷故一代八萬會座中無超此經證誠故十因云鷲峯妙法多寶一佛證誠王城金典四方四佛俱説所所道場不似今舌相證臧盛問證誠權教有之耶答不爾問何故無哉答實無速離生死故問大集經説三乘斷證時有諸佛證誠何答大集非證誠所説法甚深且證三乘分別説不違過去諸佛説也或又至極大乘法故有此證誠一論者國淨土論大意事三經通申論也立五念門一禮拜二讚歎三作願四觀察觀察三一觀世界相二自利利他三入一法句此即諸教所讚理具觀道也五回向矣沙門源空録者本地大勢至菩薩也委如本傳問本抄順餘章者可舉淨家所依經釋如何無哉答三經一論是也所引要集文粗顯之故不別舉若委舉之者國淨土教事無量壽經二卷唐僧鎧譯觀無量壽經一卷強良耶舍譯阿彌陀經一卷羅什譯淨土論一卷天親菩薩造流支三藏譯十二論龍樹菩薩造禪那崛多三藏譯麒鱗聖財論四卷流支造淨土論注二卷曇鸞造略論安樂土義一卷曇鸞造安樂集二卷道綽造觀經疏四卷善導造法事讚二卷善導觀念法門一卷善導般舟讚一卷善導禮讚一卷善導臨終要決善導群疑論七卷懷感五會法事讚一卷法照大聖竹林寺記法照已上唐國往生要集三卷慧心往生十因一卷永觀選擇集本末源空淨土初學抄一卷源空三經私記各一卷源空布薩戒儀金剛寶戒章語燈録七卷源空假字書語燈録拾遺一卷源空假字書彌陀本願義疏一卷源空念佛往生者云云者總指五念門也諸行往生者雜行五部章疏者法花三大部並維摩疏涅槃疏也玄義六云能持此經故生安樂土處蓮花中不為貪欲所惱亦是離十惱亂已上文句八云無量壽觀云處華臺人久者為胎生實非胎生也已上例證引之止觀二云步步聲念念唯在阿彌陀佛已上維摩疏云無量壽國果報殊勝無可比喻者乃至犯重罪者臨終懺悔念佛業障即轉往生已上涅槃疏未勘矣上足基師者玄奘有四人上足弟子謂肪生光基委如高僧傳阿彌陀儀軌者阿彌陀儀軌云彌陀有別義深祕祕中祕祕也知了種子密號即身可證善考善恐菩歟提彌陀如來之名亦曰觀自在尊亦此佛密號曰妙法蓮華經也淨妙國土云阿彌陀佛五濁剎云觀自在尊淨穢隔雖異引接方便無障礙今此彌陀如來吉里久字為種子合賀羅伊惡四字而成一字賀字三因佛性具足正了緣之三佛法蜜報應之三身可成之理示此中羅字具足三義離塵清淨波羅蜜塵即六塵也雖不厭之心性即本來清淨至大涅槃岸吉里背有伊點三德祕藏大涅槃不竪不橫自在之三身如來之種子也伊字之點側置二點一大涅槃義一方便神通義也凡彌陀如來之因位萬行諸波羅蜜乃至十方諸佛之塵數三昧陀羅尼門吉里句一字具足萬法無闕滅己界佛界及魔界其身備斯字極樂界莊嚴水鳥樹林羅網等晝夜恆時説法偏由此字加持力也法華二十八品之甚深難解之功德此字中具一心萬法無差別若人唱此字一口七難九橫消滅四重五逆除却臨命終暮往生上品蓮臺已上若無阿彌栗多之句者此請不空三藏之儀軌也縱誦吉里字不誦阿彌栗多之句者都不驗徵也問誦阿彌栗多之句者如當宗之益而可速疾哉何答不爾彼上上根機以上上方便如儀軌本經書本尊供物燈明次第如法深致觀念而誦陀羅尼斷煩惱之處得益大師云毗盧遮那經云如實知自心是即入陀羅尼觀門也如實知自心者其意云何阿字本不生故知自心本不生是言知自心矣阿字本不生故何云如實知自心言如實者指本不生之理云實此本不生理為自心性故本不生者心性都無故云本不生歟為當雖有心性而無變易故云本不生歟心性非云都無自性清淨無改轉故云本不生如虛空性非有非無此心亦爾已上大日經疏云顯教斷粗妄執細妄執極細妄執密教斷微細妄執已上此下根機唯請救護口稱南無阿彌陀佛不斷煩惱直入無漏無生之報土忽得涅槃分更以不同甘露之句者正智院道範云口稱本尊名以為口密一切舉動無非契印況殷重相一切語言無非真言況稱佛名心依尊號義趣以為心密其義趣者佛號三字既是真言若據句義是甘露義彼佛自能離於一切惑障熱毒證於一切涅槃清涼亦能令彼念持衆生如我無異是名甘露已上祕密念佛集釋阿陀三字從口稱至既是真言釋三字從若據下釋盡字也問淨家三國相承行儀次第何答今釋三國相承者考三國傳來事一天竺者且佛在世之時阿難行禮拜大經云佛告阿難汝起更整衣服西面合掌禮無量壽佛十方國土諸佛如來常共稱揚讚歎彼佛無著無礙於是阿難起整衣服正身西面恭敬合掌五體投地禮無量壽佛白言世尊願見彼佛安樂國土及諸菩薩聲聞大衆説是語已即時無量壽佛放大光明普照一切諸佛世界金剛國山須彌山王大小諸山一切諸有皆同一色已上韋提觀極樂觀經云佛告韋提希汝及衆生應當專心繫念一處想於西方乃至時韋提希見無量壽佛已接足作禮白佛言世尊我今因佛力故得見無量壽佛及二菩薩已上跋陀和菩薩行稱名行般舟三昧經阿彌陀佛告跋陀和菩薩言欲來生者當念我名莫有休息即得來生已上阿難為禮拜正行之本韋提為觀察正行之本跋陀和為稱名正行之本矣三部經皆以稱名正行面面付屬流通彌勒阿難舍利弗佛滅後七百年南天竺國龍樹菩薩出世結十二禮頌行禮拜願極樂問龍樹為天台真言三論祖師何必願極樂答十二禮文顯著也何成疑就中楞伽經未來記之的文云考龍樹除文事我乘內證智妄覺非境界如來滅度後誰持為我説如來滅後未來當有人大慧汝諦聽有人持我法於南天國中有大德比丘名龍樹菩薩能破有無見為人説我乘大乘無上法證得歡喜地往生安樂國已上此楞伽經報身説故我乘內證智者同大經五智妄覺非境界者今五智非等覺十地之境界乃至非思議言説之境故説不思議不可稱智如來乃至我説者如來自問如來滅度已下如來自答答中於南天國已下龍樹未來記也此中能破有無見者同今經不可稱智曇鸞釋不可稱智云不可稱智者言佛智絶稱謂非相形待何以言之法若是有必有知有之智法若是無者亦應有知無之智諸法離有無故佛冥諸法則智絶相待已上以智取佛不曰知佛以不知取佛亦非知佛以非知非不知取佛亦非知佛以非非知非非不知取佛亦非知佛佛智離四句緣之者心行滅指之者言語斷已上吾等凡夫急往生極樂可知之大乘無上法者同今經彌勒付屬之為得大利無上功德證得歡喜地往生安樂國者同今經六十有七億不退諸菩薩皆當往生問就此文料簡難破疑關高野大師二教論始從我乘內證智終至大乘無上法引之云我乘內證智者是即示真言祕藏如來明記已上諸宗皆依用之故或云我乘內證智者我宗一心三觀慧文禪師依釋論三智實在一心中得之文立一心三觀故或云我乘內證智者我宗八不中道也龍樹本意宗三論法或云我乘內證智者我宗圓成實妙理也楞伽經我宗依經故何答釋尊出世成道偏依念阿彌陀佛三昧故般舟三昧經云三世諸佛依念阿彌陀佛三昧成等正覺已上故知內證念佛三昧也本自彌陀三昧廣故開此三昧説一代八萬故大經同本異譯清淨覺經云十方三世佛一切諸菩薩八萬諸聖教皆是阿彌陀已上機機區而為有性相各別之情者且開彌勒內證説楞伽深密等明四分三性圓成實而廢情依玄奘慈恩等宗之為有一異去來之情者開文殊內證説諸部般若經等明畢竟皆空之妙理融情於八不仍羅什吉藏宗之為有事理一圓之情者開觀音之內證説法華涅槃等明是法住法位世間相常住等慧聞考聞恐文歟南嶽天台等解一心三觀之妙因於無作三身之妙果圓融融於情以此宗之為有顯開大乘不信之情者開普賢之內證於妙法密説大日金剛頂經等令大乘立信依龍猛一行慧果等宗之此等法門主菩薩衆皆是極樂久住也此等菩薩皆以念彌陀三昧而為內證為助化之力趣衆生利益也故楞伽經云十方佛剎中所有法報身及變化菩薩比丘衆皆從無量壽極樂界中出已上非啻菩薩諸佛等皆以彌陀三昧為內證因故觀佛經云佛告阿難我與賢劫諸大菩薩因是念佛三昧力故得一切智威神自在如是十方無量諸佛皆由此法成三菩提已上故知顯密諸經皆開彌陀三昧也但冀停情執明勘顯密諸經靜察佛智矣問此一一料簡實荒量也何以一兩文塞事不穩便諸典乎所引文趣一機一緣所説何關諸因諸證諸機釋尊成道云依念佛三昧者違守護國界經經云爾時釋迦牟尼佛言祕密主我於無量無數劫中修習如是波羅蜜多至最後身六年苦行不得阿耨多羅三藐三菩提成大毗盧遮那坐道場時無量化佛猶如油麻遍滿虛空諸佛同聲而告我言善男子云何而求成等正覺我白佛言我是凡夫未知求處唯願慈悲為我解説是時佛同告我言善男子諦聽當為汝説汝今宜應當於鼻端想月輪於月輪中作唵字觀作是觀已於後夜分得成阿耨多羅三藐三菩提善男子十方世界如恆沙三世諸佛不於月輪作唵字觀得成佛者無有是處何以故唵字即是一切法門亦是八萬四千法門寶炬關鎖唵字則是毗盧遮那之真身唵字即是一切陀羅尼母從此能生一切如來從如來生一切菩薩從菩薩生一切衆生已上開彌陀三昧説一代八萬者違一代超過多寶證誠純圓一實之妙經為誘引一代之通機開一乘説三乘經云我所得智慧微妙最第一衆生諸根鈍著樂癡所盲如斯之等類云何而可度乃至若但讚佛乘衆生沒在苦不能信是法破法不信故墜於三惡道我寧不説法疾入於涅槃乃至尋念過去佛所行方便力我今所得道亦應説三乘作是思惟時十方佛皆現梵音慰論我善哉釋迦文第一之導師乃至為諸衆生類分別説三乘已上彌陀三昧為內證以赴衆生利益者違諸聖圓通之首楞嚴經經七卷説楞嚴呪畢云是佛頂光聚悉怛多般怛羅此六字梵語此翻白傘蓋即指藏心祕密伽陀微妙章句出生十方一切諸佛十方如來因此呪心得成無上正遍知覺十方如來執此呪心降伏諸魔制諸外道十方如來乘此呪心坐寶蓮花應微塵國十方如來含此呪心於微塵國轉大法輪十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記十方如來依此呪心能於十方濟群苦已上此等文面面皆可成一代教之根本佛成道之因衆生利益之乘何答本自所答任經文所歸彌陀超諸佛大經云無量壽佛威神光明最尊第一諸佛光明所不能及已上但至一機一緣難者最尊第一彌陀所發本願豈赴一機捨衆機乎既五乘齊入本願也以此本願所成佛內證為諸佛之內證赴衆機故被恃一切衆生普資益萬人是攝彌陀他力本願用十方三世諸佛始成正覺非進我果唯偏為利益衆生也可他力本願彌陀內證為緣守護國界經為誘引祕密之一機佛可讚唵字之德何對三世諸佛為成覺法彌陀三昧法花經為開會鹿園證果之聲聞情説之何對十方三世佛諸菩薩八萬教同含藏文哉楞嚴經顯如來藏心為示衆生説也下機難得如來藏故以楞嚴呪祈請令得之説也何對從極樂出十方法身報身應身菩薩聲聞等趣利益衆生之經文哉非啻此經月燈三昧經觀佛三昧經等亦明鏡也何致疑他力不思議妙門佛智果海仰可信國界法花楞嚴等經實皆顯我等心性一理説唵字一乘實相如來藏心於此等説者設説自性天真之果海皆普賢文殊觀音等內證釋之難及彌陀果海內證師弟異故因果別故此皆自力門所談也八萬教開彌陀三昧者一切行可本願乎不爾面面內證改色味示衆生故尋云今為諸佛之內證念彌陀三昧之體何物哉答佛智所證豈不前云非等覺十地境界汝絶情意但仰教主釋尊説釋尊説彌陀外用功德言無量壽佛光明威神巍巍殊妙晝夜一劫尚未能盡已上外用之功德既如此何況內證哉問十方三世諸佛最初出生之極樂之體何答第一義諦之實報土也淨土論云彼無量壽佛國土莊嚴第一義諦妙境界相稱讚經云假使經於百千俱胝那由他劫以其無量百千俱胝那庾多舌一一舌上出無量聲讚其功德亦亦不能盡是故名為極樂世界已上疑云第一義諦法性土何同云報土又法身法性土報身報土應身化土定之何一處出生哉答三身三土各別娑婆應化一説也界外果海之説會不爾歟已上抑諸宗情解以解楞伽經文耳佛滅後九百年北天竺天親菩薩出世結二十四行頌修五念門願極樂龍樹天親俱造千部論終期淨土矣二震旦國者內典録曰考流支三藏事梁武帝世北天竺乾陀會國三藏法師菩提流支魏言道希從魏永平二年北朝後魏第七主宣武帝時至天平年同北朝東魏高祖孝靜帝時也當元年其間凡歷二十五年在洛都及鄙譯李廓録稱三藏房內經論本可有萬夾所翻譯筆受草本滿一屋間已上續高僧傳六義解篇曰曇鸞逢中國天竺也三藏菩提流支流支以觀經授之曰此大仙方依之修行當得解脫生死鸞尋頂受已上略抄瑞應傳如下所引譯天親淨土論正授鸞或製立宗論四卷詳聖淨二門故今號宗祖三藏如今抄者本地論宗也彼宗有南北兩家今師北地祖矣遂歸淨土故立宗論曰今此淨土宗約三法輪立二藏教惣攝一代云云又云稱名一乘多善根一念十念佛來迎已上瑞應傳云齊朝曇鸞法師家近五臺洞明諸教因得此土仙經十卷欲訪陶隱居學仙術後逢三藏菩提流支問曰佛法中有長生不死法勝此土仙經否三藏唾地驚曰此方何處有長生不死法縱得延壽年盡須墮即將無量壽觀經授與鸞曰此大仙方依而行之長得解悅永離生死鸞便須火遂焚仙經忽於半夜見一梵僧入房語鸞曰我是龍樹菩薩便説偈已落葉不可更附枝未束粟不可倉中求白駒過隙不可暫駐已去者叵反未來未可追現在今何在白駒難可回法師乃知壽終集弟子三百餘人自執香爐面向西教誡門徒勸崇西方以日初出時齊聲念佛即便壽終寺西五里有一尼寺聞空中音樂西來東去須臾又聞東來西去已上龍樹偈誦無常迅速白駒者譬壽於駒歟龍樹示知往生極樂鸞法師聞此偈即遂往生故又迦才淨土論云沙門曇鸞法師者並州汶水人也魏末高齊初猶在神高遠三國知聞洞曉衆經獨步人外梁國天子蕭王恆向北禮曇鸞菩薩注解天親往生論載成兩卷法師撰集無量壽經奉讚七言偈百九十五行并問答一卷流行於世勸道俗等決定往生得見諸佛恆請龍樹菩薩臨終開悟誠如所願此方報盡半宵之內現聖僧像忽來入室云我是龍樹菩薩便為説偈曰已上偈如前新修傳云國道綽事釋道綽并州人也棄家已來歷訪名師後聞瓚禪師理行兼著畢志事之尋憩石壁玄忠寺寺即後鸞魏鸞法師舊止考止恐趾也鸞於其寺久蘊淨業至其亡日疊有祥異郡人奇之捃托其事刻之於石綽讀其文彌深信講涅槃經二十四遍每歎鸞法師智德高遠尚捨講説修淨土業已得往生況我小子所解何足為多而恃此為德即捨講説修淨土行一向專念阿彌陀佛日別七萬返為限禮拜供養相續無間為開悟有緣每講觀經二百遍示誨道俗七歲已上念阿彌陀佛教用小豆為數上者念得九十石中者五十石下者三十石已上善導類聚傳云國善導事近有山僧善導者阿彌陀佛化身西方略傳幼投密州明勝法師三論宗人出家誦法花維摩兩經新修傳時周遊寰宇求訪道津見西方變相曼陀羅也歎曰何當託質蓮臺栖神淨土於是投大藏經誓云仰願我得有緣經信手探之得觀經便喜誦習云修餘行業迂僻難成唯此觀門定超生死貞觀唐第三主太宗年號中初聞綽禪師晉陽開闡欲不遠千里從而問津時逢玄冬首風飄落葉填滿深坑遂挈瓶鉢入中安坐一心念佛不覺已度數日乃聞空中聲曰可得前行所在遊履無復罣礙遂出坑進程至綽禪師展會夙心前所念綽公即授與觀經導披卷詳之比來所覩云初所見曼陀羅宛在目入定七日不起綽歎其深詣導念想因請令入定語導曰綽恐不往生願師入定為佛得否導入定見佛百餘尺問問定中佛曰道綽現念佛不知得住生否又問何年月得生答曰伐樹連下斧還家莫辭苦又令綽懺悔三罪綽公靜思往咎皆曰不虛於是洗心悔謝訖而見導即曰師罪滅無問貴賤屠沽輩亦擊悟淨土往生傳西方略傳略抄在西明寺內與金剛法師攝論宗人量念佛勝劣升高座發願云準諸經念佛一法一日七日一念十念定生淨土此是真實不誑衆生此堂中二像皆放光若念佛法惡不生淨土遣善導墮大地獄遂將如意杖指像像皆放光念佛鏡有信人見和尚念佛佛從口出一聲有一道光明從其口出或十聲萬聲光亦爾淨土往生傳西方略傳有暫申禮請聞説少法或得預道場親承教訓或曾不見聞披尋教義或展轉授淨土法門諸州僧尼士女或投身高岩或委深泉或自墮高枝焚身供養此供養有二意遠報佛恩近謝導略聞四遠四方向百餘人新修往生傳每自責曰釋迦尚分衛善導何人端居索供養乃至沙彌并不受禮所見塔廟無不修葺瑞應傳入堂則合掌胡跪一心念佛非力竭不休乃至寒冷流汗三十餘年無別寢處不暫睡眠除洗浴外曾不脫衣般舟入定行道禮佛方等懺悔歟以為己任護持戒品纖毫不犯曾不舉目視女人一切名利無心起念綺詞戲笑亦未之有所行之處淨身供養人多供導飲食衣服四事衣服臥具飲食湯藥豐皆不自入並將回施好食送大厨庫裡供養徒衆唯食粗惡才得支身諸有嚫施將寫阿彌陀經十萬餘卷所畫淨土變相三百餘堵與稱同幅義然燈續明歲常不絶三衣瓶鉢不使人持洗新修傳略抄導謂人曰此身可厭諸苦逼迫情偽變易無暫休息乃登所居寺前柳樹西向願曰願佛威神驟以接我觀音勢至亦來助我令我此心不失正念不起驚怖於彌陀法中以不生退墮願畢於其樹上投身自絶時京師士大夫歸信收其骨葬高宗皇帝唐第三主知其念佛口出光明又知捨報之時精至如此賜寺額為光明焉新修傳辛巳永隆二年三月二十七日善導和上亡年代緒一云春秋六十有九身體柔軟容色如常永隆二年三月十四日入滅新修傳吾將往生可住三兩夕而已忽然微疾掩室怡然長逝新修傳二十六篇師已上類聚傳源空會入滅相違曰權者入滅隨機不同已上瑞應傳云考懷感禪師事感法師高僧傳云不知何許人也居長安千福寺博通經典不信念佛問善導和尚曰念佛之事在何門答曰若能專念佛當自有證又問頗見佛否師曰佛言何可疑哉遂三七日入道場未有其應自恨罪深欲絶食畢命師止而不許三年專志遂得見佛金色玉毫證得三昧乃自造往生決疑論七卷臨終佛迎合掌向佛卒已上樂邦文類云頭法照禪師事法照者唐代宗第九主大歷四年於衡州湖東寺啓五會念佛道場感五色祥雲覆其寺雲中有樓閣睹阿彌陀佛二菩薩復於道場外遇一老人指見文殊因往五臺大聖現竹林寺照入寺之講堂見文殊在西普賢在東為衆説法照作禮問曰末代凡夫智識淺劣未審修何法門文殊曰諸修行門無如念佛我於過去因念佛故得一切種智照又問當云何念文殊曰此世界西有阿彌陀願力難思汝當繫念令無間斷命終決定往生説已為照摩頂而退乃至德宗遂敕迎入內教宮人念佛亦代宗時為國師亦云法照大師即善導後身也已上龍舒淨土文云少康貞元初至洛下白馬寺見殿中文字纍放光明探取之乃善導西方化導文也康曰若於淨土有緣當使此文再發光明言未已光乃閃爍遂至長安善導影堂大陳薦獻導於空中曰汝依吾事利益有情則汝之功同生安養又逢一僧語曰汝欲化人當往新定言訖而隱新定今羅州也至彼人無識者康乃乞錢誘小兒與之約曰阿彌陀佛是汝本師能念一聲與汝一錢小兒務得其錢隨亦念之後經月餘俟錢者多康乃曰可念十聲與一錢如是一年無長少貴賤念佛之人盈於道路凡見康者則稱阿彌陀佛後於烏龍山建淨土道場築壇三級聚人午夜行道康升座令人面西康先唱阿彌陀佛次衆和之康唱時衆見一佛從其口出連唱十聲則有十佛若貫珠焉臨終放光數道掩然而逝世稱後善導康縉雲仙都人也樂邦文頌云立社之號以遠公為始祖自師歸寂抵今大宋慶元五年己未凡八百九年矣中間繼此道者乃有五師曰善導法照少康省常宗是五師異世同轍省常大宋人住錢唐修淨業宗者大宋元祐中住真州長慶寺勸念佛是禪宗也已上五人世云五大法師三日本者鎮西宗要聽書云念佛日本四度興盛也一番聖武帝御宇行基弘念佛問成一階僧正興盛也農夫田歌歌念佛二番延喜帝御時空也上人弘之三番花山帝御時源信僧都造三帖往生要集弘之四番隱岐院御時法然上人造選擇集弘之行基菩薩傳云頭行基菩薩事泉州人天智七年生生胞衣裹纏母忌之懸之樹枝經宿往見出胞能言收育童遊讚佛乘村兒捨牛馬從者數百人其主覔兒牛馬到基所聞其説感泣忘歸説誨間牛馬散諸所基上高所呼應聲來十五出家橋河畔堤不日成基歸故里里人捕魚宴池邊年少戲薦基基喫須叟吐池為小魚去有時度沙彌敕禁圄在獄遊里閭赦之有智光法師云朝廷賞基棄我嫉隱山一夕俄死十日蘇語諸弟獄中基受生所我受苦畢行謝基作禮矣此師又興念佛往生極樂萬民風靡唱佛名本地文殊菩薩初會華嚴發願往生今又本迹不替歸本願念佛是萬行基本故歟矣空也傳云頭空也上人事光勝沙彌時稱空也多為濟無水地多穿井俗名彌陀井曠野每逢遺骸捃一處念彌陀號灌油燒天慶元年醍醐時入王城於市鄽唱彌陀化人人呼市上人後創六波羅蜜寺或逢松尾明神與衣或老鍛工禮也云日暮道遠如生死何教云只專念彌陀工辭還中路逢賊工潛念彌陀賊見工云空也上人捨去奧羽二州夷地負像經往説法二州多化終著淨衣執香爐端坐語門人云無量聖衆來迎語已氣絶香氣音樂響天世云不知何許人或云延喜帝子法華驗記云頭慧心僧都事源信僧都本是大和州葛木下郡人乃至道心堅固讀誦法花經了深義顯密一教得其源底迄壯年時背名利山門閉迹深望極樂誰量所期矣撰往生要集為極樂指南其時夢觀音微笑授與金蓮花毗沙門捧蓋大唐皇帝降宣旨建廟堂安影像及往生要集授大師號諡圓通大師聞度度唐人傳僧都迄春秋七十六以寬仁元年後一條時六月十日寅時永遷化當此時天奏妙音樂又香風頻吹奇妙香氣滿虛空草木枝葉似萎衰形向西方傾低已上永觀傳云頭永觀事永觀但馬守國舉孫木工助薩原敦隆子十二歲出家東大寺受戒本學三論兼習唯識因明矣生年十八歲已後歸念佛門作往生十因一卷所行世自每日稱名一萬遍後增六萬每日三時彌陀供養法無懈一期之間百萬遍三百度乃至白河院承保二年乙卯四十二歲後住禪林寺一向念佛堀河院承德三年乙卯六十七任律師僅經一宿辭退之次年補東大寺別當鳥羽院天承元年庚寅腰有少痛至二年春起居不快至同八月食事乖例同十月晦日修往生講十一月一日強自沐浴苦痛忽除同二日亦修往生講至念佛段衆等同音唱來迎讚師語傍人曰香氣芬馥然而餘人不聞至丑時頭北面西正念念佛如睡氣絶春秋七十九于時紫雲聳禪林空音樂聞間屋內紫雲移扉經時不消已上源空傳考源空事舜昌法印於睿山集四十八卷云黑谷上人者崇德院御宇長承二癸丑誕生久安近衛院三年志學攀登睿峯同年登壇同六年二九隱居黑谷承安五年乙未歸善導疏入專修其歲四十三謂為出離生死雖學一切教而當我機失得度門後入報恩藏周覽積年披閲一切經已及五遍和尚八軸疏亦見五遍文幽義邈然後別開八卷亦看三遍前後補接竊窺八遍才至一心專念彌陀名號文正解素意偏行念佛以為正定之業建曆二年壬申正月二十五日午時唱光明遍照四句入滅已上年滿八十往生奇瑞滅後追薦委如傳矣問上諸師同修往生業何遂往生何必黑谷時殊盛哉答何雖修淨業遂往生黑谷上人習學八宗師德超當代人諸宗本師還為弟子義花開天下的申法談於大裏開心新顯一人傾首諸侯為禮有時出槐門步空放頭光月輪殿下降大庭低頭合掌從其已來日本一州貴賤歸念佛一行問諸宗人師誰不吐威光何法不甚深何此念佛一法殊利益廣大乎答一彌陀娑婆緣深故一易行故一佛果應用甚深廣故虛舍萬像海藏百川例也問文言促易行非但念佛陀羅尼真言亦可易行答會有二一真言非他力本願故非易行念佛本願故易行也一陀羅尼念佛勝劣如別紙矣尋云設雖他力本願何超法身所説之陀羅尼乎答本願者界外土報身之內證汝之所解教主所不及也又可在別紙尋云淨土經開彌陀內證故果地間可勝諸經諸經開菩薩內證故因位而可劣然何諸經説甚深無相理淨土經説有相淺近旨乎答相無相在機非法法淺深在見不同譬如耆婆之前萬物皆妙藥藥無淺深皆應病肝心淨土經教主為順下機説相淺淺識不知之法體謂淺諸經勸上機故説相深若説相淺機懈怠意苔深自心玉不顯自心玉不顯者何出生死故説相深淺識不覺謂法體實有淺深矣又復本自迹下有益高益少譬如褁覆火火氣漏出故才唱一念十念五逆十惡謗法闡提忽入實報土矣迹自本高有益下益少譬如青出從藍而青於藍青劣藍人不用之雖高動落機知解情量證理少已上一分
